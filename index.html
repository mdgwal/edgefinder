<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EdgeFinder Pro</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="tooltip" id="tooltip"></div>
<header class="header">
  <div class="hlogo">
    <div class="logo-icon">EF</div>
    <div class="logo-text">Edge<b>Finder</b> <span style="font-size:11px;color:var(--accent);font-weight:400">PRO</span></div>
  </div>
  <div class="hright">
    <span><span class="live-dot"></span>LIVE</span>
    <span style="color:var(--muted)">Updated: <span class="lupdate" id="last-update">--:--</span></span>
    <button class="rbtn" onclick="refreshAll()"><span id="rbtn-icon">↻</span></button>
    <!-- Profile avatar + glassmorphism dropdown -->
    <div class="pm-wrap" id="pm-wrap">
      <button class="pm-avatar" onclick="pmToggle()" aria-label="Menu">
        <span class="pm-avatar-letters">EF</span>
        <span class="pm-avatar-dot"></span>
      </button>
      <div class="pm-dropdown" id="pm-dropdown" role="menu">
        <div class="pm-glass-edge"></div>
        <div class="pm-header">
          <div class="pm-avatar-lg"><span>EF</span></div>
          <div>
            <div class="pm-name">EdgeFinder Pro</div>
            <div class="pm-email">finder-theta.vercel.app</div>
          </div>
        </div>
        <div class="pm-divider"></div>
        <div class="pm-section-label">Navigation</div>
        <button class="pm-item" onclick="pmGo('scorecard')">
          <span class="pm-icon">◈</span><span>Asset Scorecard</span>
        </button>
        <button class="pm-item" onclick="pmGo('forex')">
          <span class="pm-icon">⊞</span><span>Forex Scorecard</span>
        </button>
        <button class="pm-item" onclick="pmGo('setups')">
          <span class="pm-icon">⚡</span><span>Top Setups</span>
        </button>
        <button class="pm-item" onclick="pmGo('cot')">
          <span class="pm-icon">⊕</span><span>COT Data</span>
        </button>
        <div class="pm-divider"></div>
        <div class="pm-section-label">Tools</div>
        <button class="pm-item" onclick="pmGo('sentiment')">
          <span class="pm-icon">◎</span><span>Sentiment</span>
        </button>
        <button class="pm-item" onclick="pmGo('econ')">
          <span class="pm-icon">◉</span><span>Economic Data</span>
        </button>
        <button class="pm-item" onclick="pmGo('carry')">
          <span class="pm-icon">◆</span><span>Yield Engine</span>
        </button>
        <button class="pm-item" onclick="pmGo('feargreed')">
          <span class="pm-icon">◇</span><span>Fear / Greed</span>
        </button>
        <div class="pm-divider"></div>
        <button class="pm-item pm-item-refresh" onclick="refreshAll();pmClose()">
          <span class="pm-icon">↻</span><span>Refresh Data</span>
          <span class="pm-badge pm-badge-live">LIVE</span>
        </button>
        <button class="pm-item" onclick="pmGo('settings')">
          <span class="pm-icon">⚙</span><span>Settings</span>
        </button>
        <div class="pm-footer">EdgeFinder Pro · Real-time analysis engine</div>
      </div>
    </div>
  </div>
</header>
<nav class="tabs" id="tabs"></nav>
<div class="main">
  <div id="page-scorecard"  class="page"></div>
  <div id="page-forex"      class="page"></div>
  <div id="page-setups"    class="page active"></div>
  <div id="page-cot"       class="page"></div>
  <div id="page-sentiment" class="page"></div>
  <div id="page-econ"      class="page"></div>
  <div id="page-currency"  class="page"></div>
  <div id="page-carry"     class="page"></div>
  <div id="page-feargreed" class="page"></div>
  <div id="page-seasonality" class="page"></div>
  <div id="page-settings"  class="page"></div>
</div>

<!-- 1. Data + state -->
<script src="js/data.js"></script>
<!-- 2. Asset + Setup Scorecard engines -->
<script src="js/assets-engine.js"></script>
<!-- 4. Forex Scorecard engine -->
<script src="js/fx-engine.js"></script>
<!-- 5. All rendering functions -->
<script src="js/ui-render.js"></script>
<!-- 6. Entry point: fetch helpers, data pipeline, boot -->
<script src="js/app.js"></script>

<div class="pm-overlay" id="pm-overlay" onclick="pmClose()"></div>
</body>
</html>
