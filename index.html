function renderForexScorecard() {
  const liveData   = state.scLiveData || null;
  const ccyScores  = state.scCcyScores || buildCurrencyScores(liveData);
  const pairs      = state.scFxPairs   || SC_FOREX_PAIRS.map(p=>({...p,...calculateForexScore(p.base,p.quote,ccyScores)}));
  const selPairId  = state.scForexPair || "EURUSD";
  const isLive     = state.cotLive || state.sentimentLive || state.econLive;
  const SCORE_MAX  = 10;

  // Resolve selected pair
  const selObj  = SC_FOREX_PAIRS.find(p=>p.id===selPairId) || SC_FOREX_PAIRS[0];
  const selFX   = pairs.find(p=>p.id===selPairId) || calculateForexScore(selObj.base, selObj.quote, ccyScores);
  const pi      = scBiasInfo(selFX.pairScore);
  const baseI   = scBiasInfo(selFX.baseScore);
  const quoteI  = scBiasInfo(selFX.quoteScore);
  const baseRaw  = ASSETS_SCORED.find(a=>a.id===selObj.base);
  const quoteRaw = ASSETS_SCORED.find(a=>a.id===selObj.quote);
  const baseSc   = baseRaw  ? calculateAssetScore(baseRaw,  liveData) : null;
  const quoteSc  = quoteRaw ? calculateAssetScore(quoteRaw, liveData) : null;

  // ── Pair pills grouped ──────────────────────────────────────────────────────
  const pillNav = pairs.map(fx => {
    const fi   = scBiasInfo(fx.pairScore);
    const isSel = fx.id === selPairId;
    const cls  = isSel
      ? (fi.col==="rgba(52,211,153,.3)"||fi.col==="#34d399"||fi.col==="#6ee7b7"?"fx-pair-pill p-bull"
        :fi.col==="#f87171"||fi.col==="#fca5a5"?"fx-pair-pill p-bear":"fx-pair-pill p-neut")
      : "fx-pair-pill";
    // Simplified: check pairScore
    const actCls = isSel
      ? (fx.pairScore>=2?"fx-pair-pill p-bull":fx.pairScore<=-2?"fx-pair-pill p-bear":"fx-pair-pill p-neut")
      : "fx-pair-pill";
    return `<button class="${actCls}" data-fx-pair="${fx.id}"
      onclick="state.scForexPair='${fx.id}';renderForexScorecard()">${fx.id}</button>`;
  }).join("");

  // ── Pair dropdown (single source of truth) ──────────────────────────────────
  // Grouped dropdown — single source of truth
  const fxByGroup = {};
  SC_FOREX_PAIRS.forEach(p => {
    if (!fxByGroup[p.group]) fxByGroup[p.group] = [];
    fxByGroup[p.group].push(p);
  });
  const dropdown = Object.entries(fxByGroup).map(([grp, ps]) =>
    `<optgroup label="${grp}">${ps.map(p =>
      `<option value="${p.id}" ${p.id===selPairId?"selected":""}>${p.id} — ${p.name}</option>`
    ).join("")}</optgroup>`
  ).join("");

  // ── Section 1: Score header ─────────────────────────────────────────────────
  const basePct  = Math.round(Math.max(5,Math.min(95,50+(selFX.baseScore/SCORE_MAX)*45)));
  const quotePct = Math.round(Math.max(5,Math.min(95,50+(selFX.quoteScore/SCORE_MAX)*45)));

  const scoreHeader = `<div class="fx-score-header" data-fx-pair="${selPairId}">
    <!-- Pair identity -->
    <div>
      <div class="fx-pair-big">${selPairId}</div>
      <div class="fx-pair-sub">${selObj.name}</div>
      <span class="sc-bias-pill" id="sc-bias-lbl" style="color:${pi.col};background:${pi.bg};border:1px solid ${pi.border};margin-top:8px;display:inline-block">

      <div class="fx-score-lbl">Pair Score</div>
    </div>
    <!-- Currency strength bars -->
    <div class="fx-ccy-section">
      <div style="font-size:8px;font-weight:700;letter-spacing:1px;color:var(--sc-t3);text-transform:uppercase;margin-bottom:10px">Strength</div>

        <span class="fx-ccy-val" data-fx-val="quote" style="color:${quoteI.col}">${selFX.quoteScore>=0?"+":""}${selFX.quoteScore}</span>
      </div>
      <div style="font-size:9px;color:var(--sc-t3);margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)">

  </div>`;

  // ── Section 2: Score history (NEW) ─────────────────────────────────────────
  // Use the base currency's score history as proxy for the pair
  const histSection = scHistoryChart(
    selObj.base, selFX.baseScore,
    { height: 130, showLabel: true, labelSuffix: `${selPairId} (${selObj.base} strength)` }
  );

  // ── Section 3: Component breakdown ─────────────────────────────────────────
  const compKeys = [
    {key:"technical", lbl:"Technical"},
    {key:"sentiment", lbl:"Sentiment"},
    {key:"cot",       lbl:"COT"},
    {key:"growth",    lbl:"Growth"},
    {key:"inflation", lbl:"Inflation"},
    {key:"jobs",      lbl:"Jobs"},
  ];
  const compMinis = compKeys.map(ck => {
    const bv  = baseSc?.components?.[ck.key]  ?? 0;
    const qv  = quoteSc?.components?.[ck.key] ?? 0;
    const diff = bv - qv;
    const bI2  = scBiasInfo(bv * 2);
    const qI2  = scBiasInfo(qv * 2);
    const dI   = scBiasInfo(diff * 2);
    return `<div class="fx-comp-mini" data-fx-comp="${ck.key}">
      <div class="fx-comp-mini-lbl">${ck.lbl}</div>
      <div class="fx-comp-mini-row">
        <span class="fx-comp-mini-ccy">${selObj.base}</span>
        <span class="fx-comp-mini-val" style="color:${bI2.col}">${bv>=0?"+":""}${bv}</span>
      </div>
      <div class="fx-comp-mini-row">
        <span class="fx-comp-mini-ccy">${selObj.quote}</span>
        <span class="fx-comp-mini-val" style="color:${qI2.col}">${qv>=0?"+":""}${qv}</span>
      </div>
      <div class="fx-comp-divider"></div>
      <div class="fx-comp-diff" style="color:${dI.col}">${diff>=0?"+":""}${diff} ${dI.text}</div>
    </div>`;
  }).join("");

  // ── Section 4: Currency ranking ─────────────────────────────────────────────
  const sorted  = Object.entries(ccyScores).sort((a,b)=>b[1]-a[1]);
  const csMax   = Math.max(...sorted.map(([,v])=>Math.abs(v)), 1);
  const rankRows = sorted.map(([ccy, sc2], i) => {
    const ri  = scBiasInfo(sc2 * 1.5);
    const pct = Math.round(Math.max(4, Math.min(96, 50 + (sc2/csMax)*45)));
    const isBase  = ccy === selObj.base;
    const isQuote = ccy === selObj.quote;
    const hlStyle = isBase||isQuote ? `background:rgba(255,255,255,.025)` : "";
    return `<div class="sc-rank-row" style="${hlStyle}">
      <span style="font-size:9px;color:var(--sc-t3);width:14px">${i+1}</span>
      <span style="font-size:11px;font-weight:700;color:${ri.col};width:34px">
        ${ccy}${isBase?" *":isQuote?" ·":""}
      </span>
      <div style="flex:1;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${ri.col};border-radius:2px;transition:width .5s"></div>
      </div>
      <span style="font-size:11px;font-weight:700;color:${ri.col};min-width:26px;text-align:right">${sc2>=0?"+":""}${sc2}</span>
    </div>`;
  }).join("");

  // ── ASSEMBLE ─────────────────────────────────────────────────────────────────
  document.getElementById("page-forex").innerHTML = `
  <div class="sc-page">
    <div class="sc-topbar">
      <div>
        <div class="sc-title">Forex Scorecard</div>
        <div class="sc-subtitle">Pair Score = Base Strength − Quote Strength · ≥+2 Bullish · ≤-2 Bearish</div>
      </div>
      <select class="sc-sel" onchange="state.scForexPair=this.value;renderForexScorecard()">${dropdown}</select>
    </div>

    <!-- Quick-select pills -->
    <div class="fx-pair-nav" style="margin-bottom:14px">${pillNav}</div>

    <!-- § 1 Score header -->
    ${scoreHeader}

    <!-- § 2 Score history -->
    <div style="margin-top:10px">${histSection}</div>

    <!-- § 3 Component breakdown -->
    <div style="margin-top:10px">
      <div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--sc-t3);text-transform:uppercase;margin-bottom:8px">
        Component Breakdown · ${selPairId}
      </div>
      <div class="fx-comp-grid">${compMinis}</div>
    </div>

    <!-- § 4 Currency ranking -->
    <div style="margin-top:10px">
      <div class="sc-ranking-card">
        <div class="sc-ranking-hd">
          Currency Strength Ranking
          <span id="sc-ccy-ranking-badge" style="font-size:9px;color:var(--sc-t3);font-weight:500">
            * = base · · = quote
          </span>
        </div>
        <div id="sc-ccy-ranking">${rankRows}</div>
      </div>
    </div>

    <div style="margin-top:10px;padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:6px;font-size:10px;color:var(--sc-t3);line-height:1.7">
      Scores derived from COT (CFTC), retail sentiment (Myfxbook), economic data (FRED), Put/Call and AAII.
      Auto-refreshes every 5 min. Not financial advice.
    </div>
  </div>`;

  updateForexUI(pairs, ccyScores);
}

// ═══════════════════════════════════════════════════════════════════════════
//  AUTOMATIC DATA PIPELINE — EdgeFinder FX Scorecard
//  Rules: no changes to scoring, UI, or existing data structures.
//  Adds: per-source scheduling, caching, stale detection, event triggers.
// ═══════════════════════════════════════════════════════════════════════════

// ── PIPELINE CACHE ────────────────────────────────────────────────────────
// All cache entries: { data, ts, source, stale }
// Keys: 'cot' | 'econ' | 'sentiment' | 'rates' | 'feargreed' | 'putcall'
const DP_CACHE = {};

// Cache TTLs in milliseconds
const DP_TTL = {
  rates:      5  * 60 * 1000,    //  5 min  — Frankfurter FX rates
  feargreed:  15 * 60 * 1000,    // 15 min  — Alternative.me F&G
  sentiment:  3  * 60 * 60 * 1000, // 3 hr  — Myfxbook community outlook
  cot:        12 * 60 * 60 * 1000, // 12 hr  — CFTC (released Fri, cached)
  econ:       6  * 60 * 60 * 1000, // 6 hr   — FRED (releases are infrequent)
  putcall:    60 * 60 * 1000,     //  1 hr  — CBOE put/call
};

// Check if cache entry is still valid
function dpCacheValid(key) {
  const e = DP_CACHE[key];
  if (!e || !e.ts || !e.data) return false;
  return (Date.now() - e.ts) < (DP_TTL[key] || 0);
}

// Write a cache entry with metadata
function dpCacheSet(key, data, source) {
  DP_CACHE[key] = { data, ts: Date.now(), source, stale: false };
  // Also persist lightweight metadata to localStorage for next boot
  try {
    localStorage.setItem('ef_dp_ts_' + key, String(Date.now()));
    localStorage.setItem('ef_dp_src_' + key, source);
  } catch(e) {}
}

// Mark a key as stale without clearing data (data stays, freshness degrades)
function dpMarkStale(key) {
  if (DP_CACHE[key]) DP_CACHE[key].stale = true;
}

// Return data freshness label for UI display
function dpFreshness(key) {
  const e = DP_CACHE[key];
  if (!e || !e.ts) return { label: 'No data', color: '#8b949e' };
  const age = (Date.now() - e.ts) / 1000;
  if (e.stale)          return { label: 'Stale',    color: '#e05c6a' };
  if (age < 300)        return { label: 'Live',     color: '#00ff88' };
  if (age < 3600)       return { label: Math.round(age/60)+'m ago',  color: '#4a90d9' };
  if (age < 86400)      return { label: Math.round(age/3600)+'h ago', color: '#f0b429' };
  return { label: Math.round(age/86400)+'d ago', color: '#e05c6a' };
}

// ── PIPELINE STATE ────────────────────────────────────────────────────────
// Tracks per-source last-fetch timestamp and in-flight guard
const DP_STATE = {
  rates_running:     false,
  sentiment_running: false,
  cot_running:       false,
  econ_running:      false,
  feargreed_running: false,
  putcall_running:   false,
  // Next scheduled fetch for each source (epoch ms)
  rates_next:     0,
  sentiment_next: 0,
  cot_next:       0,
  econ_next:      0,
  feargreed_next: 0,
  putcall_next:   0,
};

// ── ENGINE TRIGGER ────────────────────────────────────────────────────────
// After any data source updates, call this to rerun the FX scoring engine
// and patch only the active tab DOM.
function dpTriggerEngine(sourceKey) {
  // Debounce: multiple rapid updates collapse into one engine run
  if (dpTriggerEngine._timer) clearTimeout(dpTriggerEngine._timer);
  dpTriggerEngine._timer = setTimeout(async () => {
    try {
      await runEngine();
    } catch(e) {
      console.warn('[DP] Engine trigger failed:', e.message);
    }
  }, 400);
}
dpTriggerEngine._timer = null;

// ── SOURCE 1: FX RATES (Frankfurter) — every 5 min ───────────────────────
async function dpFetchRates() {
  if (DP_STATE.rates_running || dpCacheValid('rates')) return;
  DP_STATE.rates_running = true;
  try {
    const [cur, prev] = await Promise.allSettled([fetchRates(), fetchPrev()]);
    if (cur.status === 'fulfilled' && cur.value) {
      state.rates     = cur.value;
      state.cdata     = buildStrength(cur.value);
      dpCacheSet('rates', cur.value, 'Frankfurter');
    } else {
      dpMarkStale('rates');
    }
    if (prev.status === 'fulfilled' && prev.value) {
      state.prevRates = prev.value;
    }
    DP_STATE.rates_next = Date.now() + DP_TTL.rates;
    dpTriggerEngine('rates');
  } catch(e) {
    console.warn('[DP] Rates fetch failed:', e.message);
    dpMarkStale('rates');
  } finally {
    DP_STATE.rates_running = false;
  }
}

// ── SOURCE 2: FEAR & GREED — every 15 min ────────────────────────────────
async function dpFetchFearGreed() {
  if (DP_STATE.feargreed_running || dpCacheValid('feargreed')) return;
  DP_STATE.feargreed_running = true;
  try {
    const data = await fetchFearGreed();
    if (data && data.length) {
      state.fgData = data;
      state.fgLive = true;
      dpCacheSet('feargreed', data, 'alternative.me');
      DP_STATE.feargreed_next = Date.now() + DP_TTL.feargreed;
      dpTriggerEngine('feargreed');
    }
  } catch(e) {
    console.warn('[DP] Fear/Greed fetch failed:', e.message);
    dpMarkStale('feargreed');
    state.fgLive = false;
  } finally {
    DP_STATE.feargreed_running = false;
  }
}

// ── SOURCE 3: RETAIL SENTIMENT (Myfxbook) — every 3 hr ───────────────────
async function dpFetchSentiment() {
  if (DP_STATE.sentiment_running) return;
  if (dpCacheValid('sentiment') && state.sentimentLive) return;
  if (!state.mfxEmail || !state.mfxPassword) return;  // no credentials = skip silently
  DP_STATE.sentiment_running = true;
  const timeout = setTimeout(() => {
    DP_STATE.sentiment_running = false;
    dpMarkStale('sentiment');
  }, 18000);  // 18s hard timeout
  try {
    const symbols = await fetchMyfxbookSentiment();
    clearTimeout(timeout);
    if (symbols && symbols.length) {
      state.sentimentData = symbols.map(s => ({
        name:            s.name,
        longPercentage:  parseFloat(s.longPercentage),
        shortPercentage: parseFloat(s.shortPercentage),
        longVolume:      parseInt(s.longVolume)    || 0,
        shortVolume:     parseInt(s.shortVolume)   || 0,
        longPositions:   parseInt(s.longPositions) || 0,
        shortPositions:  parseInt(s.shortPositions)|| 0,
      }));
      state.sentimentLive    = true;
      state.sentimentLoading = false;
      dpCacheSet('sentiment', state.sentimentData, 'Myfxbook');
      DP_STATE.sentiment_next = Date.now() + DP_TTL.sentiment;
      // Patch sentiment tab if open
      if (activeTab === 'sentiment') renderSentiment();
      dpTriggerEngine('sentiment');
    }
  } catch(e) {
    clearTimeout(timeout);
    console.warn('[DP] Myfxbook sentiment failed:', e.message);
    state.sentimentLive    = false;
    state.sentimentLoading = false;
    dpMarkStale('sentiment');
  } finally {
    DP_STATE.sentiment_running = false;
  }
}

// ── SOURCE 4: COT (CFTC) — every 12 hr ───────────────────────────────────
async function dpFetchCOT() {
  if (DP_STATE.cot_running || dpCacheValid('cot')) return;
  // Extra guard: CFTC data only changes once/week — skip if we fetched today
  const lastFetchDay = localStorage.getItem('ef_dp_cot_day');
  const today = new Date().toISOString().split('T')[0];
  if (lastFetchDay === today && state.cotLive && state.cotData && state.cotData.length) {
    // Refresh cache TTL so subsequent calls skip too
    if (!DP_CACHE.cot) dpCacheSet('cot', state.cotData, 'CFTC');
    return;
  }
  DP_STATE.cot_running = true;
  try {
    const rows = await fetchCFTCData();
    if (rows && rows.length) {
      state.cotData       = rows;
      state.cotLive       = true;
      state.cotLastUpdate = Date.now();
      dpCacheSet('cot', rows, 'CFTC');
      localStorage.setItem('ef_dp_cot_day', today);
      DP_STATE.cot_next = Date.now() + DP_TTL.cot;
      if (activeTab === 'cot') renderCOT();
      dpTriggerEngine('cot');  // event: COT → institutional component updated
    }
  } catch(e) {
    console.warn('[DP] CFTC COT fetch failed:', e.message);
    state.cotLive = false;
    dpMarkStale('cot');
  } finally {
    DP_STATE.cot_running = false;
  }
}

// ── SOURCE 5: ECONOMIC DATA (FRED) — every 6 hr ──────────────────────────
// Event-driven components: GDP → growth, CPI → inflation, NFP → labor, Rate → MP
async function dpFetchEcon() {
  if (DP_STATE.econ_running || dpCacheValid('econ')) return;
  if (!state.fredKey) return;  // no API key = skip silently
  DP_STATE.econ_running = true;
  try {
    const data = await fetchFREDEcon(state.fredKey);
    if (data) {
      state.econData    = data;
      state.econLive    = true;
      state.econLoading = false;
      dpCacheSet('econ', data, 'FRED');
      DP_STATE.econ_next = Date.now() + DP_TTL.econ;
      if (activeTab === 'econ') renderEcon();
      // Event dispatch: which components changed?
      // CPI → inflation, GDP → growth, Unemploy → labor, Rate → monetaryPolicy
      dpTriggerEngine('econ');
    }
  } catch(e) {
    console.warn('[DP] FRED econ fetch failed:', e.message);
    state.econLive    = false;
    state.econLoading = false;
    dpMarkStale('econ');
    // Fallback: keep existing state.econData (already FALLBACK_ECON)
  } finally {
    DP_STATE.econ_running = false;
  }
}

// ── SOURCE 6: PUT/CALL (CBOE proxy) — every 1 hr ─────────────────────────
async function dpFetchPutCall() {
  if (DP_STATE.putcall_running || dpCacheValid('putcall')) return;
  DP_STATE.putcall_running = true;
  try {
    const data = await fetchPutCall();  // existing function
    if (data && data.length) {
      state.putCallData = data;
      state.putCallLive = true;
      dpCacheSet('putcall', data, 'CBOE');
      DP_STATE.putcall_next = Date.now() + DP_TTL.putcall;
      dpTriggerEngine('putcall');
    }
  } catch(e) {
    console.warn('[DP] Put/call fetch failed:', e.message);
    state.putCallLive = false;
    dpMarkStale('putcall');
  } finally {
    DP_STATE.putcall_running = false;
  }
}

// ── CENTRAL BANK RATE UPDATER ─────────────────────────────────────────────
// Reads FRED rate series for USD/EUR/GBP/JPY and patches FX_CB_DATA.
// Only runs if FRED key is set; non-blocking.
async function dpUpdateCBRates() {
  if (!state.fredKey) return;
  const rateSeriesMap = {
    USD: { id: 'FEDFUNDS',   label: 'Fed Rate' },
    EUR: { id: 'ECBDFR',     label: 'ECB Rate' },
    GBP: { id: 'IUDSOIA',    label: 'BoE Rate' },
    JPY: { id: 'IRSTJPN156N',label: 'BoJ Rate' },
  };
  for (const [ccy, series] of Object.entries(rateSeriesMap)) {
    try {
      const obs = await fredFetch(series.id, state.fredKey, 3);
      if (!obs || !obs.length) continue;
      const latest = parseFloat(obs[0].value);
      const prev   = obs.length >= 2 ? parseFloat(obs[1].value) : latest;
      if (isNaN(latest)) continue;
      // Update FX_CB_DATA rate level
      if (FX_CB_DATA[ccy]) {
        FX_CB_DATA[ccy].rate  = latest;
        // Derive trend: if latest > prev (last obs) = hiking (+1), else cutting (-1)
        if (!isNaN(prev) && Math.abs(latest - prev) > 0.01) {
          FX_CB_DATA[ccy].trend = latest > prev ? 1 : -1;
        }
        // Derive stance from trend + differential context
        const avgRate = Object.values(FX_CB_DATA).reduce((s,c) => s + c.rate, 0) /
                        Object.keys(FX_CB_DATA).length;
        const diff    = latest - avgRate;
        if (FX_CB_DATA[ccy].trend === 1)  FX_CB_DATA[ccy].stance = 1;
        else if (FX_CB_DATA[ccy].trend === -1) FX_CB_DATA[ccy].stance = -1;
        // Update label
        FX_CB_DATA[ccy].label = FX_CB_DATA[ccy].trend === 1  ? 'Hiking'
                              : FX_CB_DATA[ccy].trend === -1 ? 'Cutting' : 'Hold';
      }
      await new Promise(r => setTimeout(r, 200));  // FRED rate limit: 5 req/s
    } catch(e) {
      // Silent fallback — FX_CB_DATA retains static values
    }
  }
  // Trigger engine after all rates updated
  dpTriggerEngine('cb_rates');
}

// ── STALE DATA MONITOR ────────────────────────────────────────────────────
// Runs every 2 min; marks entries stale if TTL exceeded
function dpStaleScan() {
  for (const key of Object.keys(DP_TTL)) {
    const e = DP_CACHE[key];
    if (e && e.ts && !e.stale) {
      const ttl = DP_TTL[key];
      if ((Date.now() - e.ts) > ttl * 2) {  // 2× TTL = stale
        dpMarkStale(key);
      }
    }
  }
}

// ── SCHEDULER ────────────────────────────────────────────────────────────
// Single polling loop — checks each source against its own TTL.
// Avoids multiple setInterval timers; runs every 60 seconds.
async function dpScheduler() {
  const now = Date.now();

  // Rates: every 5 min
  if (now >= DP_STATE.rates_next)     dpFetchRates();
  // Fear/Greed: every 15 min
  if (now >= DP_STATE.feargreed_next) dpFetchFearGreed();
  // Sentiment: every 3 hr
  if (now >= DP_STATE.sentiment_next) dpFetchSentiment();
  // COT: every 12 hr
  if (now >= DP_STATE.cot_next)       dpFetchCOT();
  // Econ/FRED: every 6 hr
  if (now >= DP_STATE.econ_next)      dpFetchEcon();
  // Put/Call: every 1 hr
  if (now >= DP_STATE.putcall_next)   dpFetchPutCall();
  // Stale scan: every run
  dpStaleScan();
}

// ── INITIAL PIPELINE LOAD ────────────────────────────────────────────────
// Called once at boot. Fetches all sources in priority order.
// Scoring engine is triggered automatically as each source resolves.
async function dpBootLoad() {
  // Priority 1: Rates (needed for technical + any price logic)
  await dpFetchRates().catch(() => {});
  // Priority 2: Trigger engine with whatever state we have
  dpTriggerEngine('boot');
  // Priority 3: Background fetches (non-blocking from here)
  Promise.allSettled([
    dpFetchFearGreed(),
    dpFetchCOT(),
    dpFetchPutCall(),
  ]);
  // Priority 4: Econ is slowest (many FRED series)
  setTimeout(() => dpFetchEcon(), 1500);
  // Priority 5: Myfxbook (may fail — credentials required)
  setTimeout(() => dpFetchSentiment(), 2000);
  // Priority 6: CB rates patch (FRED sub-queries)
  setTimeout(() => dpUpdateCBRates(), 8000);
}

// Expose freshness helper to renderForexScorecard / status bars
window.dpFreshness = dpFreshness;

// ── BOOT ──────────────────────────────────────────────────────────────────────
initTabs();
renderActive();
refreshAll();
setInterval(refreshAll, 15*60*1000);
// Scorecard engine — runs after refreshAll has populated state, then every 5 min
setTimeout(runEngine, 2000);
setInterval(runEngine, 5*60*1000);
// ── DATA PIPELINE — automatic fetch + schedule ────────────────────────────────
dpBootLoad();                          // immediate priority load
setInterval(dpScheduler, 60*1000);    // scheduler tick: every 60 s
</script>
