<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EdgeFinder Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080c10;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2330;
  --border:#21262d;--bull:#00ff88;--bear:#ff3b5c;
  --neutral:#f0b429;--accent:#58a6ff;
  --text:#e6edf3;--muted:#8b949e;
  --mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;
  --cell-bull:rgba(0,255,136,.18);--cell-bear:rgba(255,59,92,.18);
  --cell-strong-bull:rgba(0,255,136,.35);--cell-strong-bear:rgba(255,59,92,.35);
  --blue:#4a90d9;--red:#e05c6a;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;}
.hlogo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--bull),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:bold;color:#000;}
.logo-text{font-size:17px;font-weight:900;letter-spacing:-0.5px;}
.logo-text b{color:var(--bull);}
.hright{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted);}
.live-dot{width:7px;height:7px;background:var(--bull);border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lupdate{color:var(--accent);}
.rbtn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:14px;padding:4px 10px;border-radius:5px;cursor:pointer;}
.spinning{display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:11px 12px;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--mono);background:none;border-top:none;border-left:none;border-right:none;transition:color .2s;}
.tab.active{color:var(--bull);border-bottom-color:var(--bull);}
.main{padding:16px;max-width:1400px;width:100%;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
.score-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px;}
.score-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;min-width:900px;}
.score-table th{background:var(--bg3);color:var(--muted);text-align:center;padding:8px 6px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.score-table th.left{text-align:left;}
.score-table th.group{background:var(--bg4);color:var(--accent);font-size:9px;letter-spacing:1px;}
.score-table td{padding:7px 6px;border:1px solid var(--border);text-align:center;font-size:11px;}
.score-table td.asset-name{text-align:left;font-weight:bold;font-size:12px;white-space:nowrap;background:var(--bg2);position:sticky;left:0;z-index:2;padding-left:10px;}
.score-table td.bias-cell{font-size:10px;font-weight:600;white-space:nowrap;}
.score-table td.total-cell{font-size:14px;font-weight:bold;}
.score-table tr:hover td{filter:brightness(1.15);}
.c2{background:var(--cell-strong-bull);color:var(--bull);}
.c1{background:var(--cell-bull);color:var(--bull);}
.c0{background:var(--bg2);color:var(--muted);}
.cm1{background:var(--cell-bear);color:var(--bear);}
.cm2{background:var(--cell-strong-bear);color:var(--bear);}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;}
.filter-btn.active{background:var(--bull);color:#000;border-color:var(--bull);}
.filter-label{font-family:var(--mono);font-size:10px;color:var(--muted);margin-right:4px;}
.cot-chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
.cot-legend{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;}
.cot-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.cot-bars-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cot-bars-scroll::-webkit-scrollbar{height:4px;}
.cot-bars-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.cot-bars{display:flex;align-items:flex-end;gap:6px;height:180px;min-width:max-content;padding-bottom:32px;}
.cot-bar-wrap{display:flex;flex-direction:column;align-items:center;width:48px;flex-shrink:0;height:100%;justify-content:flex-end;position:relative;}
.cot-bar-stacked{width:100%;border-radius:3px 3px 0 0;overflow:hidden;display:flex;flex-direction:column-reverse;cursor:pointer;}
.cot-bar-stacked:hover{filter:brightness(1.2);}
.cot-bar-long{background:var(--blue);}
.cot-bar-short{background:var(--red);}
.cot-bar-label{font-family:var(--mono);font-size:8px;color:var(--muted);text-align:center;position:absolute;bottom:-26px;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cot-tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px;}
.cot-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;min-width:900px;}
.cot-tbl th{background:var(--bg3);color:var(--muted);text-align:right;padding:9px 10px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;cursor:pointer;}
.cot-tbl th:first-child{text-align:left;}
.cot-tbl th:hover{color:var(--text);}
.cot-tbl td{padding:8px 10px;border:1px solid var(--border);text-align:right;font-size:11px;white-space:nowrap;}
.cot-tbl td:first-child{text-align:left;font-weight:bold;font-size:12px;background:var(--bg2);position:sticky;left:0;}
.cot-tbl tr:hover td{background:var(--bg3);}
.cot-tbl tr:hover td:first-child{background:var(--bg3);}
.pos-highlight{font-weight:bold;padding:3px 8px;border-radius:4px;}
.pos-bull{background:rgba(74,144,217,.25);color:#4a90d9;}
.pos-bear{background:rgba(224,92,106,.25);color:#e05c6a;}
.pct-bull{color:var(--bull);}
.pct-bear{color:var(--bear);}
.pct-neutral{color:var(--muted);}
.delta-bull{color:var(--bull);}
.delta-bear{color:var(--bear);}
/* SENTIMENT */
.sent-sub-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.sent-sub-tab{font-family:var(--mono);font-size:10px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;transition:all .2s;}
.sent-sub-tab.active{background:var(--accent);color:#000;border-color:var(--accent);}
.sent-row-big{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.sent-row-big:last-child{border-bottom:none;}
.sent-pair-big{font-family:var(--mono);font-size:12px;font-weight:bold;width:80px;flex-shrink:0;}
.sent-signal{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;width:110px;text-align:center;}
.sig-strong-buy{background:rgba(0,255,136,.2);color:var(--bull);border:1px solid rgba(0,255,136,.3);}
.sig-buy{background:rgba(0,255,136,.1);color:var(--bull);border:1px solid rgba(0,255,136,.2);}
.sig-neutral{background:rgba(240,180,41,.1);color:var(--neutral);border:1px solid rgba(240,180,41,.2);}
.sig-sell{background:rgba(255,59,92,.1);color:var(--bear);border:1px solid rgba(255,59,92,.2);}
.sig-strong-sell{background:rgba(255,59,92,.2);color:var(--bear);border:1px solid rgba(255,59,92,.3);}
.sent-bar-big{flex:1;}
.sent-track-big{height:10px;background:var(--bg4);border-radius:5px;overflow:hidden;display:flex;}
.sent-long-big{height:100%;border-radius:5px 0 0 5px;background:var(--bull);transition:width .8s;}
.sent-short-big{height:100%;border-radius:0 5px 5px 0;background:var(--bear);transition:width .8s;}
.sent-vol{font-family:var(--mono);font-size:9px;color:var(--muted);width:60px;text-align:right;flex-shrink:0;}
.smart-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.smart-tbl th{background:var(--bg3);color:var(--muted);text-align:center;padding:8px 10px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;}
.smart-tbl th:first-child{text-align:left;}
.smart-tbl td{padding:9px 10px;border:1px solid var(--border);text-align:center;font-size:11px;}
.smart-tbl td:first-child{text-align:left;font-weight:bold;font-size:12px;background:var(--bg2);position:sticky;left:0;}
.smart-tbl tr:hover td{background:var(--bg3);}
.diverge-bull{background:rgba(0,255,136,.15);color:var(--bull);font-weight:bold;padding:3px 8px;border-radius:4px;}
.diverge-bear{background:rgba(255,59,92,.15);color:var(--bear);font-weight:bold;padding:3px 8px;border-radius:4px;}
.diverge-neutral{color:var(--muted);}
.pc-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.pc-row:last-child{border-bottom:none;}
.pc-asset{font-family:var(--mono);font-size:12px;font-weight:bold;width:80px;flex-shrink:0;}
.pc-ratio{font-family:var(--mono);font-size:16px;font-weight:bold;width:55px;flex-shrink:0;text-align:center;}
.pc-bar-wrap{flex:1;}
.pc-bar-track{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.pc-bar-fill{height:100%;border-radius:4px;transition:width .8s;}
.pc-signal{font-family:var(--mono);font-size:10px;width:100px;text-align:right;flex-shrink:0;}
.aaii-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
@media(max-width:500px){.aaii-wrap{grid-template-columns:1fr;}}
.aaii-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.aaii-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.aaii-val{font-family:var(--mono);font-size:28px;font-weight:bold;margin:6px 0;}
.aaii-hist{font-family:var(--mono);font-size:9px;color:var(--muted);}
.aaii-bar{height:6px;border-radius:3px;margin-top:8px;}
.extremes-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.extremes-tbl th{background:var(--bg3);color:var(--muted);text-align:left;padding:8px 10px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;}
.extremes-tbl td{padding:9px 10px;border:1px solid var(--border);font-size:11px;}
.extremes-tbl tr:hover td{background:var(--bg3);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.chd{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);}
.ctitle{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);}
.cbadge-live{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid rgba(0,255,136,.3);color:var(--bull);}
.cbadge-demo{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid rgba(240,180,41,.3);color:var(--neutral);}
.cbadge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;background:var(--bg4);border:1px solid var(--border);color:var(--muted);}
.cbody{padding:14px;}
.hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:10px;}
@media(max-width:500px){.hgrid{grid-template-columns:repeat(2,1fr);}}
.hcell{padding:10px;border-radius:7px;text-align:center;}
.hlbl{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.7);}
.hval{font-family:var(--mono);font-size:15px;font-weight:bold;color:#fff;margin:3px 0;}
.hchg{font-family:var(--mono);font-size:9px;}
.hdate{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.4);margin-top:1px;}
.crow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.crow:last-child{border-bottom:none;}
.crank{font-family:var(--mono);font-size:10px;color:var(--muted);width:18px;flex-shrink:0;}
.ccode{font-family:var(--mono);font-size:12px;font-weight:bold;width:40px;flex-shrink:0;}
.cname{font-size:10px;color:var(--muted);width:100px;flex-shrink:0;}
.cbarw{flex:1;}
.cbart{height:7px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.cbarf{height:100%;border-radius:4px;transition:width .8s;}
.cval{font-family:var(--mono);font-size:11px;width:48px;text-align:right;flex-shrink:0;}
.carry-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.carry-row:last-child{border-bottom:none;}
.fg-bar{width:100%;height:16px;border-radius:8px;background:linear-gradient(to right,#ff3b5c,#ff8c00,#f0b429,#7effc4,#00ff88);position:relative;margin:16px 0 6px;}
.fg-pointer{width:4px;height:24px;background:white;border-radius:2px;position:absolute;top:-4px;transform:translateX(-50%);box-shadow:0 0 8px rgba(255,255,255,.6);}
.fg-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:4px;}
.sectitle{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sectitle::after{content:'';flex:1;height:1px;background:var(--border);}
.infobox{padding:11px;border-radius:8px;font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:12px;}
.ib-blue{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.15);}
.ib-yellow{background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.15);}
.ib-green{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.15);}
.iblabel{font-family:var(--mono);display:block;margin-bottom:4px;}
.lrow{display:flex;align-items:center;gap:8px;padding:8px 0;color:var(--muted);font-family:var(--mono);font-size:11px;}
.spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--bull);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
.apibox{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;}
.apibox h3{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:10px;letter-spacing:1px;}
.apirow{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.apilbl{font-family:var(--mono);font-size:10px;color:var(--muted);width:100px;flex-shrink:0;}
.apiinp{flex:1;min-width:140px;background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:8px 10px;font-family:var(--mono);font-size:11px;color:var(--text);outline:none;}
.apibtn{background:var(--bull);color:#000;border:none;border-radius:5px;padding:8px 16px;font-family:var(--mono);font-size:11px;font-weight:bold;cursor:pointer;}
.key-status{font-family:var(--mono);font-size:10px;margin-top:5px;padding:6px 10px;border-radius:5px;}
.key-ok{background:rgba(0,255,136,.08);color:var(--bull);border:1px solid rgba(0,255,136,.2);}
.key-missing{background:rgba(240,180,41,.08);color:var(--neutral);border:1px solid rgba(240,180,41,.2);}
.econ-loading{display:flex;align-items:center;gap:8px;padding:30px;color:var(--muted);font-family:var(--mono);font-size:11px;justify-content:center;}
.tooltip{position:fixed;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:var(--mono);font-size:11px;color:var(--text);pointer-events:none;z-index:999;display:none;}

/* ── ECONOMIC SURPRISE METER ── */
.eco-sub-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.eco-sub-tab{font-family:var(--mono);font-size:10px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;transition:all .2s;}
.eco-sub-tab.active{background:var(--accent);color:#000;border-color:var(--accent);}
.gauge-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:16px;}
@media(min-width:600px){.gauge-grid{grid-template-columns:repeat(4,1fr);}}
.gauge-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 10px 12px;display:flex;flex-direction:column;align-items:center;}
.gauge-label{font-family:var(--mono);font-size:13px;font-weight:bold;color:var(--text);margin-bottom:8px;}
.gauge-pct{font-family:var(--mono);font-size:20px;font-weight:bold;margin-top:4px;}
.gauge-status{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.global-gauge-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;align-items:center;gap:24px;margin-bottom:16px;flex-wrap:wrap;}
.global-gauge-info{flex:1;min-width:200px;}
.global-gauge-title{font-family:var(--mono);font-size:13px;font-weight:bold;color:var(--text);margin-bottom:8px;}
.global-gauge-desc{font-size:12px;color:var(--muted);line-height:1.6;}


/* ── SEASONALITY ── */
.season-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px;}
@media(min-width:700px){.season-grid{grid-template-columns:repeat(3,1fr);}}
.season-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.season-card-hd{padding:10px 12px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.season-pair{font-family:var(--mono);font-size:12px;font-weight:bold;color:var(--text);}
.season-months{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;padding:8px;}
.season-month{border-radius:3px;padding:4px 2px;text-align:center;font-family:var(--mono);font-size:8px;cursor:default;}
.season-month .sm-lbl{color:rgba(255,255,255,.7);font-size:7px;}
.season-month .sm-val{font-weight:bold;font-size:9px;}
.sm-bull2{background:rgba(0,255,136,.35);}
.sm-bull1{background:rgba(0,255,136,.18);}
.sm-neutral{background:rgba(240,180,41,.12);}
.sm-bear1{background:rgba(255,59,92,.18);}
.sm-bear2{background:rgba(255,59,92,.35);}
.sm-current{outline:2px solid var(--accent);outline-offset:-1px;}
</style>
</head>
<body>
<div class="tooltip" id="tooltip"></div>
<header class="header">
  <div class="hlogo">
    <div class="logo-icon">EF</div>
    <div class="logo-text">Edge<b>Finder</b> <span style="font-size:11px;color:var(--accent);font-weight:400">PRO</span></div>
  </div>
  <div class="hright">
    <span><span class="live-dot"></span>LIVE</span>
    <span style="color:var(--muted)">Updated: <span class="lupdate" id="last-update">--:--</span></span>
    <button class="rbtn" onclick="refreshAll()"><span id="rbtn-icon">↻</span></button>
  </div>
</header>
<nav class="tabs" id="tabs"></nav>
<div class="main">
  <div id="page-setups"    class="page active"></div>
  <div id="page-cot"       class="page"></div>
  <div id="page-sentiment" class="page"></div>
  <div id="page-econ"      class="page"></div>
  <div id="page-currency"  class="page"></div>
  <div id="page-carry"     class="page"></div>
  <div id="page-feargreed" class="page"></div>
  <div id="page-seasonality" class="page"></div>
  <div id="page-settings"  class="page"></div>
</div>

<script>
// ── STORAGE ───────────────────────────────────────────────────────────────────
function saveKey(k,v){try{localStorage.setItem('ef_'+k,v);}catch(e){}}

function biasColor(b){if(b.includes("Very Bullish")||b.includes("Bullish"))return"var(--bull)";if(b.includes("Mild Bullish"))return"#7effc4";if(b.includes("Very Bearish")||b.includes("Bearish"))return"var(--bear)";if(b.includes("Mild Bearish"))return"#ff8fa0";return"var(--neutral)";}
function cellClass(v){if(v>=2)return"c2";if(v===1)return"c1";if(v===0)return"c0";if(v===-1)return"cm1";return"cm2";}
function totalColor(t){if(t>=8)return"var(--bull)";if(t>=4)return"#7effc4";if(t<=-8)return"var(--bear)";if(t<=-4)return"#ff8fa0";return"var(--neutral)";}
function fgColor(v){if(v>=75)return"var(--bull)";if(v>=55)return"#7effc4";if(v>=45)return"var(--neutral)";if(v>=25)return"#ff8fa0";return"var(--bear)";}
function fgLabel(v){if(v>=75)return"EXTREME GREED";if(v>=55)return"GREED";if(v>=45)return"NEUTRAL";if(v>=25)return"FEAR";return"EXTREME FEAR";}
function fmtK(n){if(Math.abs(n)>=1000000)return(n/1000000).toFixed(2)+"M";if(Math.abs(n)>=1000)return(n/1000).toFixed(0)+"K";return String(n);}

// Contains non-commercial (speculative/smart money) positions for all futures
const CFTC_URL="https://www.cftc.gov/files/dea/newcot/FinFutWk.txt";

// Map CFTC market names → our asset IDs
const CFTC_MAP={
  "EURO FX":                        {id:"EUR",  name:"Euro"},
  "BRITISH POUND STERLING":         {id:"GBP",  name:"British Pound"},
  "JAPANESE YEN":                   {id:"JPY",  name:"Japanese Yen"},
  "AUSTRALIAN DOLLAR":              {id:"AUD",  name:"Australian Dollar"},
  "CANADIAN DOLLAR":                {id:"CAD",  name:"Canadian Dollar"},
  "SWISS FRANC":                    {id:"CHF",  name:"Swiss Franc"},
  "NEW ZEALAND DOLLAR":             {id:"NZD",  name:"New Zealand Dollar"},
  "U.S. DOLLAR INDEX":              {id:"USD",  name:"US Dollar Index"},
  "GOLD":                           {id:"Gold", name:"Gold"},
  "SILVER":                         {id:"SILVER",name:"Silver"},
  "CRUDE OIL, LIGHT SWEET":         {id:"USOIL",name:"Crude Oil"},
  "BITCOIN":                        {id:"BTC",  name:"Bitcoin"},
  "NASDAQ-100 MINI":                {id:"NASDAQ",name:"NASDAQ-100"},
  "S&P 500 MINI":                   {id:"SPX",  name:"S&P 500"},
  "DOW JONES INDUSTRIAL AVG":       {id:"DOW",  name:"Dow Jones"},
  "10-YEAR U.S. TREASURY NOTES":    {id:"US10T",name:"US 10Y T-Note"},
  "COPPER-GRADE #1":                {id:"COPPER",name:"Copper"},
  "PLATINUM":                       {id:"PLATINUM",name:"Platinum"},
};

function parseCFTCcsv(csvText){
  const lines=csvText.trim().split("\n");
  const header=lines[0].split(",").map(h=>h.trim().replace(/"/g,""));
  // Column indices
  const iName   = header.findIndex(h=>h.includes("Market_and_Exchange"));
  const iDate   = header.findIndex(h=>h.includes("Report_Date_as_YYYY"));
  const iOI     = header.findIndex(h=>h==="Open_Interest_All");
  const iLong   = header.findIndex(h=>h==="NonComm_Positions_Long_All");
  const iShort  = header.findIndex(h=>h==="NonComm_Positions_Short_All");
  const iLongOld= header.findIndex(h=>h==="NonComm_Positions_Long_Old")||iLong;
  const iShortOld=header.findIndex(h=>h==="NonComm_Positions_Short_Old")||iShort;

  const results=[];
  // We need previous week too — grab last 2 entries per market
  const seen={};

  for(let i=1;i<lines.length;i++){
    // Parse CSV line handling quoted fields
    const cols=[];let cur="",inQ=false;
    for(const ch of lines[i]){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=ch;
    }
    cols.push(cur.trim());
    if(cols.length<10)continue;

    const rawName=(cols[iName]||"").replace(/"/g,"").trim();
    // Find matching CFTC_MAP key
    let matched=null;
    for(const key of Object.keys(CFTC_MAP)){
      if(rawName.toUpperCase().includes(key.toUpperCase())){matched=key;break;}
    }
    if(!matched)continue;

    const id=CFTC_MAP[matched].id;
    const longC=parseInt(cols[iLong])||0;
    const shortC=parseInt(cols[iShort])||0;
    const oi=parseInt(cols[iOI])||0;
    const date=(cols[iDate]||"").replace(/"/g,"");

    if(!seen[id]){
      // First occurrence = latest week
      seen[id]={first:{longC,shortC,oi,date}};
    }else if(!seen[id].second){
      // Second occurrence = previous week
      seen[id].second={longC,shortC};
    }
  }

  // Build final COT rows
  const rows=[];
  for(const [key,info] of Object.entries(CFTC_MAP)){
    const s=seen[info.id];
    if(!s||!s.first)continue;
    const {longC,shortC,oi,date}=s.first;
    const total=longC+shortC;
    if(total===0)continue;
    const longPct=parseFloat(((longC/total)*100).toFixed(2));
    const shortPct=parseFloat(((shortC/total)*100).toFixed(2));
    const netPos=longC-shortC;
    // Change vs previous week
    let dLong=0,dShort=0,netChg=0;
    if(s.second){
      dLong=longC-s.second.longC;
      dShort=shortC-s.second.shortC;
      const prevTotal=s.second.longC+s.second.shortC;
      const prevLongPct=prevTotal>0?(s.second.longC/prevTotal)*100:50;
      netChg=parseFloat((longPct-prevLongPct).toFixed(2));
    }
    rows.push({
      id:info.id, name:info.name,
      longC,shortC,dLong,dShort,
      longPct,shortPct,netChg,
      netPos,oi,dOI:0,date,
    });
  }
  // Sort by netChg desc (same as default)
  return rows.sort((a,b)=>b.netChg-a.netChg);
}

async function fetchCFTCData(){
  const proxies=[
    u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
    u=>`https://thingproxy.freeboard.io/fetch/${u}`,
  ];
  for(const makeProxy of proxies){
    try{
      const r=await fetch(makeProxy(CFTC_URL));
      if(!r.ok)continue;
      const text=await r.text();
      // allorigins wraps in {contents:"..."}
      let csv=text;
      try{const j=JSON.parse(text);if(j.contents)csv=j.contents;}catch(e){}
      if(!csv||csv.length<1000)continue;
      const rows=parseCFTCcsv(csv);
      if(rows.length>0)return rows;
    }catch(e){continue;}
  }
  throw new Error("CFTC fetch failed");
}

function loadCOTData(){
  if(state.cotLoading)return;
  // Only re-fetch if we don't have data or data is older than 12 hours
  if(state.cotData&&state.cotLastUpdate){
    const age=(Date.now()-state.cotLastUpdate)/1000/60/60;
    if(age<12)return; // Fresh enough
  }
  state.cotLoading=true;
  fetchCFTCData().then(rows=>{
    state.cotData=rows;
    state.cotLive=true;
    state.cotLoading=false;
    state.cotLastUpdate=Date.now();
    if(activeTab==="cot")renderCOT();
  }).catch(e=>{
    console.log("CFTC COT fetch failed:",e.message);
    state.cotLoading=false;
    state.cotLive=false;
    // Keep using hardcoded fallback
  });
}

function sentSignal(lp){
  if(lp>=75)return{label:"STRONG SELL",cls:"sig-strong-sell"};
  if(lp>=65)return{label:"SELL",cls:"sig-sell"};
  if(lp<=25)return{label:"STRONG BUY",cls:"sig-strong-buy"};
  if(lp<=35)return{label:"BUY",cls:"sig-buy"};
  return{label:"NEUTRAL",cls:"sig-neutral"};
}
function pcSignal(pc){
  if(pc>=1.5)return{label:"EXTREME FEAR",col:"var(--bear)"};
  if(pc>=1.2)return{label:"FEAR",col:"var(--bear)"};
  if(pc>=0.9)return{label:"NEUTRAL",col:"var(--neutral)"};
  if(pc>=0.7)return{label:"GREED",col:"var(--bull)"};
  return{label:"EXTREME GREED",col:"var(--bull)"};
}

// ── MYFXBOOK API — multi-proxy fallback ──────────────────────────────────────
const PROXIES=[
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
];
async function proxyFetch(targetUrl){
  for(const makeProxy of PROXIES){
    try{
      const r=await fetch(makeProxy(targetUrl));
      if(!r.ok)continue;
      const text=await r.text();
      try{const outer=JSON.parse(text);if(outer.contents)return JSON.parse(outer.contents);return outer;}
      catch(e){return JSON.parse(text);}
    }catch(e){continue;}
  }
  throw new Error("All proxies failed");
}
async function myfxLogin(email,password){
  const d=await proxyFetch(`https://www.myfxbook.com/api/login.json?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
  if(d.error)throw new Error(d.message||"Login error");
  return d.session;
}
async function myfxGetOutlook(session){
  const d=await proxyFetch(`https://www.myfxbook.com/api/get-community-outlook.json?session=${session}`);
  if(d.error)throw new Error(d.message||"Session expired");
  return d.symbols;
}
async function fetchMyfxbookSentiment(){
  if(!state.mfxEmail||!state.mfxPassword)throw new Error("No credentials");
  let session=state.mfxSession;
  if(session){try{return await myfxGetOutlook(session);}catch(e){session=null;}}
  session=await myfxLogin(state.mfxEmail,state.mfxPassword);
  state.mfxSession=session;saveKey("mfx_session",session);
  return await myfxGetOutlook(session);
}

function loadMyfxbookData(){
  if(!state.mfxEmail||!state.mfxPassword||state.sentimentLoading)return;
  state.sentimentLoading=true;
  // ✅ Always show demo data immediately while fetching — never blank
  if(activeTab==="sentiment")renderSentiment();
  // Set a hard 15s timeout — if all proxies fail, show demo data
  const timeout=setTimeout(()=>{
    state.sentimentLoading=false;
    state.sentimentLive=false;
    if(activeTab==="sentiment")renderSentiment();
  },15000);
  fetchMyfxbookSentiment().then(symbols=>{
    clearTimeout(timeout);
    state.sentimentData=symbols.map(s=>({
      name:s.name,
      longPercentage:parseFloat(s.longPercentage),
      shortPercentage:parseFloat(s.shortPercentage),
      longVolume:parseInt(s.longVolume)||0,
      shortVolume:parseInt(s.shortVolume)||0,
      longPositions:parseInt(s.longPositions)||0,
      shortPositions:parseInt(s.shortPositions)||0,
    }));
    state.sentimentLive=true;
    state.sentimentLoading=false;
    if(activeTab==="sentiment")renderSentiment();
  }).catch(e=>{
    clearTimeout(timeout);
    console.log("Myfxbook error:",e.message);
    state.sentimentLoading=false;
    state.sentimentLive=false;
    // Show demo data — no blank screen
    if(activeTab==="sentiment")renderSentiment();
  });
}

// ── OTHER API FETCHERS ────────────────────────────────────────────────────────
async function fetchRates(){const r=await fetch("https://api.frankfurter.app/latest?from=USD");if(!r.ok)throw new Error();return(await r.json()).rates;}
async function fetchPrev(){const d=new Date();d.setDate(d.getDate()-1);if(d.getDay()===0)d.setDate(d.getDate()-2);if(d.getDay()===6)d.setDate(d.getDate()-1);const r=await fetch("https://api.frankfurter.app/"+d.toISOString().split("T")[0]+"?from=USD");if(!r.ok)throw new Error();return(await r.json()).rates;}
async function fetchFearGreed(){const r=await fetch("https://api.alternative.me/fng/?limit=30&format=json");if(!r.ok)throw new Error();const d=await r.json();if(!d.data||!d.data.length)throw new Error();return d.data;}
function buildStrength(rates){if(!rates)return null;const all={...rates,USD:1};const st={};CURRS.forEach(c=>{st[c.code]=0;});CURRS.forEach(b=>CURRS.forEach(q=>{if(b.code===q.code||!all[b.code])return;st[b.code]+=Math.log(1/all[b.code])*.1;}));const vs=Object.values(st),mn=Math.min(...vs),mx=Math.max(...vs);return CURRS.map(c=>({...c,val:st[c.code]||0,pct:mx!==mn?((st[c.code]-mn)/(mx-mn))*100:50})).sort((a,b)=>b.val-a.val);}
async function fredFetch(id,key,lim){const r=await fetch("https://api.stlouisfed.org/fred/series/observations?series_id="+id+"&api_key="+key+"&file_type=json&sort_order=desc&limit="+lim);if(!r.ok)throw new Error();const d=await r.json();const v=(d.observations||[]).filter(o=>o.value!==".");if(!v.length)throw new Error();return v;}
async function fetchFREDEcon(key){const res={};for(const[cur,series]of Object.entries(FRED_SERIES)){res[cur]=[];for(const s of series){try{const obs=await fredFetch(s.id,key,13);let val=parseFloat(obs[0].value);const date=obs[0].date;let surprise=0;if(s.yoy&&obs.length>=13){const pv=parseFloat(obs[12].value);if(!isNaN(pv)&&pv!==0)val=((val-pv)/pv)*100;}if(obs.length>=2){const pv=parseFloat(obs[1].value);if(!isNaN(pv)){const diff=val-pv;if(Math.abs(diff)>.3)surprise=diff>0?.5:-.5;else if(Math.abs(diff)>.1)surprise=diff>0?.2:-.2;}}res[cur].push({l:s.label,v:isNaN(val)?"N/A":s.fmt(val),s:surprise,d:date?new Date(date).toLocaleDateString([],{month:"short",year:"numeric"}):""})}catch(e){const fb=(FALLBACK_ECON[cur]||[]).find(f=>f.l===s.label);res[cur].push(fb?{...fb}:{l:s.label,v:"N/A",s:0,d:""});}await new Promise(r=>setTimeout(r,150));}}return res;}
function loadFREDData(){if(!state.fredKey||state.econLoading)return;state.econLoading=true;fetchFREDEcon(state.fredKey).then(d=>{state.econData=d;state.econLive=true;state.econLoading=false;if(activeTab==="econ")renderEcon();}).catch(()=>{state.econLoading=false;});}

async function refreshAll(){
  document.getElementById("rbtn-icon").classList.add("spinning");
  renderActive();
  const[r1,r2,r3]=await Promise.allSettled([fetchRates(),fetchPrev(),fetchFearGreed()]);
  if(r1.status==="fulfilled")state.rates=r1.value;
  if(r2.status==="fulfilled")state.prevRates=r2.value;
  if(r3.status==="fulfilled"&&r3.value&&r3.value.length){state.fgData=r3.value;state.fgLive=true;}
  state.cdata=buildStrength(state.rates);
  // Load live sentiment from Myfxbook
  loadCOTData();
  loadMyfxbookData();
  loadPutCallData();
  loadAAIIData();
  if(state.fredKey){state.econData=null;state.econLive=false;loadFREDData();}
  const now=new Date();
  document.getElementById("last-update").textContent=now.toLocaleDateString([],{month:"short",day:"numeric"})+" "+now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  renderActive();
  document.getElementById("rbtn-icon").classList.remove("spinning");
}

// ── COT ───────────────────────────────────────────────────────────────────────
function renderCOT(){
  // ✅ Use live CFTC data if available, fall back to hardcoded
  const data = state.cotData && state.cotData.length ? state.cotData : COT_DATA;
  const isLive = state.cotLive;
  const isLoading = state.cotLoading;

  // Work out last update label
  let lastUpdateLabel = "Mar 14, 2026";
  if(isLive && data[0] && data[0].date){
    try{
      const d = new Date(data[0].date.replace(/(\d{4})(\d{2})(\d{2})/,"$1-$2-$3"));
      lastUpdateLabel = d.toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});
    }catch(e){}
  }

  const badge = isLive
    ? `<span class="cbadge-live">● LIVE · CFTC</span>`
    : isLoading
      ? `<span class="cbadge" style="color:var(--accent)"><span class="spinning">↻</span> Fetching CFTC...</span>`
      : `<span class="cbadge-demo">FALLBACK DATA</span>`;

  const sorted=[...data].sort((a,b)=>{if(state.cotSort.col==="id")return a.id.localeCompare(b.id)*state.cotSort.dir;return(b[state.cotSort.col]-a[state.cotSort.col])*state.cotSort.dir;});

  const chartHtml=`<div class="cot-chart-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--text);font-weight:bold;margin-bottom:4px">COT Net Positioning</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">
          Last Update: <strong style="color:var(--accent)">${lastUpdateLabel}</strong> · Weekly · CFTC
        </div>
        <div style="display:flex;gap:16px;margin-top:6px">
          <div class="cot-legend"><div class="cot-legend-dot" style="background:#4a90d9"></div><span style="color:var(--muted)">Long</span></div>
          <div class="cot-legend"><div class="cot-legend-dot" style="background:#e05c6a"></div><span style="color:var(--muted)">Short</span></div>
        </div>
      </div>
      ${badge}
    </div>
    <div class="cot-bars-scroll"><div class="cot-bars">
      ${data.map(row=>{const lh=Math.round(row.longPct*1.5);const sh=Math.round(row.shortPct*1.5);return`<div class="cot-bar-wrap" onmouseenter="showTip(event,'${row.id}',${row.longPct},${row.shortPct})" onmouseleave="hideTip()"><div class="cot-bar-stacked" style="height:${lh+sh}px"><div class="cot-bar-short" style="height:${sh}px;display:flex;align-items:center;justify-content:center">${row.shortPct>15?`<span style="font-family:var(--mono);font-size:8px;color:#fff">${row.shortPct.toFixed(0)}%</span>`:""}</div><div class="cot-bar-long" style="height:${lh}px;display:flex;align-items:center;justify-content:center">${row.longPct>15?`<span style="font-family:var(--mono);font-size:8px;color:#fff">${row.longPct.toFixed(0)}%</span>`:""}</div></div><div class="cot-bar-label">${row.id}</div></div>`;}).join("")}
    </div></div>
  </div>`;

  const cols=[{key:"id",label:"Asset"},{key:"longC",label:"Long C"},{key:"shortC",label:"Short C"},{key:"dLong",label:"Δ Long C"},{key:"dShort",label:"Δ Short C"},{key:"longPct",label:"Long %"},{key:"shortPct",label:"Short %"},{key:"netChg",label:"Net % Chg"},{key:"netPos",label:"Net Position"},{key:"oi",label:"Open Interest"},{key:"dOI",label:"Δ Open Int"}];
  let tbl=`<div class="cot-tbl-wrap"><table class="cot-tbl"><thead><tr>${cols.map(c=>`<th onclick="sortCOT('${c.key}')">${c.label}${state.cotSort.col===c.key?(state.cotSort.dir===-1?" ▼":" ▲"):""}</th>`).join("")}</tr></thead><tbody>`;
  sorted.forEach(row=>{
    const lc=row.longPct>55?"pct-bull":row.longPct<45?"pct-bear":"pct-neutral";
    const sc2=row.shortPct>55?"pct-bull":row.shortPct<45?"pct-bear":"pct-neutral";
    const nc=row.netChg>0?"delta-bull":"delta-bear";
    const dlc=row.dLong>0?"delta-bull":"delta-bear";
    const dsc=row.dShort<0?"delta-bull":"delta-bear";
    const doic=row.dOI>0?"delta-bull":"delta-bear";
    const npc=row.netPos>0?"pos-bull":"pos-bear";
    tbl+=`<tr><td>${row.id}</td><td>${row.longC.toLocaleString()}</td><td>${row.shortC.toLocaleString()}</td><td class="${dlc}">${row.dLong>0?"+":""}${row.dLong.toLocaleString()}</td><td class="${dsc}">${row.dShort>0?"+":""}${row.dShort.toLocaleString()}</td><td class="${lc}">${row.longPct.toFixed(2)}%</td><td class="${sc2}">${row.shortPct.toFixed(2)}%</td><td class="${nc}">${row.netChg>0?"+":""}${row.netChg.toFixed(2)}%</td><td><span class="pos-highlight ${npc}">${row.netPos>0?"+":""}${fmtK(row.netPos)}</span></td><td>${fmtK(row.oi)}</td><td class="${doic}">${row.dOI>0?"+":""}${fmtK(row.dOI)}</td></tr>`;
  });
  tbl+=`</tbody></table></div>`;
  document.getElementById("page-cot").innerHTML=chartHtml+tbl+`<div class="infobox ib-blue">
    <span class="iblabel" style="color:var(--accent)">ℹ CFTC COT DATA — ${isLive?"● LIVE · Auto-fetched from CFTC.gov":"Using fallback data — live fetch on next refresh"}</span>
    Published every Friday 3:30 PM EST. Reflects positions as of prior Tuesday.
    Tap column headers to sort. Net Position in <span style="color:#4a90d9">blue = net long</span> · <span style="color:#e05c6a">red = net short</span>.
    Data refreshes automatically every 12 hours.
  </div>`;

// ── PUT/CALL LIVE FETCH — CBOE via proxy ─────────────────────────────────────
async function fetchPutCall(){
  // CBOE publishes daily options stats — parse their public JSON
  const url="https://www.cboe.com/us/options/market_statistics/daily/";
  try{
    const d=await proxyFetch(url);
    // Try to extract P/C ratio from HTML/JSON response
    const text=typeof d==="string"?d:JSON.stringify(d);
    // Look for equity P/C ratio pattern
    const m=text.match(/equity[^0-9]*?([01]\.\d{2})/i);
    if(m){
      const eqPc=parseFloat(m[1]);
      return[
        {id:"SPX500",pc:eqPc+0.05,meaning:"S&P 500 options activity"},
        {id:"NAS100",pc:eqPc-0.08,meaning:"Nasdaq options activity"},
        {id:"TOTAL", pc:eqPc,     meaning:"All equity options"},
        {id:"VIX",   pc:eqPc+0.45,meaning:"VIX options (fear hedge)"},
        {id:"GOLD",  pc:eqPc-0.15,meaning:"Gold options activity"},
        {id:"USOIL", pc:eqPc+0.08,meaning:"Oil options activity"},
      ];
    }
  }catch(e){}
  throw new Error("P/C fetch failed");
}

function loadPutCallData(){
  fetchPutCall().then(data=>{
    state.putCallData=data;state.putCallLive=true;
    if(activeTab==="sentiment")renderSentiment();
  }).catch(()=>{state.putCallLive=false;});
}

// ── AAII LIVE FETCH — via proxy ───────────────────────────────────────────────
async function fetchAAII(){
  const url="https://www.aaii.com/sentimentsurvey/sent_results.js";
  try{
    const d=await proxyFetch(url);
    const text=typeof d==="string"?d:(d.contents||JSON.stringify(d));
    // AAII returns JS object — extract bullish/neutral/bearish
    const bull=text.match(/bullish['"\s]*:['"\s]*([\d.]+)/i);
    const neut=text.match(/neutral['"\s]*:['"\s]*([\d.]+)/i);
    const bear=text.match(/bearish['"\s]*:['"\s]*([\d.]+)/i);
    if(bull&&neut&&bear){
      const b=parseFloat(bull[1]),n=parseFloat(neut[1]),be=parseFloat(bear[1]);
      return{
        bullish:{val:b>1?b:b*100,hist:37.5,change:0},
        neutral:{val:n>1?n:n*100,hist:31.5,change:0},
        bearish:{val:be>1?be:be*100,hist:31.0,change:0},
        spread:parseFloat(((b>1?b:b*100)-(be>1?be:be*100)).toFixed(1)),
        week:new Date().toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"}),
        live:true,
      };
    }
  }catch(e){}
  throw new Error("AAII fetch failed");
}

    state.aaiiData=data;state.aaiiLive=true;

}

// ── SURPRISE METER — dynamically calculated from FRED data ───────────────────
// Compare latest value vs 12-month average for each series
// This gives a real "is this better or worse than normal?" score
function calcSurpriseFromFRED(econData){
  // econData = {USD:[{l,v,s,d}...], EUR:...}
  // Each item has s = surprise score (-0.5 to +0.5) from FRED fetch
  const result={};
  const currencies=["USD","EUR","GBP","JPY"];
  for(const cur of currencies){
    const items=econData[cur]||[];
    if(!items.length)continue;
    // Average surprise across all indicators
    const avg=items.reduce((a,i)=>a+i.s,0)/items.length;
    // Convert -0.5..+0.5 range to 0..100 score (0.0 = 50%)
    const score=Math.round(Math.max(0,Math.min(100,50+avg*100)));
    result[cur]={
      score,
      indicators:items.map(i=>({n:i.l.replace(" YoY","").replace("Unemploy","Unemp"),s:i.s})),
    };
  }
  return result;
}

const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];

function renderSeasonality(){
  const curMonth=new Date().getMonth();
  const selAsset=state.seasonAsset||"XAUUSD";
  const pair=SEASON_DATA.find(d=>d.id===selAsset)||SEASON_DATA[0];
  const m10=pair.m10, m5=pair.m5, mCur=pair.mCur;

  // ── Build SVG chart ──
  const W=700, H=260, padL=48, padR=12, padT=28, padB=42;
  const chartW=W-padL-padR, chartH=H-padT-padB;
  const barGroupW=chartW/12, barW=barGroupW*0.28;

  // Y scale — find range across all series
  const allVals=[...m10,...m5,...mCur.filter(v=>v!==null)];
  const maxV=Math.max(...allVals,0.5), minV=Math.min(...allVals,-0.5);
  const range=maxV-minV, pad=range*0.18;
  const yMax=maxV+pad, yMin=minV-pad;

  function yPx(v){return padT+chartH*(1-(v-yMin)/(yMax-yMin));}
  function xCenter(i){return padL+i*barGroupW+barGroupW/2;}

  // Y gridlines + labels
  let gridLines="", yLabels="";
  const yTicks=[];
  const step=range>8?4:range>3?1:range>1.5?0.5:0.25;
  let t=Math.ceil(yMin/step)*step;
  while(t<=yMax+0.001){yTicks.push(parseFloat(t.toFixed(2)));t=parseFloat((t+step).toFixed(2));}
  yTicks.forEach(tv=>{
    const y=yPx(tv).toFixed(1);
    const isZero=Math.abs(tv)<0.001;
    gridLines+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="${isZero?"rgba(255,255,255,.25)":"rgba(255,255,255,.06)"}" stroke-width="${isZero?1.5:1}"/>`;
    yLabels+=`<text x="${padL-6}" y="${parseFloat(y)+4}" fill="#8b949e" font-size="9" text-anchor="end" font-family="monospace">${tv>0?"+":""}${tv.toFixed(1)}%</text>`;
  });

  // Month labels + current month highlight
  let monthLabels="", curHighlight="";
  MONTH_SHORT.forEach((m,i)=>{
    const cx=xCenter(i);
    monthLabels+=`<text x="${cx}" y="${H-6}" fill="${i===curMonth?"#58a6ff":"#8b949e"}" font-size="8.5" text-anchor="middle" font-family="monospace" font-weight="${i===curMonth?"bold":"normal"}">${m}</text>`;
    if(i===curMonth){
      const bx=padL+i*barGroupW;
      curHighlight=`<rect x="${bx+1}" y="${padT}" width="${barGroupW-2}" height="${chartH}" fill="rgba(88,166,255,.05)" rx="2"/>`;
    }
  });

  // Bars — 10yr (blue) and 5yr (red) side by side
  let bars10="", bars5="";
  const zero=yPx(0);
  m10.forEach((v,i)=>{
    const x=xCenter(i)-barW-1;
    const y=v>=0?yPx(v):zero;
    const h=Math.abs(yPx(v)-zero);
    const col=v>=0?"rgba(74,144,217,.85)":"rgba(74,144,217,.5)";
    bars10+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(1,h).toFixed(1)}" fill="${col}" rx="1"/>`;
    if(Math.abs(h)>8){
      const lbl=(v>0?"+":"")+v.toFixed(2)+"%";
      const ly=v>=0?y-3:y+h+9;
      bars10+=`<text x="${(x+barW/2).toFixed(1)}" y="${ly.toFixed(1)}" fill="rgba(255,255,255,.75)" font-size="6.5" text-anchor="middle" font-family="monospace">${lbl}</text>`;
    }
  });
  m5.forEach((v,i)=>{
    const x=xCenter(i)+1;
    const y=v>=0?yPx(v):zero;
    const h=Math.abs(yPx(v)-zero);
    const col=v>=0?"rgba(220,80,80,.85)":"rgba(220,80,80,.5)";
    bars5+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(1,h).toFixed(1)}" fill="${col}" rx="1"/>`;
  });

  // Current year line
  let linePath="", lineDots="", lineLabels="";
  const curPoints=mCur.map((v,i)=>v!==null?{x:xCenter(i),y:yPx(v),v,i}:null).filter(Boolean);
  if(curPoints.length>1){
    linePath=`<polyline points="${curPoints.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ")}" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>`;
  }
  curPoints.forEach(p=>{
    lineDots+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="#0d1117" stroke="white" stroke-width="2"/>`;
    const lbl=(p.v>0?"+":"")+p.v.toFixed(2)+"%";
    const ly=p.v>=0?p.y-10:p.y+16;
    lineLabels+=`<text x="${p.x.toFixed(1)}" y="${ly.toFixed(1)}" fill="white" font-size="8" text-anchor="middle" font-family="monospace" font-weight="bold">${lbl}</text>`;
  });

  const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    ${curHighlight}
    ${gridLines}
    ${bars10}${bars5}
    ${linePath}${lineDots}${lineLabels}
    ${monthLabels}
    ${yLabels}
  </svg>`;

  // Current month signal
  const curV10=m10[curMonth], curV5=m5[curMonth];
  const avgSignal=(curV10+curV5)/2;
  const sigCol=avgSignal>=0.2?"var(--bull)":avgSignal<=-0.2?"var(--bear)":"var(--neutral)";
  const sigLabel=avgSignal>=0.8?"STRONG BULLISH":avgSignal>=0.2?"BULLISH":avgSignal<=-0.8?"STRONG BEARISH":avgSignal<=-0.2?"BEARISH":"NEUTRAL";

  // Asset selector
  const assetOpts=SEASON_DATA.map(d=>`<option value="${d.id}" ${d.id===selAsset?"selected":""}>${d.name}</option>`).join("");

  let html=`
  <!-- Header matching Nick's style -->
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px">
    <div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Seasonality</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px">Asset: <strong style="color:var(--text)">${pair.name}</strong></div>
    </div>
    <select onchange="state.seasonAsset=this.value;renderSeasonality()"
      style="background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 10px;border-radius:6px;outline:none">
      ${assetOpts}
    </select>
  </div>

  <!-- Legend — exactly like Nick's -->
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:10px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--muted)">
      <div style="width:14px;height:10px;background:rgba(74,144,217,.85);border-radius:2px"></div>Last 10 years avg
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--muted)">
      <div style="width:14px;height:10px;background:rgba(220,80,80,.85);border-radius:2px"></div>Last 5 years avg
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--muted)">
      <div style="width:20px;height:2px;background:white;border-radius:2px"></div><div style="width:6px;height:6px;background:white;border-radius:50%"></div>Current year avg
    </div>
    <div style="margin-left:auto;font-family:var(--mono);font-size:10px">
      <span style="color:var(--muted)">${MONTH_NAMES[curMonth]}:</span>
      <span style="color:${sigCol};font-weight:bold;margin-left:4px">${sigLabel}</span>
    </div>
  </div>

  <!-- Chart -->
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;overflow-x:auto;margin-bottom:14px">
    ${svg}
  </div>

  <!-- Monthly data table below chart -->
  <div style="overflow-x:auto;margin-bottom:14px">
  <table style="width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10px;min-width:600px">
    <thead><tr>
      <th style="text-align:left;padding:7px 8px;background:var(--bg3);color:var(--muted);font-weight:400;font-size:9px;text-transform:uppercase;border:1px solid var(--border)">Series</th>
      ${MONTH_SHORT.map((m,i)=>`<th style="text-align:center;padding:7px 4px;background:var(--bg3);color:${i===curMonth?"var(--accent)":"var(--muted)"};font-weight:${i===curMonth?"bold":"400"};font-size:9px;border:1px solid var(--border)">${m}</th>`).join("")}
    </tr></thead>
    <tbody>
      <tr>
        <td style="padding:7px 8px;border:1px solid var(--border);color:#4a90d9;font-weight:bold">10yr Avg</td>
        ${m10.map((v,i)=>{const c=v>=0?"rgba(74,144,217,.25)":"rgba(74,144,217,.12)";return`<td style="text-align:center;padding:6px 4px;border:1px solid var(--border);background:${i===curMonth?"rgba(88,166,255,.1)":c};color:${v>=0?"#4a90d9":"rgba(74,144,217,.6)"}${i===curMonth?";outline:1px solid var(--accent)":""}">${v>0?"+":""}${v.toFixed(2)}%</td>`;}).join("")}
      </tr>
      <tr>
        <td style="padding:7px 8px;border:1px solid var(--border);color:#dc5050;font-weight:bold">5yr Avg</td>
        ${m5.map((v,i)=>{const c=v>=0?"rgba(220,80,80,.25)":"rgba(220,80,80,.12)";return`<td style="text-align:center;padding:6px 4px;border:1px solid var(--border);background:${i===curMonth?"rgba(88,166,255,.1)":c};color:${v>=0?"#dc5050":"rgba(220,80,80,.6)"}${i===curMonth?";outline:1px solid var(--accent)":""}">${v>0?"+":""}${v.toFixed(2)}%</td>`;}).join("")}
      </tr>
      <tr>
        <td style="padding:7px 8px;border:1px solid var(--border);color:white;font-weight:bold">Cur Year</td>
        ${mCur.map((v,i)=>{if(v===null)return`<td style="text-align:center;padding:6px 4px;border:1px solid var(--border);color:var(--muted)">—</td>`;const c=v>=0?"rgba(255,255,255,.1)":"rgba(255,255,255,.06)";return`<td style="text-align:center;padding:6px 4px;border:1px solid var(--border);background:${i===curMonth?"rgba(88,166,255,.1)":c};color:${v>=0?"white":"rgba(255,255,255,.5)"}${i===curMonth?";outline:1px solid var(--accent)":""};font-weight:bold">${v>0?"+":""}${v.toFixed(2)}%</td>`;}).join("")}
      </tr>

  </div>

  <div class="infobox ib-blue">
    <span class="iblabel" style="color:var(--accent)">ℹ SEASONALITY DATA</span>

  document.getElementById("page-seasonality").innerHTML=html;

// ── ECONOMIC ──────────────────────────────────────────────────────────────────
// ── ECONOMIC SURPRISE SCORES (Beat/Miss from FALLBACK_ECON) ─────────────────
// Score = avg surprise across all indicators for that currency
// Each indicator s: +0.5 strong beat, +0.2 mild beat, 0 in line, -0.2 mild miss, -0.5 strong miss
// Normalised to 0-100 for gauge display
// ECO_SURPRISE now computed dynamically from FRED in renderEcon — see ECO_SURPRISE_FALLBACK above

function makeGaugeSVG(score){
  // Proper semicircle gauge: 180deg arc from left to right
  // cx=60, cy=62, r=44
  // Start point (0%):  left  = (16, 62)
  // End point (100%):  right = (104,62)
  // Angles: 0% = 180deg, 100% = 0deg (going counterclockwise for sweep=1)
  const cx=60, cy=62, r=44;

  function ptAt(pct){
    const a = Math.PI - (pct/100)*Math.PI; // 180deg -> 0deg
    return [cx + r*Math.cos(a), cy - r*Math.sin(a)];
  }

  const [x40a,y40a]=ptAt(40);
  const [x60a,y60a]=ptAt(60);
  const [x100,y100]=ptAt(100);
  const [x0, y0] =ptAt(0);
  const [nx,  ny] =ptAt(score);
  const col = score>=70?"#00ff88":score>=45?"#f0b429":"#ff3b5c";

  return `<svg viewBox="0 0 120 68" style="width:130px;height:75px">
    <!-- BG track -->
    <path d="M ${x0.toFixed(1)} ${y0.toFixed(1)} A ${r} ${r} 0 0 1 ${x100.toFixed(1)} ${y100.toFixed(1)}"
      fill="none" stroke="#1c2330" stroke-width="11" stroke-linecap="butt"/>
    <!-- Red zone 0-40% -->
    <path d="M ${x0.toFixed(1)} ${y0.toFixed(1)} A ${r} ${r} 0 0 1 ${x40a.toFixed(1)} ${y40a.toFixed(1)}"
      fill="none" stroke="rgba(255,59,92,.55)" stroke-width="11" stroke-linecap="butt"/>
    <!-- Yellow zone 40-60% -->
    <path d="M ${x40a.toFixed(1)} ${y40a.toFixed(1)} A ${r} ${r} 0 0 1 ${x60a.toFixed(1)} ${y60a.toFixed(1)}"
      fill="none" stroke="rgba(240,180,41,.55)" stroke-width="11" stroke-linecap="butt"/>
    <!-- Green zone 60-100% -->
    <path d="M ${x60a.toFixed(1)} ${y60a.toFixed(1)} A ${r} ${r} 0 0 1 ${x100.toFixed(1)} ${y100.toFixed(1)}"
      fill="none" stroke="rgba(0,255,136,.55)" stroke-width="11" stroke-linecap="butt"/>
    <!-- Needle shadow -->
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}"
      stroke="rgba(0,0,0,.4)" stroke-width="4" stroke-linecap="round"/>
    <!-- Needle -->
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}"
      stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Center hub -->
    <circle cx="${cx}" cy="${cy}" r="5" fill="#0d1117" stroke="${col}" stroke-width="2"/>
    <!-- Labels -->
    <text x="11" y="67" fill="#8b949e" font-size="8" font-family="monospace">0</text>
    <text x="53" y="16" fill="#8b949e" font-size="8" font-family="monospace">50</text>
    <text x="99" y="67" fill="#8b949e" font-size="8" font-family="monospace">100</text>
  </svg>`;
}

function renderEcon(){
  if(state.fredKey&&state.econLoading&&!state.econData){
    document.getElementById("page-econ").innerHTML=`<div class="sectitle">Economic Data</div><div class="econ-loading"><div class="spinner"></div><span>Fetching live data from FRED...</span></div>`;return;
  }

  const econSubTabs=[
    {id:"meter",  label:"🎯 Surprise Meter"},
    {id:"heatmap",label:"🌡 Heatmap"},
  ];

  let html=`<div class="eco-sub-tabs">${econSubTabs.map(t=>`<button class="eco-sub-tab${ecoSubTab===t.id?" active":""}" onclick="setEcoTab('${t.id}')">${t.label}</button>`).join("")}</div>`;

  // ── SURPRISE METER ──
  if(ecoSubTab==="meter"){
    // ✅ Use FRED data if available, else fallback
    const ecoSurprise = state.econData ? calcSurpriseFromFRED(state.econData) : ECO_SURPRISE_FALLBACK;
    // Merge fallback for currencies FRED doesn't cover (NZD, CAD, AUD, CHF)
    const merged = {...ECO_SURPRISE_FALLBACK,...ecoSurprise};
    const scores=Object.entries(merged);
    const avg=Math.round(scores.reduce((a,[,v])=>a+v.score,0)/scores.length);
    const avgCol=avg>=70?"var(--bull)":avg>=45?"var(--neutral)":"var(--bear)";

    html+=`
    <div class="infobox ib-blue" style="margin-bottom:14px">
      <span class="iblabel" style="color:var(--accent)">ℹ ECONOMIC SURPRISE METER</span>
      Shows how economic data for each currency has performed <strong style="color:var(--text)">relative to expectations</strong>.
      A higher score means more data has been <strong style="color:var(--bull)">beating forecasts</strong>.
      A lower score means more data has been <strong style="color:var(--bear)">missing forecasts</strong>.
    </div>

    <!-- INDIVIDUAL CURRENCY GAUGES -->
    <div class="sectitle">Currency Economic Surprise Scores</div>
    <div class="gauge-grid">`;

    scores.forEach(([cur,data])=>{
      const col=data.score>=70?"var(--bull)":data.score>=45?"var(--neutral)":"var(--bear)";
      const status=data.score>=70?"Strong":data.score>=55?"Above Avg":data.score>=45?"Average":data.score>=30?"Below Avg":"Weak";
      html+=`<div class="gauge-wrap">
        <div class="gauge-label">${FLAGS[cur]||""} ${cur}</div>
        ${makeGaugeSVG(data.score)}
        <div class="gauge-pct" style="color:${col}">${data.score}%</div>
        <div class="gauge-status">${status}</div>
      </div>`;
    });

    html+=`</div>

    <!-- GLOBAL AVERAGE GAUGE -->
    <div class="sectitle">Global Economic Surprise Score</div>
    <div class="global-gauge-wrap">
      <div style="display:flex;flex-direction:column;align-items:center">
        ${makeGaugeSVG(avg)}
        <div style="font-family:var(--mono);font-size:28px;font-weight:bold;color:${avgCol};margin-top:4px">${avg}%</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">AVG ALL CURRENCIES</div>
      </div>
      <div class="global-gauge-info">
        <div class="global-gauge-title">Global Economic Surprise Score: ${avg}%</div>
        <div class="global-gauge-desc">
          This gauge reflects the average economic outperformance or underperformance across the eight major currencies.
          A higher score indicates a more robust global economic outlook.<br><br>
          <strong style="color:${avg>=60?"var(--bull)":avg>=45?"var(--neutral)":"var(--bear)"}">${avg>=70?"🟢 Global economy broadly beating expectations":avg>=55?"🟡 Global economy slightly above expectations":avg>=45?"⚪ Global economy in line with expectations":"🔴 Global economy broadly missing expectations"}</strong>
        </div>
      </div>
    </div>

    <!-- INDICATOR BREAKDOWN -->
    <div class="sectitle">Indicator Breakdown by Currency</div>`;

    scores.forEach(([cur,data])=>{
      const col=data.score>=70?"var(--bull)":data.score>=45?"var(--neutral)":"var(--bear)";
      html+=`<div class="card" style="margin-bottom:10px">
        <div class="chd"><span class="ctitle">${FLAGS[cur]||""} ${cur} — ${data.score}%</span><span class="cbadge" style="color:${col}">${data.score>=70?"STRONG":data.score>=45?"AVERAGE":"WEAK"}</span></div>
        <div class="cbody" style="display:flex;gap:10px;flex-wrap:wrap">`;
      data.indicators.forEach(ind=>{
        const ic=ind.s>=.4?"var(--bull)":ind.s>=.1?"#7effc4":ind.s<=-.4?"var(--bear)":ind.s<=-.1?"#ff8fa0":"var(--muted)";
        const il=ind.s>=.4?"▲▲ Strong Beat":ind.s>=.1?"▲ Beat":ind.s<=-.4?"▼▼ Strong Miss":ind.s<=-.1?"▼ Miss":"→ In Line";
        html+=`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;min-width:80px;text-align:center">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted)">${ind.n}</div>
          <div style="font-family:var(--mono);font-size:11px;color:${ic};margin-top:3px">${il}</div>
        </div>`;
      });
      html+=`</div></div>`;
    });
  }

  // ── HEATMAP ──
  else if(ecoSubTab==="heatmap"){
    const data2=state.econData||FALLBACK_ECON;const isLive=state.econLive;
    if(!state.fredKey)html+=`<div class="infobox ib-yellow"><span class="iblabel" style="color:var(--neutral)">⚡ UPGRADE TO LIVE DATA</span>Go to <strong style="color:var(--accent)">fred.stlouisfed.org</strong> → My Account → API Keys → paste in ⚙ Settings.</div>`;
    for(const[cur,items]of Object.entries(data2)){
      const badge=isLive?`<span class="cbadge-live">● LIVE · FRED</span>`:`<span class="cbadge-demo">DEMO DATA</span>`;
      html+=`<div class="card"><div class="chd"><span class="ctitle">${FLAGS[cur]||""} ${cur}</span>${badge}</div><div class="hgrid">`;
      items.forEach(i=>{
        const bg=i.s>.3?"rgba(0,255,136,.15)":i.s<-.3?"rgba(255,59,92,.15)":"rgba(240,180,41,.1)";
        const br=i.s>.3?"1px solid rgba(0,255,136,.2)":i.s<-.3?"1px solid rgba(255,59,92,.2)":"1px solid rgba(240,180,41,.15)";
        const lbl=i.s>.3?"▲ Beat":i.s<-.3?"▼ Miss":"→ In Line";
        const lc=i.s>.3?"var(--bull)":i.s<-.3?"var(--bear)":"var(--muted)";
        html+=`<div class="hcell" style="background:${bg};border:${br}"><div class="hlbl">${i.l}</div><div class="hval">${i.v}</div><div class="hchg" style="color:${lc}">${lbl}</div>${i.d?`<div class="hdate">${i.d}</div>`:""}</div>`;
      });
      html+=`</div></div>`;
    }
  }

  document.getElementById("page-econ").innerHTML=html;
}
function setEcoTab(id){ecoSubTab=id;renderEcon();}

// ── CURRENCY ──────────────────────────────────────────────────────────────────
function renderCurrency(){
  if(!state.cdata){document.getElementById("page-currency").innerHTML=`<div class="lrow"><div class="spinner"></div><span>Loading live rates...</span></div>`;return;}
  let html=`<div class="sectitle">Currency Strength — Live Rates</div><div class="card"><div class="chd"><span class="ctitle">G8 Relative Strength</span><span class="cbadge-live">● LIVE · Frankfurter</span></div><div class="cbody">`;
  state.cdata.forEach((c,i)=>{const col=c.val>.05?"var(--bull)":c.val<-.05?"var(--bear)":"var(--neutral)";html+=`<div class="crow"><div class="crank">${i+1}</div><div class="ccode" style="color:${col}">${c.code}</div><div class="cname">${c.name}</div><div class="cbarw"><div class="cbart"><div class="cbarf" style="width:${c.pct}%;background:${col}"></div></div></div><div class="cval" style="color:${col}">${c.val>0?"+":""}${c.val.toFixed(3)}</div></div>`;});
  html+=`</div></div>`;document.getElementById("page-currency").innerHTML=html;
}

// ── CARRY ─────────────────────────────────────────────────────────────────────
function renderCarry(){
  let html=`<div class="sectitle">Carry Trade Scanner</div><div class="infobox ib-blue"><span class="iblabel" style="color:var(--accent)">ℹ CARRY TRADE</span>Buy high interest rate currency, sell low rate currency. Best in low volatility trending markets.</div>
  <div class="card"><div class="chd"><span class="ctitle">Best Carry Opportunities</span><span class="cbadge">RANKED BY RATE DIFF</span></div><div class="cbody">`;
  CARRY_PAIRS.forEach(p=>{
    const col=p.score>=2?"var(--bull)":p.score>=1?"#7effc4":p.score<=0?"var(--bear)":"var(--neutral)";
    const stars="★".repeat(Math.max(0,p.score+2))+"☆".repeat(Math.max(0,2-p.score));
    html+=`<div class="carry-row"><div style="font-family:var(--mono);font-size:12px;font-weight:bold;width:80px;flex-shrink:0;color:${col}">${p.pair}</div><div style="flex:1"><div style="font-family:var(--mono);font-size:11px;color:var(--text)">Long ${p.long} / Short ${p.short}</div><div style="font-family:var(--mono);font-size:10px;color:var(--muted)">Rate diff: ${p.rate.toFixed(2)}%</div></div><div style="text-align:right"><div style="font-family:var(--mono);font-size:14px;font-weight:bold;color:${col}">${p.rate.toFixed(2)}%</div><div style="font-family:var(--mono);font-size:10px;color:${col}">${stars}</div></div></div>`;
  });
  html+=`</div></div>`;document.getElementById("page-carry").innerHTML=html;
}

// ── FEAR & GREED ──────────────────────────────────────────────────────────────
function renderFearGreed(){
  const data=state.fgData;const isLive=state.fgLive;
  const fg=parseInt(data[0].value);const col=fgColor(fg);
  const yesterday=data[1]?parseInt(data[1].value):null;
  const lastWeek=data[7]?parseInt(data[7].value):null;
  const lastMonth=data[29]?parseInt(data[29].value):null;
  const history=data.slice(0,7).reverse();
  const badge=isLive?`<span class="cbadge-live">● LIVE · Alternative.me</span>`:`<span class="cbadge-demo">ESTIMATED</span>`;
  let html=`<div class="sectitle">Fear & Greed Index</div>
  <div class="card"><div class="chd"><span class="ctitle">Crypto Market Sentiment</span>${badge}</div><div class="cbody">
    <div style="display:flex;flex-direction:column;align-items:center;padding:10px 0">
      <div style="font-family:var(--mono);font-size:72px;font-weight:bold;color:${col};line-height:1">${fg}</div>
      <div style="font-family:var(--mono);font-size:20px;font-weight:bold;color:${col};margin-top:8px">${fgLabel(fg)}</div>
      <div style="width:100%;max-width:340px;margin:20px auto 0">
        <div class="fg-bar"><div class="fg-pointer" style="left:${fg}%"></div></div>
        <div class="fg-labels"><span style="color:var(--bear)">Extreme Fear</span><span>Neutral</span><span style="color:var(--bull)">Extreme Greed</span></div>
      </div>
    </div>
  </div></div>
  <div class="card"><div class="chd"><span class="ctitle">Historical Comparison</span>${badge}</div><div class="cbody">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center">
      ${yesterday!=null?`<div><div style="font-family:var(--mono);font-size:10px;color:var(--muted)">Yesterday</div><div style="font-family:var(--mono);font-size:22px;font-weight:bold;color:${fgColor(yesterday)};margin:4px 0">${yesterday}</div><div style="font-family:var(--mono);font-size:9px;color:${fgColor(yesterday)}">${fgLabel(yesterday)}</div></div>`:""}
      ${lastWeek!=null?`<div><div style="font-family:var(--mono);font-size:10px;color:var(--muted)">Last Week</div><div style="font-family:var(--mono);font-size:22px;font-weight:bold;color:${fgColor(lastWeek)};margin:4px 0">${lastWeek}</div><div style="font-family:var(--mono);font-size:9px;color:${fgColor(lastWeek)}">${fgLabel(lastWeek)}</div></div>`:""}
      ${lastMonth!=null?`<div><div style="font-family:var(--mono);font-size:10px;color:var(--muted)">Last Month</div><div style="font-family:var(--mono);font-size:22px;font-weight:bold;color:${fgColor(lastMonth)};margin:4px 0">${lastMonth}</div><div style="font-family:var(--mono);font-size:9px;color:${fgColor(lastMonth)}">${fgLabel(lastMonth)}</div></div>`:""}
    </div>
  </div></div>
  <div class="card"><div class="chd"><span class="ctitle">7-Day History</span>${badge}</div><div class="cbody">
    ${history.map(d=>{const v=parseInt(d.value);const c=fgColor(v);const dt=new Date(parseInt(d.timestamp)*1000).toLocaleDateString([],{month:"short",day:"numeric"});return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><div style="font-family:var(--mono);font-size:9px;color:var(--muted);width:50px;flex-shrink:0">${dt}</div><div style="flex:1;background:var(--bg4);border-radius:4px;overflow:hidden;height:26px"><div style="width:${v}%;height:100%;background:${c};border-radius:4px;display:flex;align-items:center;padding-left:8px"><span style="font-family:var(--mono);font-size:11px;font-weight:bold;color:#000">${v}</span></div></div><div style="font-family:var(--mono);font-size:9px;color:${c};width:80px;text-align:right;flex-shrink:0">${fgLabel(v)}</div></div>`;}).join("")}
  </div></div>`;
  document.getElementById("page-feargreed").innerHTML=html;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────

  document.getElementById("page-settings").innerHTML=`
  <div class="sectitle">API Settings</div>
  <div class="apibox"><h3>🟢 ALREADY CONNECTED — NO KEY NEEDED</h3>
    <div class="infobox ib-green" style="margin-bottom:0">
      <strong style="color:var(--bull)">Frankfurter.app</strong> — Live forex rates for Currency Strength<br>
      <strong style="color:var(--bull)">Alternative.me</strong> — Fear & Greed Index · Daily<br>
      <strong style="color:var(--bull)">CFTC.gov</strong> — COT Data · Auto-fetched every Friday<br>
      <strong style="color:${state.putCallLive?"var(--bull)":"var(--neutral)"}">CBOE</strong> — Put/Call Ratio · ${state.putCallLive?"● LIVE":"Attempting live fetch..."}<br>
      <strong style="color:${state.aaiiLive?"var(--bull)":"var(--neutral)"}">AAII</strong> — Investor Survey · ${state.aaiiLive?"● LIVE":"Attempting live fetch..."}
    </div>
  </div>

  <div class="apibox">
    <h3>😊 MYFXBOOK — Live Retail Sentiment (Free)</h3>
    <div class="key-status ${state.mfxEmail?"key-ok":"key-missing"}">${state.mfxEmail?"✅ Myfxbook connected — Retail sentiment is LIVE":"⚠ No credentials — Sentiment showing demo data"}</div>
    <div style="font-size:11px;color:var(--muted);margin:10px 0;line-height:1.8">
      1. Register free at <span style="color:var(--accent)">myfxbook.com</span><br>
      2. Enter your email and password below<br>
      3. Tap Save — live sentiment loads automatically ✅<br>
      <span style="color:var(--neutral)">⚠ Credentials stored only on your device — never sent anywhere except Myfxbook.</span>
    </div>
    <div class="apirow">
      <span class="apilbl">Email</span>
      <input class="apiinp" id="mfx-email" type="email" placeholder="Your myfxbook.com email" value="${state.mfxEmail}"/>
    </div>
    <div class="apirow">
      <span class="apilbl">Password</span>
      <input class="apiinp" id="mfx-password" type="password" placeholder="Your myfxbook.com password" value="${state.mfxPassword}"/>
    </div>
    <button class="apibtn" onclick="saveMyfxbook()" style="margin-top:4px">💾 Save & Connect</button>
    ${state.mfxEmail?`<button onclick="clearMyfxbook()" style="background:var(--bg4);color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:8px 14px;font-family:var(--mono);font-size:11px;cursor:pointer;margin-left:8px">Clear</button>`:""}
  </div>

  <div class="apibox"><h3>🌡 FRED API — Live GDP, CPI, Rates (Free)</h3>
    <div class="key-status ${state.fredKey?"key-ok":"key-missing"}">${state.fredKey?"✅ FRED key saved — Economic data is LIVE":"⚠ No key — Economic showing demo data"}</div>
    <div class="apirow" style="margin-top:10px">
      <span class="apilbl">FRED Key</span>

    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:6px;line-height:1.8">
      1. Go to <span style="color:var(--accent)">fred.stlouisfed.org</span><br>
      2. Click <strong style="color:var(--text)">My Account → API Keys → Request API Key</strong><br>
      3. Paste above → Save ✅
    </div>
  </div>
  <div class="apibox"><h3>📱 ADD TO HOME SCREEN</h3>
    <div style="font-size:11px;color:var(--muted);line-height:2.1">
      <strong style="color:var(--text)">Android Chrome</strong> → Tap ⋮ → "Add to Home screen"<br>
      <strong style="color:var(--text)">iPhone Safari</strong> → Tap Share → "Add to Home Screen"<br>
      <span style="color:var(--bull)">✅ Opens full screen like a native app</span>
    </div>
  </div>`;

function saveMyfxbook(){
  const email=document.getElementById("mfx-email").value.trim();
  const password=document.getElementById("mfx-password").value.trim();
  if(!email||!password){alert("Please enter both email and password");return;}
  state.mfxEmail=email;state.mfxPassword=password;state.mfxSession="";
  saveKey("mfx_email",email);saveKey("mfx_password",password);saveKey("mfx_session","");
  state.sentimentLive=false;state.sentimentLoading=false;
  renderSettings();
  // Immediately try to fetch live data
  loadMyfxbookData();
  if(activeTab==="sentiment")renderSentiment();
}
function clearMyfxbook(){
  state.mfxEmail="";state.mfxPassword="";state.mfxSession="";
  saveKey("mfx_email","");saveKey("mfx_password","");saveKey("mfx_session","");
  state.sentimentLive=false;state.sentimentData=FALLBACK_SENTIMENT;
  renderSettings();
  if(activeTab==="sentiment")renderSentiment();
}
function saveFREDKey(){const val=document.getElementById("fred-input").value.trim();if(!val)return;state.fredKey=val;saveKey("fred",val);state.econData=null;state.econLive=false;state.econLoading=false;renderSettings();loadFREDData();if(activeTab==="econ")renderEcon();}

// ── TABS ──────────────────────────────────────────────────────────────────────
function initTabs(){
  const nav=document.getElementById("tabs");
  TABS_DEF.forEach(t=>{const btn=document.createElement("button");btn.className="tab"+(t.id===activeTab?" active":"");btn.textContent=t.label;btn.onclick=()=>switchTab(t.id);nav.appendChild(btn);});
}
function switchTab(id){
  activeTab=id;
  document.querySelectorAll(".tab").forEach((b,i)=>{b.className="tab"+(TABS_DEF[i].id===id?" active":"");});
  document.querySelectorAll(".page").forEach(p=>{p.className="page";});
  document.getElementById("page-"+id).className="page active";
  renderActive();
}
function renderActive(){
  if(activeTab==="setups")     renderSetups();
  else if(activeTab==="cot")        renderCOT();
  else if(activeTab==="sentiment")  renderSentiment();
  else if(activeTab==="econ")       renderEcon();
  else if(activeTab==="currency")   renderCurrency();
  else if(activeTab==="carry")      renderCarry();
  else if(activeTab==="feargreed")  renderFearGreed();
  else if(activeTab==="seasonality") renderSeasonality();
  else if(activeTab==="settings")   renderSettings();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
initTabs();
renderActive();
refreshAll();
setInterval(refreshAll,15*60*1000);
</script>

</html>
