<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EdgeFinder Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* ── REDESIGNED PALETTE — muted institutional ── */
  --bg:#060810;--bg2:#0a0d14;--bg3:#0f1420;--bg4:#141a27;--bg5:#1a2133;
  --border:#1e2535;--border2:#252e40;
  --bull:#22c55e;--bull2:rgba(34,197,94,.12);--bull3:rgba(34,197,94,.06);
  --bear:#ef4444;--bear2:rgba(239,68,68,.12);--bear3:rgba(239,68,68,.06);
  --neutral:#eab308;--accent:#3b82f6;--accent2:rgba(59,130,246,.12);
  --text:#cbd5e1;--text2:#94a3b8;--text3:#64748b;
  --mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;
  --r-sm:4px;--r-md:6px;--r-lg:8px;
  /* legacy compat */
  --cell-bull:rgba(34,197,94,.14);--cell-bear:rgba(239,68,68,.14);
  --cell-strong-bull:rgba(34,197,94,.28);--cell-strong-bear:rgba(239,68,68,.28);
  --muted:#64748b;--blue:#3b82f6;--red:#ef4444;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}

/* ── HEADER ── */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:100;}
.hlogo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--bull));border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:bold;color:#fff;}
.logo-text{font-size:15px;font-weight:900;letter-spacing:-0.5px;color:var(--text);}
.logo-text b{color:var(--accent);}
.hright{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--text3);}
.live-dot{width:6px;height:6px;background:var(--bull);border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lupdate{color:var(--accent);}
.rbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text3);font-family:var(--mono);font-size:13px;padding:3px 9px;border-radius:var(--r-sm);cursor:pointer;transition:border-color .15s;}
.rbtn:hover{border-color:var(--border2);}
.spinning{display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TABS ── */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 11px;font-size:9.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--mono);background:none;border-top:none;border-left:none;border-right:none;transition:color .2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── LAYOUT ── */
.main{padding:14px;max-width:1480px;width:100%;margin:0 auto;}
.page{display:none;}.page.active{display:block;}

/* ── SCORE TABLE (Top Setups) ── */
.score-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px;}
.score-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;min-width:900px;}
.score-table th{background:var(--bg3);color:var(--text3);text-align:center;padding:7px 5px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.score-table th.left{text-align:left;}
.score-table th.group{background:var(--bg4);color:var(--accent);font-size:9px;letter-spacing:1px;}
.score-table td{padding:6px 5px;border:1px solid var(--border);text-align:center;font-size:11px;}
.score-table td.asset-name{text-align:left;font-weight:bold;font-size:11px;white-space:nowrap;background:var(--bg2);position:sticky;left:0;z-index:2;padding-left:9px;}
.score-table td.bias-cell{font-size:10px;font-weight:600;white-space:nowrap;}
.score-table td.total-cell{font-size:13px;font-weight:bold;}
.score-table tr:hover td{filter:brightness(1.12);}
.c2{background:var(--cell-strong-bull);color:var(--bull);}
.c1{background:var(--cell-bull);color:var(--bull);}
.c0{background:var(--bg2);color:var(--text3);}
.cm1{background:var(--cell-bear);color:var(--bear);}
.cm2{background:var(--cell-strong-bear);color:var(--bear);}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.filter-btn{font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;transition:all .15s;}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.filter-label{font-family:var(--mono);font-size:9px;color:var(--text3);margin-right:4px;}

/* ── COT CHART ── */
.cot-chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:14px;}
.cot-legend{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;}
.cot-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cot-bars-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cot-bars-scroll::-webkit-scrollbar{height:3px;}
.cot-bars-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.cot-bars{display:flex;align-items:flex-end;gap:5px;height:160px;min-width:max-content;padding-bottom:30px;}
.cot-bar-wrap{display:flex;flex-direction:column;align-items:center;width:44px;flex-shrink:0;height:100%;justify-content:flex-end;position:relative;}
.cot-bar-stacked{width:100%;border-radius:2px 2px 0 0;overflow:hidden;display:flex;flex-direction:column-reverse;cursor:pointer;}
.cot-bar-stacked:hover{filter:brightness(1.2);}
.cot-bar-long{background:var(--blue);}
.cot-bar-short{background:var(--red);}
.cot-bar-label{font-family:var(--mono);font-size:7px;color:var(--text3);text-align:center;position:absolute;bottom:-24px;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── COT TABLE ── */
.cot-tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px;}
.cot-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;min-width:900px;}
.cot-tbl th{background:var(--bg3);color:var(--text3);text-align:right;padding:8px 9px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;cursor:pointer;}
.cot-tbl th:first-child{text-align:left;}
.cot-tbl th:hover{color:var(--text);}
.cot-tbl td{padding:7px 9px;border:1px solid var(--border);text-align:right;font-size:11px;white-space:nowrap;}
.cot-tbl td:first-child{text-align:left;font-weight:bold;font-size:11px;background:var(--bg2);position:sticky;left:0;}
.cot-tbl tr:hover td{background:var(--bg3);}
.pos-highlight{font-weight:bold;padding:2px 7px;border-radius:var(--r-sm);}
.pos-bull{background:rgba(59,130,246,.2);color:#60a5fa;}
.pos-bear{background:rgba(239,68,68,.2);color:#f87171;}
.pct-bull{color:var(--bull);}
.pct-bear{color:var(--bear);}
.pct-neutral{color:var(--text3);}
.delta-bull{color:var(--bull);}
.delta-bear{color:var(--bear);}

/* ── SENTIMENT ── */
.sent-sub-tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
.sent-sub-tab{font-family:var(--mono);font-size:9px;padding:5px 12px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;transition:all .2s;}
.sent-sub-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.sent-row-big{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.sent-row-big:last-child{border-bottom:none;}
.sent-pair-big{font-family:var(--mono);font-size:11px;font-weight:bold;width:72px;flex-shrink:0;}
.sent-signal{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:var(--r-sm);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;width:100px;text-align:center;}
.sig-strong-buy{background:rgba(34,197,94,.18);color:var(--bull);border:1px solid rgba(34,197,94,.25);}
.sig-buy{background:rgba(34,197,94,.08);color:var(--bull);border:1px solid rgba(34,197,94,.15);}
.sig-neutral{background:rgba(234,179,8,.08);color:var(--neutral);border:1px solid rgba(234,179,8,.15);}
.sig-sell{background:rgba(239,68,68,.08);color:var(--bear);border:1px solid rgba(239,68,68,.15);}
.sig-strong-sell{background:rgba(239,68,68,.18);color:var(--bear);border:1px solid rgba(239,68,68,.25);}
.sent-bar-big{flex:1;}
.sent-track-big{height:7px;background:var(--bg4);border-radius:2px;overflow:hidden;display:flex;}
.sent-long-big{height:100%;border-radius:2px 0 0 2px;background:var(--bull);transition:width .8s;}
.sent-short-big{height:100%;border-radius:0 2px 2px 0;background:var(--bear);transition:width .8s;}
.sent-vol{font-family:var(--mono);font-size:9px;color:var(--text3);width:55px;text-align:right;flex-shrink:0;}
.smart-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.smart-tbl th{background:var(--bg3);color:var(--text3);text-align:center;padding:7px 9px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;}
.smart-tbl th:first-child{text-align:left;}
.smart-tbl td{padding:8px 9px;border:1px solid var(--border);text-align:center;font-size:11px;}
.smart-tbl td:first-child{text-align:left;font-weight:bold;background:var(--bg2);position:sticky;left:0;}
.smart-tbl tr:hover td{background:var(--bg3);}
.diverge-bull{background:rgba(34,197,94,.12);color:var(--bull);font-weight:bold;padding:2px 7px;border-radius:var(--r-sm);}
.diverge-bear{background:rgba(239,68,68,.12);color:var(--bear);font-weight:bold;padding:2px 7px;border-radius:var(--r-sm);}
.diverge-neutral{color:var(--text3);}
.pc-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.pc-row:last-child{border-bottom:none;}
.pc-asset{font-family:var(--mono);font-size:11px;font-weight:bold;width:72px;flex-shrink:0;}
.pc-ratio{font-family:var(--mono);font-size:15px;font-weight:bold;width:50px;flex-shrink:0;text-align:center;}
.pc-bar-wrap{flex:1;}
.pc-bar-track{height:6px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.pc-bar-fill{height:100%;border-radius:2px;transition:width .8s;}
.pc-signal{font-family:var(--mono);font-size:9px;width:90px;text-align:right;flex-shrink:0;}
.aaii-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:500px){.aaii-wrap{grid-template-columns:1fr;}}
.aaii-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px;text-align:center;}
.aaii-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
.aaii-val{font-family:var(--mono);font-size:26px;font-weight:bold;margin:5px 0;}
.aaii-hist{font-family:var(--mono);font-size:9px;color:var(--text3);}
.aaii-bar{height:4px;border-radius:2px;margin-top:6px;}
.extremes-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.extremes-tbl th{background:var(--bg3);color:var(--text3);text-align:left;padding:7px 9px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;}
.extremes-tbl td{padding:8px 9px;border:1px solid var(--border);font-size:11px;}
.extremes-tbl tr:hover td{background:var(--bg3);}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px;}
.chd{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);}
.ctitle{font-family:var(--mono);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);}
.cbadge-live{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:var(--r-sm);border:1px solid rgba(34,197,94,.25);color:var(--bull);}
.cbadge-demo{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:var(--r-sm);border:1px solid rgba(234,179,8,.25);color:var(--neutral);}
.cbadge{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:var(--r-sm);background:var(--bg4);border:1px solid var(--border);color:var(--text3);}
.cbody{padding:12px;}
.hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:9px;}
@media(max-width:500px){.hgrid{grid-template-columns:repeat(2,1fr);}}
.hcell{padding:9px;border-radius:var(--r-md);text-align:center;}
.hlbl{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.6);}
.hval{font-family:var(--mono);font-size:14px;font-weight:bold;color:#fff;margin:2px 0;}
.hchg{font-family:var(--mono);font-size:8px;}
.hdate{font-family:var(--mono);font-size:7px;color:rgba(255,255,255,.35);margin-top:1px;}
.crow{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);}
.crow:last-child{border-bottom:none;}
.crank{font-family:var(--mono);font-size:9px;color:var(--text3);width:16px;flex-shrink:0;}
.ccode{font-family:var(--mono);font-size:11px;font-weight:bold;width:36px;flex-shrink:0;}
.cname{font-size:9px;color:var(--text3);width:90px;flex-shrink:0;}
.cbarw{flex:1;}
.cbart{height:5px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.cbarf{height:100%;border-radius:2px;transition:width .8s;}
.cval{font-family:var(--mono);font-size:10px;width:44px;text-align:right;flex-shrink:0;}
.carry-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);}
.carry-row:last-child{border-bottom:none;}
.fg-bar{width:100%;height:14px;border-radius:var(--r-md);background:linear-gradient(to right,#ef4444,#f97316,#eab308,#86efac,#22c55e);position:relative;margin:14px 0 5px;}
.fg-pointer{width:3px;height:22px;background:white;border-radius:2px;position:absolute;top:-4px;transform:translateX(-50%);box-shadow:0 0 6px rgba(255,255,255,.5);}
.fg-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:3px;}

/* ── UTILITIES ── */
.sectitle{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.sectitle::after{content:'';flex:1;height:1px;background:var(--border);}
.infobox{padding:10px;border-radius:var(--r-md);font-size:11px;color:var(--text3);line-height:1.65;margin-bottom:10px;}
.ib-blue{background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.12);}
.ib-yellow{background:rgba(234,179,8,.05);border:1px solid rgba(234,179,8,.12);}
.ib-green{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.12);}
.iblabel{font-family:var(--mono);display:block;margin-bottom:3px;}
.lrow{display:flex;align-items:center;gap:7px;padding:7px 0;color:var(--text3);font-family:var(--mono);font-size:11px;}
.spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--bull);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
.apibox{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;}
.apibox h3{font-family:var(--mono);font-size:10px;color:var(--accent);margin-bottom:9px;letter-spacing:1px;}
.apirow{display:flex;gap:6px;align-items:center;margin-bottom:7px;flex-wrap:wrap;}
.apilbl{font-family:var(--mono);font-size:9px;color:var(--text3);width:90px;flex-shrink:0;}
.apiinp{flex:1;min-width:130px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 9px;font-family:var(--mono);font-size:11px;color:var(--text);outline:none;}
.apibtn{background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);padding:7px 14px;font-family:var(--mono);font-size:10px;font-weight:bold;cursor:pointer;}
.key-status{font-family:var(--mono);font-size:9px;margin-top:4px;padding:5px 9px;border-radius:var(--r-sm);}
.key-ok{background:rgba(34,197,94,.07);color:var(--bull);border:1px solid rgba(34,197,94,.18);}
.key-missing{background:rgba(234,179,8,.07);color:var(--neutral);border:1px solid rgba(234,179,8,.18);}
.econ-loading{display:flex;align-items:center;gap:7px;padding:28px;color:var(--text3);font-family:var(--mono);font-size:11px;justify-content:center;}
.tooltip{position:fixed;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-md);padding:7px 11px;font-family:var(--mono);font-size:11px;color:var(--text);pointer-events:none;z-index:999;display:none;}

/* ── ECON METER ── */
.eco-sub-tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
.eco-sub-tab{font-family:var(--mono);font-size:9px;padding:5px 12px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;transition:all .2s;}
.eco-sub-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.gauge-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px;}
@media(min-width:600px){.gauge-grid{grid-template-columns:repeat(4,1fr);}}
.gauge-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 9px 10px;display:flex;flex-direction:column;align-items:center;}
.gauge-label{font-family:var(--mono);font-size:12px;font-weight:bold;color:var(--text);margin-bottom:6px;}
.gauge-pct{font-family:var(--mono);font-size:18px;font-weight:bold;margin-top:3px;}
.gauge-status{font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.global-gauge-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;display:flex;align-items:center;gap:20px;margin-bottom:14px;flex-wrap:wrap;}
.global-gauge-info{flex:1;min-width:180px;}
.global-gauge-title{font-family:var(--mono);font-size:12px;font-weight:bold;color:var(--text);margin-bottom:6px;}
.global-gauge-desc{font-size:11px;color:var(--text3);line-height:1.6;}

/* ── SEASONALITY ── */
.season-months{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;padding:7px;}
.season-month{border-radius:2px;padding:3px 2px;text-align:center;font-family:var(--mono);font-size:8px;}
.season-month .sm-lbl{color:rgba(255,255,255,.65);font-size:7px;}
.season-month .sm-val{font-weight:bold;font-size:8px;}
.sm-bull2{background:rgba(34,197,94,.32);}
.sm-bull1{background:rgba(34,197,94,.16);}
.sm-neutral{background:rgba(234,179,8,.1);}
.sm-bear1{background:rgba(239,68,68,.16);}
.sm-bear2{background:rgba(239,68,68,.32);}
.sm-current{outline:2px solid var(--accent);outline-offset:-1px;}

/* ══════════════════════════════════════════════════════════
   ASSET SCORECARD — REDESIGNED
══════════════════════════════════════════════════════════ */
.sc-layout{display:grid;grid-template-columns:220px 1fr 1fr;gap:12px;align-items:start;}
@media(max-width:900px){.sc-layout{grid-template-columns:1fr 1fr;}}
@media(max-width:580px){.sc-layout{grid-template-columns:1fr;}}

.sc-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.sc-panel-hd{background:var(--bg3);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.sc-panel-title{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);}
.sc-panel-body{padding:12px;}

/* Gauge arc */
.sc-gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;}
.sc-gauge-score{font-family:var(--mono);font-size:30px;font-weight:bold;line-height:1;margin-top:-4px;}
.sc-gauge-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;}

/* Bias pill */
.sc-bias{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r-sm);font-family:var(--mono);font-size:10px;font-weight:bold;letter-spacing:.3px;margin-bottom:8px;}
.sc-bias-bull{background:var(--bull2);color:var(--bull);border:1px solid rgba(34,197,94,.2);}
.sc-bias-bear{background:var(--bear2);color:var(--bear);border:1px solid rgba(239,68,68,.2);}
.sc-bias-neutral{background:rgba(234,179,8,.08);color:var(--neutral);border:1px solid rgba(234,179,8,.18);}

/* Score bars */
.sc-score-rows{display:flex;flex-direction:column;gap:0;}
.sc-score-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.sc-score-row:last-child{border-bottom:none;}
.sc-score-label{font-family:var(--mono);font-size:9px;color:var(--text3);flex:1;white-space:nowrap;}
.sc-score-bar-wrap{width:70px;height:4px;background:var(--bg4);border-radius:2px;overflow:visible;position:relative;}
.sc-score-bar-fill{height:100%;border-radius:2px;position:absolute;transition:width .5s;}
.sc-score-val{font-family:var(--mono);font-size:10px;font-weight:bold;width:24px;text-align:right;flex-shrink:0;}

/* Detail table inside panels */
.sc-detail-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10px;}
.sc-detail-table th{color:var(--text3);font-size:8px;text-transform:uppercase;letter-spacing:.5px;padding:0 0 5px 0;border-bottom:1px solid var(--border);font-weight:400;text-align:left;}
.sc-detail-table th:not(:first-child){text-align:right;}
.sc-detail-table td{padding:5px 0;border-bottom:1px solid rgba(30,37,53,.6);vertical-align:middle;}
.sc-detail-table tr:last-child td{border-bottom:none;}
.sc-detail-table td:not(:first-child){text-align:right;}
.sc-metric-name{color:var(--text3);font-size:9px;}
.sc-badge{display:inline-block;padding:1px 6px;border-radius:2px;font-size:8px;font-weight:bold;letter-spacing:.3px;}
.sc-badge-bull{background:rgba(34,197,94,.15);color:var(--bull);}
.sc-badge-bear{background:rgba(239,68,68,.15);color:var(--bear);}
.sc-badge-neutral{background:rgba(100,116,139,.12);color:var(--text3);}
.sc-actual{color:var(--text);font-size:9px;}
.sc-forecast{color:var(--text3);font-size:9px;}
.sc-surprise-bull{color:var(--bull);font-size:9px;}
.sc-surprise-bear{color:var(--bear);font-size:9px;}
.sc-surprise-neutral{color:var(--text3);font-size:9px;}

/* Asset selector toolbar */
.sc-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);}
.sc-select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;font-weight:bold;padding:5px 10px;border-radius:var(--r-sm);outline:none;cursor:pointer;}
.sc-select:focus{border-color:var(--accent);}
.sc-toolbar-label{font-family:var(--mono);font-size:9px;color:var(--text3);}

/* ── PREMIUM HISTOGRAM CHART ── */
.histo-wrap{position:relative;width:100%;overflow:hidden;}
.histo-svg{width:100%;height:auto;display:block;}

/* ══════════════════════════════════════════════════════════
   FOREX SCORECARD — REDESIGNED
══════════════════════════════════════════════════════════ */
.fx-layout{display:grid;grid-template-columns:240px 1fr;gap:12px;align-items:start;}
@media(max-width:720px){.fx-layout{grid-template-columns:1fr;}}

/* Main score panel */
.fx-main-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.fx-main-hd{background:var(--bg3);border-bottom:1px solid var(--border);padding:9px 13px;display:flex;align-items:center;justify-content:space-between;}

/* Right column sections */
.fx-right{display:flex;flex-direction:column;gap:10px;}
.fx-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.fx-section-hd{background:var(--bg3);border-bottom:1px solid var(--border);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;}
.fx-section-title{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);}
.fx-section-body{padding:11px 12px;}

/* Component breakdown rows */
.fx-comp-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.fx-comp-row:last-child{border-bottom:none;}
.fx-comp-name{font-family:var(--mono);font-size:9px;color:var(--text3);flex:1;}
.fx-comp-bar-wrap{width:80px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;position:relative;}
.fx-comp-bar{height:100%;border-radius:2px;position:absolute;}
.fx-comp-val{font-family:var(--mono);font-size:9px;font-weight:bold;width:20px;text-align:right;flex-shrink:0;}
.fx-comp-bias{font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;flex-shrink:0;}

/* Currency strength row */
.fx-strength-row{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--border);}
.fx-strength-row:last-child{border-bottom:none;}
.fx-strength-flag{font-size:13px;flex-shrink:0;}
.fx-strength-code{font-family:var(--mono);font-size:10px;font-weight:bold;width:30px;flex-shrink:0;}
.fx-strength-bar-wrap{flex:1;height:5px;background:var(--bg4);border-radius:2px;overflow:hidden;position:relative;}
.fx-strength-bar{height:100%;border-radius:2px;position:absolute;}
.fx-strength-score{font-family:var(--mono);font-size:9px;width:32px;text-align:right;flex-shrink:0;}

/* Pair score big display */
.fx-pair-score{font-family:var(--mono);font-size:40px;font-weight:bold;line-height:1;text-align:center;padding:10px 0 4px;}
.fx-pair-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:.8px;}
.fx-curr-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.fx-curr-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-md);padding:8px 10px;text-align:center;}
.fx-curr-code{font-family:var(--mono);font-size:11px;font-weight:bold;color:var(--text);}
.fx-curr-score{font-family:var(--mono);font-size:18px;font-weight:bold;margin:2px 0;}
.fx-curr-bias{font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
/* ═══════════════════════════════════════════════════════════════════
   ASSET SCORECARD — MOBILE RESPONSIVE FIX
   SURGICAL: Only affects .sc3-* classes (scorecard).
   Zero changes to any other tab's CSS.
   Breakpoint: 768px = mobile, above = desktop (unchanged).
   Mobile-first order: dropdown → score → gauge → delta → 
                       macro → components → history
═══════════════════════════════════════════════════════════════════ */

/* ── PAGE CONTAINER — prevent horizontal overflow ── */
#page-scorecard {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  box-sizing: border-box;
}

/* ── STICKY HEADER — always visible on mobile ── */
.sc3-sticky-header {
  position: sticky;
  top: 54px;          /* below app header */
  z-index: 50;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  width: 100%;
  box-sizing: border-box;
}

/* ── MAIN LAYOUT GRID ──
   Desktop: left col (240px fixed) + right content
   Mobile:  single column, full width
── */
.sc3-grid {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 12px;
  align-items: start;
  width: 100%;
}

@media (max-width: 768px) {
  .sc3-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }
}

/* ── LEFT + RIGHT PANELS ── */
.sc3-left,
.sc3-right {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  min-width: 0;
}

/* ── PRIMARY SCORE BLOCK ── */
.sc3-primary {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  width: 100%;
  box-sizing: border-box;
}

.sc3-primary-hd {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  padding: 10px 14px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  gap: 8px;
}

/* Desktop: gauge left, weights right, side by side */
.sc3-primary-body {
  display: grid;
  grid-template-columns: auto 1fr;
}

/* Mobile: stack gauge on top, weights below */
@media (max-width: 768px) {
  .sc3-primary-body {
    grid-template-columns: 1fr;
  }
}

.sc3-gauge-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 12px;
  border-right: 1px solid var(--border);
  min-width: 170px;
}

@media (max-width: 768px) {
  .sc3-gauge-col {
    border-right: none;
    border-bottom: 1px solid var(--border);
    min-width: unset;
    padding: 14px 12px;
  }

  /* Slightly shrink the huge score number on mobile */
  .sc3-score-big {
    font-size: 44px !important;
  }
}

/* ── MACRO NARRATIVE BLOCK ── */
.sc3-narrative {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  line-height: 1.65;
  background: rgba(88, 166, 255, .03);
  width: 100%;
  box-sizing: border-box;
}

/* ── COMPONENT WEIGHT ROWS ── */
.sc3-components-col {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 0;
  justify-content: center;
  width: 100%;
  box-sizing: border-box;
}

.sc3-wrow {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 4px;
  border-bottom: 1px solid rgba(33,38,45,.6);
  cursor: pointer;
  border-radius: 3px;
  transition: background .1s;
  min-height: 44px;   /* touch target */
}

.sc3-wrow:last-child { border-bottom: none; }
.sc3-wrow:hover { background: var(--bg3); }

.sc3-wrow-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  width: 90px;
  flex-shrink: 0;
}

.sc3-wrow-bar-wrap {
  flex: 1;
  height: 5px;
  background: var(--bg4);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
  min-width: 0;
}

.sc3-wrow-bar {
  height: 100%;
  border-radius: 2px;
  position: absolute;
  transition: width .5s;
}

.sc3-wrow-val {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: bold;
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

.sc3-wrow-weight {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--muted);
  width: 24px;
  text-align: right;
  flex-shrink: 0;
}

.sc3-wrow-contrib {
  font-family: var(--mono);
  font-size: 8px;
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}

/* ── ACCORDION SECTIONS ── */
.sc3-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  width: 100%;
  box-sizing: border-box;
}

.sc3-section-hd {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  background: var(--bg3);
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  min-height: 44px;   /* touch target */
}

.sc3-section-hd:hover,
.sc3-section-hd:active { background: var(--bg4); }

.sc3-section-title {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  flex: 1;
}

.sc3-section-score {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: bold;
}

.sc3-section-bias {
  font-family: var(--mono);
  font-size: 8px;
  padding: 2px 7px;
  border-radius: 3px;
  font-weight: bold;
}

.sc3-section-weight {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--muted);
}

.sc3-section-chevron {
  font-size: 10px;
  color: var(--muted);
  margin-left: 4px;
  transition: transform .2s;
  flex-shrink: 0;
}
.sc3-section-chevron.open { transform: rotate(180deg); }

.sc3-section-body {
  padding: 12px 14px;
  display: none;
}
.sc3-section-body.open { display: block; }

/* ── INDICATOR TABLE ROWS — mobile column reflow ── */
.sc3-ind-hdr,
.sc3-ind-row {
  display: grid;
  grid-template-columns: 1fr 64px 54px 54px 52px;
  gap: 4px;
  align-items: center;
}

/* COT 4-col variant */
.sc3-ind-hdr.cot4,
.sc3-ind-row.cot4 {
  grid-template-columns: 1fr 90px 70px 52px;
}

@media (max-width: 480px) {
  /* Narrow screens: hide Forecast column, keep Name | Signal | Actual | Score */
  .sc3-ind-hdr,
  .sc3-ind-row {
    grid-template-columns: 1fr 60px 44px 0px 44px;
  }

  /* hide the forecast cell content but keep column for layout */
  .sc3-ind-hdr > span:nth-child(4),
  .sc3-ind-row .sc3-ind-fcst {
    display: none;
  }

  .sc3-ind-hdr.cot4,
  .sc3-ind-row.cot4 {
    grid-template-columns: 1fr 80px 60px 44px;
  }
}

/* Normalisation display */
.sc3-norm-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  padding: 3px 0;
  flex-wrap: wrap;
}

/* ── SCORE HISTORY CHART — full width, no overflow ── */
.sc3-hist-wrap {
  position: relative;
  width: 100%;
  overflow: hidden;
}

.sc3-hist-svg,
.sc3-hist-wrap svg {
  width: 100% !important;
  height: auto !important;
  display: block;
  max-width: 100%;
}

/* ── SCORE HISTORY CARD ── */
.sc3-hist-wrap ~ * { width: 100%; }

/* ── ASSET RANKING LIST ── */
.sc3-rank-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 6px;
  border-radius: 4px;
  cursor: pointer;
  transition: background .1s;
  min-height: 44px;
}
.sc3-rank-item:hover,
.sc3-rank-item.active { background: var(--bg3); }

.sc3-rank-num {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  width: 14px;
  flex-shrink: 0;
}

.sc3-rank-name {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: bold;
  width: 62px;
  flex-shrink: 0;
}

.sc3-rank-bar-wrap {
  flex: 1;
  height: 4px;
  background: var(--bg4);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
  min-width: 0;
}
.sc3-rank-bar {
  height: 100%;
  border-radius: 2px;
  position: absolute;
}

.sc3-rank-score {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: bold;
  width: 30px;
  text-align: right;
  flex-shrink: 0;
}
.sc3-rank-bias {
  font-family: var(--mono);
  font-size: 8px;
  flex-shrink: 0;
}

/* On very small screens collapse rank-bias to save space */
@media (max-width: 380px) {
  .sc3-rank-bias { display: none; }
  .sc3-rank-name { width: 52px; }
}

/* ── FRESHNESS PILLS ── */
.sc3-fresh {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 10px;
  white-space: nowrap;
}

/* on mobile, collapse freshness label text on tiny screens */
@media (max-width: 400px) {
  .sc3-fresh { font-size: 8px; padding: 2px 5px; }
}

.sc3-fresh-live   { background:rgba(0,255,136,.1);  color:var(--bull);    border:1px solid rgba(0,255,136,.25);  }
.sc3-fresh-stale  { background:rgba(240,180,41,.1); color:var(--neutral); border:1px solid rgba(240,180,41,.2);  }
.sc3-fresh-old    { background:rgba(255,59,92,.1);  color:var(--bear);    border:1px solid rgba(255,59,92,.2);   }
.sc3-fresh-dot    {
  width:5px; height:5px; border-radius:50%;
  background:currentColor; animation:pulse 2s infinite;
}

/* ── BIAS PILL ── */
.sc3-bias-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: bold;
  letter-spacing: .5px;
  white-space: nowrap;
}

/* ── DELTA ── */
.sc3-delta {
  font-family: var(--mono);
  font-size: 10px;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}

/* ── SCORE BADGE / PILL ── */
.sc3-score-pill {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: bold;
  padding: 1px 6px;
  border-radius: 3px;
  display: inline-block;
  white-space: nowrap;
}

.sc3-badge {
  font-family: var(--mono);
  font-size: 8px;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: bold;
  white-space: nowrap;
}
.sc3-badge-bull    { background:rgba(0,255,136,.15);   color:var(--bull);    }
.sc3-badge-bear    { background:rgba(255,59,92,.15);   color:var(--bear);    }
.sc3-badge-neutral { background:rgba(240,180,41,.1);   color:var(--neutral); }

/* ── INTERP STRIP ── */
.sc3-interp {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 5px;
  margin-bottom: 10px;
  font-family: var(--mono);
  font-size: 10px;
  border-left: 3px solid;
  flex-wrap: wrap;
  word-break: break-word;
}
.sc3-interp-bull    { background:rgba(0,255,136,.06);  border-color:var(--bull);    color:var(--bull);    }
.sc3-interp-bear    { background:rgba(255,59,92,.06);  border-color:var(--bear);    color:var(--bear);    }
.sc3-interp-neutral { background:rgba(240,180,41,.06); border-color:var(--neutral); color:var(--neutral); }

/* ── INDICATOR TABLE BASE STYLES ── */
.sc3-ind-hdr {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .4px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}

.sc3-ind-row {
  padding: 5px 0;
  border-bottom: 1px solid rgba(33,38,45,.4);
}
.sc3-ind-row:last-child { border-bottom: none; }

.sc3-ind-name    { font-family:var(--mono); font-size:9px;  color:var(--muted); }
.sc3-ind-actual  { font-family:var(--mono); font-size:9px;  color:var(--text);  }
.sc3-ind-fcst    { font-family:var(--mono); font-size:9px;  color:var(--muted); }
.sc3-ind-surprise{ font-family:var(--mono); font-size:9px;  font-weight:bold;   }

/* ── TOOLBAR ── */
.sc3-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
  width: 100%;
  box-sizing: border-box;
}

.sc3-select {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: bold;
  padding: 5px 10px;
  border-radius: 5px;
  outline: none;
  cursor: pointer;
  min-height: 44px;   /* touch target */
  transition: border-color .15s;
  max-width: 100%;
}
.sc3-select:focus { border-color: var(--accent); }
.sc3-select optgroup { color: var(--muted); font-size: 10px; }

/* ── MOBILE-SPECIFIC REORDER ──
   On mobile: right panel (macro + sections) stacks BELOW left panel.
   Grid-row ordering puts left-col first (score/gauge/history/ranking),
   then right-col (macro + accordion sections) after.
   This is the natural DOM order in the generated HTML since we emit
   sc3-left then sc3-right, so single-column just flows correctly.
── */

/* ── MISC UTILITY ── */
.sc3-primary,
.sc3-section,
.sc3-left > *,
.sc3-right > * {
  max-width: 100%;
  box-sizing: border-box;
}

/* Weight model transparency card — ensure wrapping on mobile */
.sc3-right > div[style] {
  word-break: break-word;
  overflow-wrap: break-word;

// ── SCORE HISTORY GENERATOR ───────────────────────────────────────────────────
// Generates realistic 28-bar mock history centered around a base score
function genScoreHistory(baseScore,days=28){
  const hist=[];
  let s=baseScore+(Math.random()-0.5)*4;
  const now=Date.now();
  for(let i=days;i>=0;i--){
    s+=(Math.random()-0.47)*1.2;
    s=Math.max(-10,Math.min(10,s));
    // Nudge toward base in last 5 bars
    if(i<5)s=s*0.85+baseScore*0.15;
    hist.push({date:new Date(now-i*86400000),score:parseFloat(s.toFixed(1))});
  }
  hist[hist.length-1].score=baseScore;
  return hist;
}

// ── PREMIUM HISTOGRAM SVG ─────────────────────────────────────────────────────
// Polarized histogram: bars above zero = blue, below = red
// Clear zero baseline, bullish/bearish zone backgrounds, date labels
function buildHistogramSVG(history,W=520,H=108){
  const padL=28,padR=6,padT=10,padB=24;
  const cW=W-padL-padR,cH=H-padT-padB;
  const n=history.length;
  const scores=history.map(h=>h.score);
  const absMax=Math.max(10,Math.max(...scores.map(Math.abs)));
  const zeroY=padT+cH/2; // zero is always exactly center

  function yPos(v){return padT+cH*(1-(v+absMax)/(2*absMax));}
  function xPos(i){return padL+i*(cW/n)+0.5*(cW/n);}

  // Zone backgrounds
  const bullZone=`<rect x="${padL}" y="${padT}" width="${cW}" height="${cH/2}" fill="rgba(59,130,246,0.04)" rx="0"/>`;
  const bearZone=`<rect x="${padL}" y="${zeroY}" width="${cW}" height="${cH/2}" fill="rgba(239,68,68,0.04)" rx="0"/>`;

  // Threshold dashed lines at +5 and -5
  const thresh5y=yPos(5),threshn5y=yPos(-5);
  const threshLines=`
    <line x1="${padL}" y1="${thresh5y.toFixed(1)}" x2="${W-padR}" y2="${thresh5y.toFixed(1)}" stroke="rgba(59,130,246,0.22)" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="${padL-3}" y="${(thresh5y+3).toFixed(1)}" fill="rgba(59,130,246,0.5)" font-size="7" text-anchor="end" font-family="monospace">+5</text>
    <line x1="${padL}" y1="${threshn5y.toFixed(1)}" x2="${W-padR}" y2="${threshn5y.toFixed(1)}" stroke="rgba(239,68,68,0.22)" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="${padL-3}" y="${(threshn5y+3).toFixed(1)}" fill="rgba(239,68,68,0.5)" font-size="7" text-anchor="end" font-family="monospace">-5</text>`;

  // Zero baseline
  const baseline=`<line x1="${padL}" y1="${zeroY.toFixed(1)}" x2="${W-padR}" y2="${zeroY.toFixed(1)}" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
    <text x="${padL-3}" y="${(zeroY+3).toFixed(1)}" fill="rgba(255,255,255,0.25)" font-size="7" text-anchor="end" font-family="monospace">0</text>`;

  // Bars
  const bw=Math.max(2,(cW/n)*0.68);
  let bars="";
  history.forEach((h,i)=>{
    const x=xPos(i);
    const score=h.score;
    const age=n-1-i;
    // Opacity ramp: older = more transparent
    const opacity=age>7?0.45:age>3?0.7:1.0;
    let fill,barY,barH;
    if(score>=0){
      fill=`rgba(59,130,246,${opacity})`;  // muted blue for bullish
      barY=yPos(score);
      barH=Math.max(1,zeroY-barY);
    } else {
      fill=`rgba(239,68,68,${opacity})`;   // muted red for bearish
      barY=zeroY;
      barH=Math.max(1,yPos(score)-zeroY);
    }
    // Sharp bottom, 1.5px top radius — institutional look
    bars+=`<rect x="${(x-bw/2).toFixed(1)}" y="${barY.toFixed(1)}" width="${bw.toFixed(1)}" height="${barH.toFixed(1)}" fill="${fill}" rx="1"/>`;
  });

  // Date labels every 7 bars
  let dateLabels="";
  history.forEach((h,i)=>{
    if(i%7===0){
      const x=xPos(i);
      const mm=h.date.getMonth()+1,dd=h.date.getDate();
      dateLabels+=`<text x="${x.toFixed(1)}" y="${H-5}" fill="rgba(100,116,139,0.8)" font-size="7" text-anchor="middle" font-family="monospace">${mm}/${dd}</text>`;
    }
  });

  // Current score dot on top of last bar
  const last=history[history.length-1];
  const dotX=xPos(history.length-1),dotY=yPos(last.score);
  const dotColor=last.score>=0?"#93c5fd":"#fca5a5";
  const dot=`<circle cx="${dotX.toFixed(1)}" cy="${dotY.toFixed(1)}" r="3" fill="${dotColor}" stroke="rgba(0,0,0,0.5)" stroke-width="1"/>`;

  return `<svg viewBox="0 0 ${W} ${H}" class="histo-svg" preserveAspectRatio="none">
    ${bullZone}${bearZone}
    ${threshLines}${baseline}
    ${bars}${dot}
    ${dateLabels}
  </svg>`;
}

function sc3ScoreInst(id){const cr=(state.cotData||COT_DATA).find(r=>r.id===(SC3_ASSETS[id]?.cftcId));const lp=cr?cr.longPct:50;const z=(lp-50)/20;const cS=z>1.5?2:z>0.5?1:z<-1.5?-2:z<-0.5?-1:0;const nc=cr?cr.netChg:0;const chS=nc>10?2:nc>3?1:nc<-10?-2:nc<-3?-1:0;const nm={"XAUUSD":"XAUUSD","US500":"SPX500","NAS100":"NAS100","US30":"US30","USOIL":"USOIL","BTCUSD":"BTCUSD","ETHUSD":"ETHUSD","XAGUSD":"XAGUSD"};const sr=(state.sentimentData||[]).find(r=>nm[r.name]===id||r.name===id);const rl=sr?sr.longPercentage:50;const rS=rl>75?-2:rl>60?-1:rl<25?2:rl<40?1:0;return{score:sc3Cl((cS+chS+rS)/3),cS,chS,rS,lp,nc,rl,z:z.toFixed(2)};}
function sc3ScoreGrow(){const g=SC3_ECON;const pS=g.pmi>55?2:g.pmi>50?1:g.pmi>48?0:g.pmi>45?-1:-2;const gD=g.gdpActual-g.gdpFcst;const gS=gD>1?2:gD>0.3?1:gD>-0.3?0:gD>-1?-1:-2;const rD=g.rsActual-g.rsFcst;const rS=rD>0.5?2:rD>0.1?1:rD>-0.1?0:rD>-0.5?-1:-2;const cD=g.ccActual-g.ccFcst;const cS=cD>5?2:cD>2?1:cD>-2?0:cD>-5?-1:-2;return{score:parseFloat(((pS+gS+rS+cS)/4).toFixed(2)),pS,gS,rS,cS,gD:gD.toFixed(2),rD:rD.toFixed(2),cD:cD.toFixed(2)};}
function sc3ScoreInfl(id){const inf=SC3_ECON;const pol=SC3_ASSETS[id]?.inflPol??0;const cD=inf.cpiActual-inf.cpiFcst;const cB=cD>0.5?2:cD>0.2?1:cD>-0.2?0:cD>-0.5?-1:-2;const pD=inf.ppiActual-inf.ppiFcst;const pB=pD>0.5?2:pD>0.2?1:pD>-0.2?0:pD>-0.5?-1:-2;const eD=inf.pceActual-inf.pceFcst;const eB=eD>0.5?2:eD>0.2?1:eD>-0.2?0:eD>-0.5?-1:-2;const raw=(cB+pB+eB)/3;return{score:pol===0?0:sc3Cl(raw*pol),cB,pB,eB,raw:raw.toFixed(2),pol,cD:cD.toFixed(2),pD:pD.toFixed(2),eD:eD.toFixed(2)};}
function sc3ScoreLabor(id){const lab=SC3_ECON;const pol=SC3_ASSETS[id]?.laborPol??0;const nD=lab.nfpActual-lab.nfpFcst;const nS=nD>150?2:nD>50?1:nD>-50?0:nD>-150?-1:-2;const uD=lab.unempActual-lab.unempPrev;const uS=uD<-0.3?2:uD<-0.1?1:uD<0.1?0:uD<0.3?-1:-2;const cD=lab.claimsPrev-lab.claimsActual;const cS=cD>20?2:cD>5?1:cD>-5?0:cD>-20?-1:-2;const raw=(nS+uS+cS)/3;return{score:pol===0?0:sc3Cl(raw*pol),nS,uS,cS,raw:raw.toFixed(2),pol,nD:nD.toFixed(0),uD:uD.toFixed(2),cD:cD.toFixed(0)};}
function sc3Compute(id){const w=SC3_WEIGHTS;const tech=sc3ScoreTech(id),inst=sc3ScoreInst(id),grow=sc3ScoreGrow(),infl=sc3ScoreInfl(id),labor=sc3ScoreLabor(id);const score=parseFloat((tech.score*w.technical+inst.score*w.institutional+grow.score*w.growth+infl.score*w.inflation+labor.score*w.labor).toFixed(3));const bias=score>=1?"Very Bullish":score>=0.3?"Bullish":score>-0.3?"Neutral":score>-1?"Bearish":"Very Bearish";const comps={technical:tech.score,institutional:inst.score,growth:grow.score,inflation:infl.score,labor:labor.score};sc3Snap(id,score,bias,comps);return{id,score,bias,comps,tech,inst,grow,infl,labor};}

function sc3Pill(v){const col=sc3Col(v);const bg=v>0?"rgba(0,255,136,.1)":v<0?"rgba(255,59,92,.1)":"rgba(240,180,41,.08)";return`<span class="sc3-score-pill" style="background:${bg};color:${col}">${v>=0?"+":""}${typeof v==="number"?v.toFixed(2):v}</span>`;}

function sc3Gauge(score){const norm=(score+2)/4;const cx=65,cy=65,r=52;function pt(p){const a=Math.PI-(p/100)*Math.PI;return[cx+r*Math.cos(a),cy-r*Math.sin(a)];}const[x0,y0]=pt(0),[x1,y1]=pt(100),[x3,y3]=pt(33),[x6,y6]=pt(67);const[nx,ny]=pt(Math.max(0,Math.min(100,norm*100)));const col=sc3Col(score);return`<svg viewBox="0 0 130 80" style="width:150px;height:92px;display:block;margin:0 auto"><path d="M${x0.toFixed(1)},${y0.toFixed(1)} A${r},${r} 0 0,1 ${x1.toFixed(1)},${y1.toFixed(1)}" fill="none" stroke="#1c2330" stroke-width="13"/><path d="M${x0.toFixed(1)},${y0.toFixed(1)} A${r},${r} 0 0,1 ${x3.toFixed(1)},${y3.toFixed(1)}" fill="none" stroke="rgba(255,59,92,.3)" stroke-width="13"/><path d="M${x3.toFixed(1)},${y3.toFixed(1)} A${r},${r} 0 0,1 ${x6.toFixed(1)},${y6.toFixed(1)}" fill="none" stroke="rgba(240,180,41,.25)" stroke-width="13"/><path d="M${x6.toFixed(1)},${y6.toFixed(1)} A${r},${r} 0 0,1 ${x1.toFixed(1)},${y1.toFixed(1)}" fill="none" stroke="rgba(0,255,136,.28)" stroke-width="13"/><line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="rgba(0,0,0,.4)" stroke-width="4" stroke-linecap="round"/><line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="5" fill="#0d1117" stroke="${col}" stroke-width="2"/><text x="9" y="78" fill="rgba(255,59,92,.5)" font-size="8.5" font-family="monospace">BEAR</text><text x="65" y="12" fill="rgba(240,180,41,.5)" font-size="8.5" font-family="monospace" text-anchor="middle">NEU</text><text x="121" y="78" fill="rgba(0,255,136,.5)" font-size="8.5" font-family="monospace" text-anchor="end">BULL</text></svg>`;}
function sc3Histo(history,W=440,H=100){if(!history||!history.length)return`<div style="font-family:var(--mono);font-size:9px;color:var(--muted);padding:12px;text-align:center">Score history appears after first calculation</div>`;const pL=28,pR=6,pT=8,pB=22,cW=W-pL-pR,cH=H-pT-pB,n=history.length,zY=pT+cH/2;function yP(v){return pT+cH*(1-(v+2)/4);}function xP(i){return pL+i*(cW/n)+0.5*(cW/n);}const b1Y=yP(1),bm1Y=yP(-1);const lines=`<line x1="${pL}" y1="${b1Y.toFixed(1)}" x2="${W-pR}" y2="${b1Y.toFixed(1)}" stroke="rgba(0,255,136,.18)" stroke-width="1" stroke-dasharray="3,3"/><text x="${pL-2}" y="${(b1Y+3).toFixed(1)}" fill="rgba(0,255,136,.4)" font-size="7" text-anchor="end" font-family="monospace">+1</text><line x1="${pL}" y1="${bm1Y.toFixed(1)}" x2="${W-pR}" y2="${bm1Y.toFixed(1)}" stroke="rgba(255,59,92,.18)" stroke-width="1" stroke-dasharray="3,3"/><text x="${pL-2}" y="${(bm1Y+3).toFixed(1)}" fill="rgba(255,59,92,.4)" font-size="7" text-anchor="end" font-family="monospace">-1</text><line x1="${pL}" y1="${zY.toFixed(1)}" x2="${W-pR}" y2="${zY.toFixed(1)}" stroke="rgba(255,255,255,.14)" stroke-width="1"/><text x="${pL-2}" y="${(zY+3).toFixed(1)}" fill="rgba(255,255,255,.25)" font-size="7" text-anchor="end" font-family="monospace">0</text>`;const bBg=`<rect x="${pL}" y="${pT}" width="${cW}" height="${(b1Y-pT).toFixed(1)}" fill="rgba(59,130,246,.04)"/>`;const rBg=`<rect x="${pL}" y="${bm1Y.toFixed(1)}" width="${cW}" height="${(pT+cH-bm1Y).toFixed(1)}" fill="rgba(239,68,68,.04)"/>`;const bw=Math.max(2,(cW/n)*0.72);let bars="",dates="";history.forEach((h,i)=>{const s=h.score||0,x=xP(i),age=n-1-i,op=age>7?0.42:age>3?0.70:1.0;let fill,barY,barH;if(s>=0){fill=`rgba(59,130,246,${op})`;barY=yP(s);barH=Math.max(1,zY-barY);}else{fill=`rgba(239,68,68,${op})`;barY=zY;barH=Math.max(1,yP(s)-zY);}bars+=`<rect x="${(x-bw/2).toFixed(1)}" y="${barY.toFixed(1)}" width="${bw.toFixed(1)}" height="${barH.toFixed(1)}" fill="${fill}" rx="1"/>`;if(i===0||i===n-1||i%7===0){const d=new Date(h.date);dates+=`<text x="${x.toFixed(1)}" y="${H-4}" fill="rgba(139,148,158,.7)" font-size="7" text-anchor="middle" font-family="monospace">${d.getMonth()+1}/${d.getDate()}</text>`;}});const last=history[history.length-1];const lx=xP(history.length-1),ly=yP(last.score||0);const dot=`<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3" fill="${sc3Col(last.score||0)}" stroke="rgba(0,0,0,.5)" stroke-width="1"/>`;return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">${bBg}${rBg}${lines}${bars}${dot}${dates}</svg>`;}
function sc3WRow(label,sid,raw,w){const pct=Math.min(100,Math.abs(raw)/2*100);const col=sc3Col(raw);const pos=raw<0?"right:0":"left:0";return`<div class="sc3-wrow" onclick="sc3Toggle('${sid}')"><span class="sc3-wrow-label">${label}</span><div class="sc3-wrow-bar-wrap"><div class="sc3-wrow-bar" style="width:${pct}%;background:${col};${pos}"></div></div><span class="sc3-wrow-val" style="color:${col}">${raw>=0?"+":""}${raw.toFixed(2)}</span><span class="sc3-wrow-weight">${(w*100).toFixed(0)}%</span><span class="sc3-wrow-contrib" style="color:${col}">${(raw*w)>=0?"+":""}${(raw*w).toFixed(3)}</span></div>`;}

function sc3Sec(sid,title,wlabel,weight,score,bias,interp,body){const col=sc3Col(score);const bc=sc3BC(bias),ic=sc3IC(bias);return`<div class="sc3-section"><div class="sc3-section-hd" onclick="sc3Toggle('${sid}')"><span class="sc3-section-title">${title}</span><span class="sc3-section-weight">${wlabel}</span>${sc3Pill(score)}<span class="sc3-badge ${bc}">${bias}</span><span class="sc3-section-chevron" id="sc3c_${sid}">▼</span></div><div class="sc3-section-body" id="sc3b_${sid}"><div class="sc3-interp ${ic}">${interp}</div>${body}</div></div>`;}

function sc3Narr(id,result){const a=SC3_ASSETS[id];const{bias,score,comps}=result;const pos=[],neg=[];if(comps.technical>=0.5)pos.push("bullish technical structure");else if(comps.technical<=-0.5)neg.push("bearish technical outlook");if(comps.institutional>=0.5)pos.push("strong COT positioning");else if(comps.institutional<=-0.5)neg.push("weak institutional positioning");if(comps.growth>=0.5)pos.push("positive growth data");else if(comps.growth<=-0.5)neg.push("disappointing growth");if(comps.inflation>=0.5)pos.push("inflation tailwind");else if(comps.inflation<=-0.5)neg.push("inflation headwind");if(comps.labor>=0.5)pos.push("strong labor market");else if(comps.labor<=-0.5)neg.push("weak labor conditions");let txt=`<strong>${a.label}</strong> is <strong style="color:${sc3Col(score)}">${bias}</strong> (${score>=0?"+":""}${score.toFixed(3)}).`;if(pos.length)txt+=` Driven by: ${pos.join(", ")}.`;if(neg.length)txt+=` Headwinds: ${neg.join(", ")}.`;return txt;}

            ${sc3WRow("Technical",    "technical",    comps.technical,    SC3_WEIGHTS.technical)}

            ${sc3WRow("Labor Market", "labor",        comps.labor,        SC3_WEIGHTS.labor)}
            <div style="border-top:1px solid var(--border);margin-top:6px;padding-top:5px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted)"><span>Weighted Score</span><strong style="color:${bc}">${score>=0?"+":""}${score.toFixed(3)}</strong></div>

        <div style="padding:8px 10px 4px;width:100%;box-sizing:border-box;"><div class="sc3-hist-wrap">${sc3Histo(history)}</div>${history.length>0?`<div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:7px;color:var(--muted);margin-top:3px;padding:0 1px"><span>← ${history.length} days ago</span><span>Today →</span></div>`:""}
        </div>

      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;">

      </div>
    </div>
    <div class="sc3-right">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
        <div class="chd"><span class="ctitle">▶ Macro Summary</span><span class="cbadge">EF Quant v3</span></div>
        <div class="sc3-narrative" style="padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.7;background:rgba(88,166,255,.03)">${sc3Narr(id,result)}</div>
      </div>
      ${sc3Sec("technical","Technical bias","25% weight",SC3_WEIGHTS.technical,comps.technical,tB,`4H/Daily trend: <strong>${tech.tS>=0?"+":""}${tech.tS}</strong> · ${MN[m]} seasonality: <strong style="color:${mr>=0?"var(--bull)":"var(--bear)"}">${mr>=0?"+":""}${mr.toFixed(2)}%</strong> → score <strong>${tech.sS>=0?"+":""}${tech.sS}</strong>`,techBody)}
      ${sc3Sec("institutional","Institutional activity bias","20% weight",SC3_WEIGHTS.institutional,comps.institutional,iB,`Smart Money ${iB.includes("Bull")?"accumulating":"distributing"} · COT z-score: <strong>${inst.z}</strong> · Retail ${inst.rl>60?"over-long (contrarian bearish)":inst.rl<40?"under-long (contrarian bullish)":"at neutral"} at <strong>${inst.rl.toFixed(1)}%</strong>`,instBody)}
      ${sc3Sec("growth","Economic growth","20% weight",SC3_WEIGHTS.growth,comps.growth,gB,`GDP ${parseFloat(grow.gD)>=0?"beat":"missed"} fcst by <strong>${grow.gD}%pts</strong> · PMI: <strong>${g.pmi}</strong> (${g.pmi>50?"expansion":"contraction"}) · <strong>${g.growthUpdated}</strong>`,growBody)}
      ${sc3Sec("inflation","Inflation","20% weight",SC3_WEIGHTS.inflation,comps.inflation,nB,`CPI: <strong>${g.cpiActual}% vs ${g.cpiFcst}% fcst</strong> · ${polL}`,inflBody)}
      ${sc3Sec("labor","Labor market","15% weight",SC3_WEIGHTS.labor,comps.labor,lB,`NFP: <strong>${g.nfpActual}k vs ${g.nfpFcst}k fcst</strong> · ${polL2}`,laborBody)}
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;box-sizing:border-box;">${[["Technical",comps.technical,SC3_WEIGHTS.technical],["Institutional",comps.institutional,SC3_WEIGHTS.institutional],["Growth",comps.growth,SC3_WEIGHTS.growth],["Inflation",comps.inflation,SC3_WEIGHTS.inflation],["Labor",comps.labor,SC3_WEIGHTS.labor]].map(([k,s,w])=>{const col=sc3Col(s);return`<div style="display:flex;justify-content:space-between;margin-bottom:4px;font-family:var(--mono);font-size:9px;color:var(--muted);min-height:22px;align-items:center;"><span>${k}</span><span>${(w*100).toFixed(0)}% × <span style="color:${col}">${s>=0?"+":""}${s.toFixed(2)}</span> = <strong style="color:${col}">${(s*w)>=0?"+":""}${(s*w).toFixed(3)}</strong></span></div>`;}).join("")}<div style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;"><span style="color:var(--muted)">Final Score</span><strong style="color:${bc}">${score>=0?"+":""}${score.toFixed(3)} → ${bias}</strong></div></div>
    </div>
  </div>`;
  const top=Object.entries(comps).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]))[0]?.[0];
  if(top)sc3Toggle(top);
}


function renderForexcard(){
  const el=document.getElementById("page-forexcard");
  const pair=FOREX_PAIRS.find(p=>p.id===fxPairId)||FOREX_PAIRS[0];
  const baseCode=pair.base,quoteCode=pair.quote;
  const baseScore=calcCurrScore(baseCode);
  const quoteScore=calcCurrScore(quoteCode);
  const pairScore=parseFloat((baseScore-quoteScore).toFixed(1));
  const bias=currBias(pairScore);
  const biasCl=bias.includes("Bull")?"sc-bias-bull":bias.includes("Bear")?"sc-bias-bear":"sc-bias-neutral";
  const scoreCol=pairScore>0?"var(--bull)":pairScore<0?"var(--bear)":"var(--text3)";

  if(!_fxHistCache[fxPairId])_fxHistCache[fxPairId]=genScoreHistory(pairScore,28);
  const hist=_fxHistCache[fxPairId];

  const bd=CURR_DB[baseCode],qd=CURR_DB[quoteCode];
  const baseBias=currBias(baseScore),quoteBias=currBias(quoteScore);
  const baseScoreCol=baseScore>0?"var(--bull)":baseScore<0?"var(--bear)":"var(--text3)";
  const quoteScoreCol=quoteScore>0?"var(--bull)":quoteScore<0?"var(--bear)":"var(--text3)";

  // All currency strength ranking
  const allScores=Object.entries(CURR_DB).map(([code,d])=>({code,flag:d.flag,score:calcCurrScore(code)})).sort((a,b)=>b.score-a.score);
  const maxAbsScore=Math.max(...allScores.map(s=>Math.abs(s.score)),1);

  // Component breakdown for a currency
  function compBreakdown(code){
    const d=CURR_DB[code];
    const comps=[
      {name:"Technical",score:d.tech.score,bias:d.tech.bias},
      {name:"Sentiment",score:d.sent.score,bias:d.sent.bias},
      {name:"COT / Instit.",score:d.cot.score,bias:d.cot.bias},
      {name:"Eco Growth",score:d.growth.score,bias:d.growth.bias},
      {name:"Inflation",score:d.inflation.score,bias:d.inflation.bias},
      {name:"Jobs Market",score:d.jobs.score,bias:d.jobs.bias},
    ];
    return comps.map(c=>{
      const pct=Math.min(100,Math.abs(c.score)/2*100);
      const col=c.score>0?"var(--bull)":c.score<0?"var(--bear)":"var(--text3)";
      const offset=c.score<0?"right:0":"left:0";
      return`<div class="fx-comp-row">
        <span class="fx-comp-name">${c.name}</span>
        <div class="fx-comp-bar-wrap"><div class="fx-comp-bar" style="width:${pct}%;background:${col};${offset}"></div></div>
        <span class="fx-comp-val" style="color:${col}">${c.score>0?"+":""}${c.score}</span>
        <span class="fx-comp-bias sc-badge ${biasCls(c.bias)}">${c.bias}</span>
      </div>`;
    }).join("");
  }

  // Pair selector options
  const pairOpts=FOREX_PAIRS.map(p=>`<option value="${p.id}" ${p.id===fxPairId?"selected":""}>${p.id}</option>`).join("");

  el.innerHTML=`
  <!-- TOOLBAR — Single source of truth -->
  <div class="sc-toolbar">
    <span class="sc-toolbar-label">Pair:</span>
    <select class="sc-select" onchange="fxPairId=this.value;_fxHistCache[fxPairId]=null;renderForexcard()">${pairOpts}</select>
    <div style="display:flex;align-items:center;gap:6px;margin-left:8px;">
      <span style="font-family:var(--mono);font-size:9px;color:var(--text3)">${bd.flag} ${baseCode}</span>
      <span style="font-family:var(--mono);font-size:11px;font-weight:bold;color:${baseScoreCol}">${baseScore>0?"+":""}${baseScore}</span>
      <span style="font-family:var(--mono);font-size:9px;color:var(--text3)">vs</span>
      <span style="font-family:var(--mono);font-size:9px;color:var(--text3)">${qd.flag} ${quoteCode}</span>
      <span style="font-family:var(--mono);font-size:11px;font-weight:bold;color:${quoteScoreCol}">${quoteScore>0?"+":""}${quoteScore}</span>
    </div>
    <div class="sc-bias ${biasCl}" style="margin-left:auto;">${bias}</div>
  </div>

  <!-- 2-COLUMN LAYOUT -->
  <div class="fx-layout">

    <!-- LEFT: Main score panel -->
    <div class="fx-main-panel">
      <div class="fx-main-hd">
        <span style="font-family:var(--mono);font-size:11px;font-weight:bold;color:var(--text)">${fxPairId}</span>
        <span class="cbadge">EdgeFinder Score</span>
      </div>

      <!-- BIG PAIR SCORE -->
      <div style="padding:14px 14px 8px;text-align:center;border-bottom:1px solid var(--border);">
        <div class="fx-pair-score" style="color:${scoreCol}">${pairScore>0?"+":""}${pairScore}</div>
        <div class="fx-pair-label">Pair Score (Base − Quote)</div>
        <div style="margin-top:8px;display:flex;justify-content:center;">
          <span class="sc-bias ${biasCl}">${bias}</span>
        </div>
      </div>

      <!-- BASE vs QUOTE mini cards -->
      <div style="padding:10px 12px;border-bottom:1px solid var(--border);">
        <div class="fx-curr-compare">
          <div class="fx-curr-box" style="border-color:${baseScore>0?"rgba(34,197,94,0.2)":"baseScore<0?rgba(239,68,68,0.2)":var(--border)}">
            <div class="fx-curr-code">${bd.flag} ${baseCode}</div>
            <div class="fx-curr-score" style="color:${baseScoreCol}">${baseScore>0?"+":""}${baseScore}</div>
            <div class="fx-curr-bias">${baseBias}</div>
          </div>
          <div class="fx-curr-box" style="border-color:${quoteScore>0?"rgba(34,197,94,0.2)":"quoteScore<0?rgba(239,68,68,0.2)":var(--border)}">
            <div class="fx-curr-code">${qd.flag} ${quoteCode}</div>
            <div class="fx-curr-score" style="color:${quoteScoreCol}">${quoteScore>0?"+":""}${quoteScore}</div>
            <div class="fx-curr-bias">${quoteBias}</div>
          </div>
        </div>
      </div>

      <!-- SCORE OVER TIME — NEW (was missing before) -->
      <div style="padding:10px 12px 6px;border-bottom:1px solid var(--border);">
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;">
          <span>Score Over Time</span>
          <div style="display:flex;gap:8px;">
            <div style="display:flex;align-items:center;gap:3px;font-size:8px;"><div style="width:7px;height:7px;background:rgba(59,130,246,0.7);border-radius:1px"></div>Bull</div>
            <div style="display:flex;align-items:center;gap:3px;font-size:8px;"><div style="width:7px;height:7px;background:rgba(239,68,68,0.7);border-radius:1px"></div>Bear</div>
          </div>
        </div>
        <div class="histo-wrap">${buildHistogramSVG(hist,208,90)}</div>
      </div>

      <!-- CURRENCY STRENGTH RANKING -->
      <div style="padding:10px 12px;">
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">Currency Strength Rank</div>
        ${allScores.map(item=>{
          const isBase=item.code===baseCode,isQuote=item.code===quoteCode;
          const pct=Math.min(100,Math.abs(item.score)/maxAbsScore*100);
          const col=item.score>0?"var(--bull)":item.score<0?"var(--bear)":"var(--text3)";
          const highlight=isBase?"rgba(59,130,246,0.1)":isQuote?"rgba(234,179,8,0.07)":"";
          const border=isBase?"1px solid rgba(59,130,246,0.2)":isQuote?"1px solid rgba(234,179,8,0.15)":"1px solid transparent";
          return`<div class="fx-strength-row" style="background:${highlight};border:${border};border-radius:3px;padding:3px 4px;margin-bottom:2px;">
            <span class="fx-strength-flag">${item.flag}</span>
            <span class="fx-strength-code" style="color:${isBase?"#93c5fd":isQuote?"#fde68a":"var(--text)"}">${item.code}</span>
            <div class="fx-strength-bar-wrap">
              <div class="fx-strength-bar" style="width:${pct}%;background:${col};${item.score<0?"right:0":"left:0"}"></div>
            </div>
            <span class="fx-strength-score" style="color:${col}">${item.score>0?"+":""}${item.score}</span>
          </div>`;
        }).join("")}
      </div>
    </div>

    <!-- RIGHT: Breakdown sections -->
    <div class="fx-right">

      <!-- SECTION 3: Component Breakdown — Base currency -->
      <div class="fx-section">
        <div class="fx-section-hd">
          <span class="fx-section-title">${bd.flag} ${baseCode} — Component Breakdown</span>
          <span class="sc-badge ${biasCls(baseBias)}">${baseBias}</span>
        </div>
        <div class="fx-section-body">${compBreakdown(baseCode)}</div>
      </div>

      <!-- SECTION 3b: Component Breakdown — Quote currency -->
      <div class="fx-section">
        <div class="fx-section-hd">
          <span class="fx-section-title">${qd.flag} ${quoteCode} — Component Breakdown</span>
          <span class="sc-badge ${biasCls(quoteBias)}">${quoteBias}</span>
        </div>
        <div class="fx-section-body">${compBreakdown(quoteCode)}</div>
      </div>

      <!-- INFOBOX -->
      <div class="infobox ib-blue">
        <span class="iblabel" style="color:var(--accent)">ℹ PAIR SCORE LOGIC</span>
        Pair Score = <strong style="color:var(--text)">${baseCode} score (${baseScore>0?"+":""}${baseScore})</strong> − <strong style="color:var(--text)">${quoteCode} score (${quoteScore>0?"+":""}${quoteScore})</strong> = <strong style="color:${scoreCol}">${pairScore>0?"+":""}${pairScore}</strong><br>
        Positive = ${baseCode} stronger → bullish bias on ${fxPairId}.<br>
        Each currency is scored across 6 factors with weighted inputs.
      </div>
    </div>
  </div>`;
}

const CFTC_MAP={"EURO FX":{id:"EUR"},"BRITISH POUND STERLING":{id:"GBP"},"JAPANESE YEN":{id:"JPY"},"AUSTRALIAN DOLLAR":{id:"AUD"},"CANADIAN DOLLAR":{id:"CAD"},"SWISS FRANC":{id:"CHF"},"NEW ZEALAND DOLLAR":{id:"NZD"},"U.S. DOLLAR INDEX":{id:"USD"},"GOLD":{id:"Gold"},"SILVER":{id:"SILVER"},"CRUDE OIL, LIGHT SWEET":{id:"USOIL"},"BITCOIN":{id:"BTC"},"NASDAQ-100 MINI":{id:"NASDAQ"},"S&P 500 MINI":{id:"SPX"},"DOW JONES INDUSTRIAL AVG":{id:"DOW"},"10-YEAR U.S. TREASURY NOTES":{id:"US10T"},"COPPER-GRADE #1":{id:"COPPER"},"PLATINUM":{id:"PLATINUM"}};
function parseCFTCcsv(csvText){const lines=csvText.trim().split("\n");const header=lines[0].split(",").map(h=>h.trim().replace(/"/g,""));const iName=header.findIndex(h=>h.includes("Market_and_Exchange"));const iOI=header.findIndex(h=>h==="Open_Interest_All");const iLong=header.findIndex(h=>h==="NonComm_Positions_Long_All");const iShort=header.findIndex(h=>h==="NonComm_Positions_Short_All");const iDate=header.findIndex(h=>h.includes("Report_Date_as_YYYY"));const seen={};for(let i=1;i<lines.length;i++){const cols=[];let cur="",inQ=false;for(const ch of lines[i]){if(ch==='"'){inQ=!inQ;}else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}else cur+=ch;}cols.push(cur.trim());if(cols.length<10)continue;const rawName=(cols[iName]||"").replace(/"/g,"").trim();let matched=null;for(const key of Object.keys(CFTC_MAP)){if(rawName.toUpperCase().includes(key.toUpperCase())){matched=key;break;}}if(!matched)continue;const id=CFTC_MAP[matched].id;const longC=parseInt(cols[iLong])||0;const shortC=parseInt(cols[iShort])||0;const oi=parseInt(cols[iOI])||0;const date=(cols[iDate]||"").replace(/"/g,"");if(!seen[id]){seen[id]={first:{longC,shortC,oi,date}};}else if(!seen[id].second){seen[id].second={longC,shortC};}}const rows=[];for(const[key,info]of Object.entries(CFTC_MAP)){const s=seen[info.id];if(!s||!s.first)continue;const{longC,shortC,oi,date}=s.first;const total=longC+shortC;if(total===0)continue;const longPct=parseFloat(((longC/total)*100).toFixed(2));const shortPct=parseFloat(((shortC/total)*100).toFixed(2));const netPos=longC-shortC;let dLong=0,dShort=0,netChg=0;if(s.second){dLong=longC-s.second.longC;dShort=shortC-s.second.shortC;const prevTotal=s.second.longC+s.second.shortC;const prevLongPct=prevTotal>0?(s.second.longC/prevTotal)*100:50;netChg=parseFloat((longPct-prevLongPct).toFixed(2));}rows.push({id:info.id,longC,shortC,dLong,dShort,longPct,shortPct,netChg,netPos,oi,dOI:0,date});}return rows.sort((a,b)=>b.netChg-a.netChg);}
async function fetchCFTCData(){const proxies=[u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,u=>`https://corsproxy.io/?${encodeURIComponent(u)}`];for(const makeProxy of proxies){try{const r=await fetch(makeProxy(CFTC_URL));if(!r.ok)continue;const text=await r.text();let csv=text;try{const j=JSON.parse(text);if(j.contents)csv=j.contents;}catch(e){}if(!csv||csv.length<1000)continue;const rows=parseCFTCcsv(csv);if(rows.length>0)return rows;}catch(e){continue;}}throw new Error("CFTC fetch failed");}
function loadCOTData(){if(state.cotLoading)return;if(state.cotData&&state.cotLastUpdate){const age=(Date.now()-state.cotLastUpdate)/1000/60/60;if(age<12)return;}state.cotLoading=true;fetchCFTCData().then(rows=>{state.cotData=rows;state.cotLive=true;state.cotLoading=false;state.cotLastUpdate=Date.now();if(activeTab==="cot")renderCOT();}).catch(e=>{state.cotLoading=false;});}
function sentSignal(lp){if(lp>=75)return{label:"STRONG SELL",cls:"sig-strong-sell"};if(lp>=65)return{label:"SELL",cls:"sig-sell"};if(lp<=25)return{label:"STRONG BUY",cls:"sig-strong-buy"};if(lp<=35)return{label:"BUY",cls:"sig-buy"};return{label:"NEUTRAL",cls:"sig-neutral"};}
function pcSignal(pc){if(pc>=1.5)return{label:"EXTREME FEAR",col:"var(--bear)"};if(pc>=1.2)return{label:"FEAR",col:"var(--bear)"};if(pc>=0.9)return{label:"NEUTRAL",col:"var(--neutral)"};if(pc>=0.7)return{label:"GREED",col:"var(--bull)"};return{label:"EXTREME GREED",col:"var(--bull)"};}
const PROXIES=[u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`];
async function proxyFetch(targetUrl){for(const makeProxy of PROXIES){try{const r=await fetch(makeProxy(targetUrl));if(!r.ok)continue;const text=await r.text();try{const outer=JSON.parse(text);if(outer.contents)return JSON.parse(outer.contents);return outer;}catch(e){return JSON.parse(text);}}catch(e){continue;}}throw new Error("All proxies failed");}
async function myfxLogin(email,password){const d=await proxyFetch(`https://www.myfxbook.com/api/login.json?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);if(d.error)throw new Error(d.message||"Login error");return d.session;}

function loadMyfxbookData(){if(!state.mfxEmail||!state.mfxPassword||state.sentimentLoading)return;state.sentimentLoading=true;if(activeTab==="sentiment")renderSentiment();const timeout=setTimeout(()=>{state.sentimentLoading=false;state.sentimentLive=false;if(activeTab==="sentiment")renderSentiment();},15000);fetchMyfxbookSentiment().then(symbols=>{clearTimeout(timeout);state.sentimentData=symbols.map(s=>({name:s.name,longPercentage:parseFloat(s.longPercentage),shortPercentage:parseFloat(s.shortPercentage),longVolume:parseInt(s.longVolume)||0,shortVolume:parseInt(s.shortVolume)||0,longPositions:parseInt(s.longPositions)||0,shortPositions:parseInt(s.shortPositions)||0}));state.sentimentLive=true;state.sentimentLoading=false;if(activeTab==="sentiment")renderSentiment();}).catch(e=>{clearTimeout(timeout);state.sentimentLoading=false;state.sentimentLive=false;if(activeTab==="sentiment")renderSentiment();});}
async function fetchRates(){const r=await fetch("https://api.frankfurter.app/latest?from=USD");if(!r.ok)throw new Error();return(await r.json()).rates;}
async function fetchFearGreed(){const r=await fetch("https://api.alternative.me/fng/?limit=30&format=json");if(!r.ok)throw new Error();const d=await r.json();if(!d.data||!d.data.length)throw new Error();return d.data;}
function buildStrength(rates){if(!rates)return null;const all={...rates,USD:1};const st={};CURRS.forEach(c=>{st[c.code]=0;});CURRS.forEach(b=>CURRS.forEach(q=>{if(b.code===q.code||!all[b.code])return;st[b.code]+=Math.log(1/all[b.code])*.1;}));const vs=Object.values(st),mn=Math.min(...vs),mx=Math.max(...vs);return CURRS.map(c=>({...c,val:st[c.code]||0,pct:mx!==mn?((st[c.code]-mn)/(mx-mn))*100:50})).sort((a,b)=>b.val-a.val);}
async function fredFetch(id,key,lim){const r=await fetch("https://api.stlouisfed.org/fred/series/observations?series_id="+id+"&api_key="+key+"&file_type=json&sort_order=desc&limit="+lim);if(!r.ok)throw new Error();const d=await r.json();const v=(d.observations||[]).filter(o=>o.value!==".");if(!v.length)throw new Error();return v;}
async function fetchFREDEcon(key){const res={};for(const[cur,series]of Object.entries(FRED_SERIES)){res[cur]=[];for(const s of series){try{const obs=await fredFetch(s.id,key,13);let val=parseFloat(obs[0].value);const date=obs[0].date;let surprise=0;if(s.yoy&&obs.length>=13){const pv=parseFloat(obs[12].value);if(!isNaN(pv)&&pv!==0)val=((val-pv)/pv)*100;}if(obs.length>=2){const pv=parseFloat(obs[1].value);if(!isNaN(pv)){const diff=val-pv;if(Math.abs(diff)>.3)surprise=diff>0?.5:-.5;else if(Math.abs(diff)>.1)surprise=diff>0?.2:-.2;}}res[cur].push({l:s.label,v:isNaN(val)?"N/A":s.fmt(val),s:surprise,d:date?new Date(date).toLocaleDateString([],{month:"short",year:"numeric"}):""})}catch(e){const fb=(FALLBACK_ECON[cur]||[]).find(f=>f.l===s.label);res[cur].push(fb?{...fb}:{l:s.label,v:"N/A",s:0,d:""});}await new Promise(r=>setTimeout(r,150));}}return res;}
function loadFREDData(){if(!state.fredKey||state.econLoading)return;state.econLoading=true;fetchFREDEcon(state.fredKey).then(d=>{state.econData=d;state.econLive=true;state.econLoading=false;if(activeTab==="econ")renderEcon();}).catch(()=>{state.econLoading=false;});}

function renderCOT(){const data=state.cotData&&state.cotData.length?state.cotData:COT_DATA;const isLive=state.cotLive;const isLoading=state.cotLoading;let lastLabel="Mar 14, 2026";if(isLive&&data[0]&&data[0].date){try{const d=new Date(data[0].date.replace(/(\d{4})(\d{2})(\d{2})/,"$1-$2-$3"));lastLabel=d.toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});}catch(e){}}const badge=isLive?`<span class="cbadge-live">● LIVE · CFTC</span>`:isLoading?`<span class="cbadge" style="color:var(--accent)"><span class="spinning">↻</span> Fetching...</span>`:`<span class="cbadge-demo">FALLBACK</span>`;const sorted=[...data].sort((a,b)=>{if(state.cotSort.col==="id")return a.id.localeCompare(b.id)*state.cotSort.dir;return(b[state.cotSort.col]-a[state.cotSort.col])*state.cotSort.dir;});const chartHtml=`<div class="cot-chart-wrap"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;flex-wrap:wrap;gap:7px"><div><div style="font-family:var(--mono);font-size:11px;color:var(--text);font-weight:bold;margin-bottom:3px">COT Net Positioning</div><div style="font-family:var(--mono);font-size:9px;color:var(--text3)">Last Update: <strong style="color:var(--accent)">${lastLabel}</strong> · CFTC</div><div style="display:flex;gap:14px;margin-top:5px"><div class="cot-legend"><div class="cot-legend-dot" style="background:#3b82f6"></div><span style="color:var(--text3)">Long</span></div><div class="cot-legend"><div class="cot-legend-dot" style="background:#ef4444"></div><span style="color:var(--text3)">Short</span></div></div></div>${badge}</div><div class="cot-bars-scroll"><div class="cot-bars">${data.map(row=>{const lh=Math.round(row.longPct*1.4);const sh=Math.round(row.shortPct*1.4);return`<div class="cot-bar-wrap" onmouseenter="showTip(event,'${row.id}',${row.longPct},${row.shortPct})" onmouseleave="hideTip()"><div class="cot-bar-stacked" style="height:${lh+sh}px"><div class="cot-bar-short" style="height:${sh}px;display:flex;align-items:center; s="${doic}">${row.dOI>0?"+":""}${fmtK(row.dOI)}</td></tr>`;});tbl+=`</tbody></table></div>`;document.getElementById("page-cot").innerHTML=chartHtml+tbl+`<div class="infobox ib-blue"><span class="iblabel" style="color:var(--accent)">ℹ CFTC COT DATA</span>Published every Friday 3:30 PM EST. Tap column headers to sort.</div>`;}
