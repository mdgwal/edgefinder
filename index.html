ol" style="color:${volCol}">${volLabel}</div></div>`;});html+=`</div></div><div class="infobox ib-yellow"><span class="iblabel" style="color:var(--neutral)">⚡ CONTRARIAN LOGIC</span>65%+ retail long → SELL. 35% or less → BUY. Add Myfxbook in ⚙ Settings for live data.</div>`;}else if(sentSubTab==="smartmoney"){html+=`<div class="sectitle">Smart Money vs Retail — Divergence</div><div style="overflow-x:auto"><table class="smart-tbl"><thead><tr><th>Asset</th><th>Retail Long %</th><th>Smart Money Long %</th><th>Gap</th><th>Signal</th></tr></thead><tbody>`;SMART_MONEY.forEach(row=>{const gap=row.institutionalLong-row.retailLong;const gapCol=gap>0?"var(--bull)":gap<0?"var(--bear)":"var(--text3)";const signal=gap>20?"⬆ STRONG BUY":gap>10?"⬆ BUY":gap<-20?"⬇ STRONG SELL":gap<-10?"⬇ SELL":"→ NEUTRAL";const sigCol=gap>10?"var(--bull)":gap<-10?"var(--bear)":"var(--text3)";const rBar=`<div style="display:flex;align-items:center;gap:5px"><div style="flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden"><div style="width:${row.retailLong}%;height:100%;background:var(--bear);border-radius:2px"></div></div><span style="font-family:var(--mono);font-size:9px;color:var(--bear)">${row.retailLong}%</span></div>`;const sBar=`<div style="display:flex;align-items:center;gap:5px"><div style="flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden"><div style="width:${row.institutionalLong}%;height:100%;background:var(--bull);border-radius:2px"></div></div><span style="font-family:var(--mono);font-size:9px;color:var(--bull)">${row.institutionalLong}%</span></div>`;html+=`<tr><td>${row.id}</td><td>${rBar}</td><td>${sBar}</td><td style="color:${gapCol};font-family:var(--mono);font-weight:bold">${gap>0?"+":""}${gap}%</td><td style="color:${sigCol};font-family:var(--mono);font-weight:bold">${signal}</td></tr>`;});html+=`</tbody></table></div>`;}else if(sentSubTab==="putcall"){html+=`<div class="sectitle">Put/Call Ratio</div><div class="card"><div class="chd"><span class="ctitle">Options Market</span><span class="cbadge">CBOE</span></div><div class="cbody">`;const pcData=state.putCallData||PUT_CALL;pcData.forEach(row=>{const sig=pcSignal(row.pc);const barPct=Math.min(100,row.pc*50);const barCol=row.pc>=1.2?"var(--bear)":row.pc<=0.7?"var(--bull)":"var(--neutral)";html+=`<div class="pc-row"><div class="pc-asset">${row.id}</div><div class="pc-ratio" style="color:${sig.col}">${row.pc.toFixed(2)}</div><div class="pc-bar-wrap"><div class="pc-bar-track"><div class="pc-bar-fill" style="width:${barPct}%;background:${barCol}"></div></div><div style="font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:2px">${row.meaning}</div></div><div class="pc-signal" style="color:${sig.col}">${sig.label}</div></div>`;});html+=`</div></div>`;}else if(sentSubTab==="aaii"){const aaiiCurrent=state.aaiiData||AAII;const spreadCol=aaiiCurrent.spread>10?"var(--bull)":aaiiCurrent.spread<-10?"var(--bear)":"var(--neutral)";html+=`<div class="aaii-wrap"><div class="aaii-box" style="border-color:rgba(34,197,94,.2)"><div class="aaii-label">Bullish</div><div class="aaii-val" style="color:var(--bull)">${aaiiCurrent.bullish.val.toFixed(1)}%</div><div class="aaii-hist">Avg: ${aaiiCurrent.bullish.hist}%</div><div class="aaii-bar" style="background:var(--bull);width:${aaiiCurrent.bullish.val}%"></div></div><div class="aaii-box" style="border-color:rgba(234,179,8,.2)"><div class="aaii-label">Neutral</div><div class="aaii-val" style="color:var(--neutral)">${aaiiCurrent.neutral.val.toFixed(1)}%</div><div class="aaii-hist">Avg: ${aaiiCurrent.neutral.hist}%</div><div class="aaii-bar" style="background:var(--neutral);width:${aaiiCurrent.neutral.val}%"></div></div><div class="aaii-box" style="border-color:rgba(239,68,68,.2)"><div class="aaii-label">Bearish</div><div class="aaii-val" style="color:var(--bear)">${aaiiCurrent.bearish.val.toFixed(1)}%</div><div class="aaii-hist">Avg: ${aaiiCurrent.bearish.hist}%</div><div class="aaii-bar" style="background:var(--bear);width:${aaiiCurrent.bearish.val}%"></div></div></div><div class="card"><div class="chd"><span class="ctitle">Bull-Bear Spread</span></div><div class="cbody"><div style="text-align:center;padding:10px 0"><div style="font-family:var(--mono);font-size:44px;font-weight:bold;color:${spreadCol}">${aaiiCurrent.spread>0?"+":""}${aaiiCurrent.spread}%</div><div style="font-family:var(--mono);font-size:9px;color:var(--text3)">Bull - Bear Spread</div></div></div></div>`;}else if(sentSubTab==="extremes"){html+=`<div class="sectitle">Sentiment Extremes</div><div style="overflow-x:auto"><table class="extremes-tbl"><thead><tr><th>Asset</th><th>Direction</th><th>Retail %</th><th>Hist Avg</th><th>Deviation</th><th>Signal</th><th>Strength</th></tr></thead><tbody>`;EXTREMES.forEach(row=>{const isBull=row.signal.includes("BUY");const sigCol=isBull?"var(--bull)":"var(--bear)";html+=`<tr><td style="font-weight:bold;color:${sigCol}">${row.id}</td><td style="font-family:var(--mono);font-size:9px">${row.direction}</td><td style="font-family:var(--mono);color:${row.retailPct>50?"var(--bear)":"var(--bull)"}">${row.retailPct}%</td><td style="font-family:var(--mono);color:var(--text3)">${row.historicalAvg}%</td><td style="font-family:var(--mono);color:${row.deviation>0?"var(--bear)":"var(--bull)"}">${row.deviation>0?"+":""}${row.deviation}%</td><td style="font-family:var(--mono);font-weight:bold;color:${sigCol}">${row.signal}</td><td style="font-family:var(--mono);color:${row.strength==="Strong"?"var(--bull)":"var(--neutral)"}">${row.strength}</td></tr>`;});html+=`</tbody></table></div>`;}document.getElementById("page-sentiment").innerHTML=html;}

const ECO_SURPRISE_FALLBACK={USD:{score:62,indicators:[{n:"GDP",s:.3},{n:"CPI",s:-.1},{n:"Unemp",s:.2},{n:"Rate",s:0}]},GBP:{score:55,indicators:[{n:"GDP",s:.2},{n:"CPI",s:-.3},{n:"Unemp",s:-.1},{n:"Rate",s:0}]},EUR:{score:44,indicators:[{n:"GDP",s:-.2},{n:"CPI",s:-.4},{n:"Unemp",s:.1},{n:"Rate",s:0}]},JPY:{score:52,indicators:[{n:"GDP",s:-.5},{n:"CPI",s:.2},{n:"Tankan",s:.4},{n:"Rate",s:.1}]},NZD:{score:58,indicators:[{n:"GDP",s:.1},{n:"CPI",s:-.1},{n:"Trade",s:.3},{n:"Rate",s:0}]},CAD:{score:71,indicators:[{n:"GDP",s:.5},{n:"CPI",s:.3},{n:"Employ",s:.4},{n:"Rate",s:0}]},AUD:{score:63,indicators:[{n:"GDP",s:.3},{n:"CPI",s:.2},{n:"Employ",s:.3},{n:"Rate",s:0}]},CHF:{score:48,indicators:[{n:"GDP",s:0},{n:"CPI",s:-.2},{n:"Employ",s:.1},{n:"Rate",s:0}]}};
function calcSurpriseFromFRED(econData){const result={};const currencies=["USD","EUR","GBP","JPY"];for(const cur of currencies){const items=econData[cur]||[];if(!items.length)continue;const avg=items.reduce((a,i)=>a+i.s,0)/items.length;const score=Math.round(Math.max(0,Math.min(100,50+avg*100)));result[cur]={score,indicators:items.map(i=>({n:i.l.replace(" YoY","").replace("Unemploy","Unemp"),s:i.s}))};}return result;}
function makeGaugeSVG(score){const cx=60,cy=62,r=44;function ptAt(pct){const a=Math.PI-(pct/100)*Math.PI;return[cx+r*Math.cos(a),cy-r*Math.sin(a)];}const[x40a,y40a]=ptAt(40);const[x60a,y60a]=ptAt(60);const[x100,y100]=ptAt(100);const[x0,y0]=ptAt(0);const[nx,ny]=ptAt(score);const col=score>=70?"#22c55e":score>=45?"#eab308":"#ef4444";return`<svg viewBox="0 0 120 68" style="width:120px;height:70px"><path d="M ${x0.toFixed(1)} ${y0.toFixed(1)} A ${r} ${r} 0 0 1 ${x100.toFixed(1)} ${y100.toFixed(1)}" fill="none" stroke="#1a2133" stroke-width="10"/><path d="M ${x0.toFixed(1)} ${y0.toFixed(1)} A ${r} ${r} 0 0 1 ${x40a.toFixed(1)} ${y40a.toFixed(1)}" fill="none" stroke="rgba(239,68,68,.45)" stroke-width="10"/><path d="M ${x40a.toFixed(1)} ${y40a.toFixed(1)} A ${r} ${r} 0 0 1 ${x60a.toFixed(1)} ${y60a.toFixed(1)}" fill="none" stroke="rgba(234,179,8,.4)" stroke-width="10"/><path d="M ${x60a.toFixed(1)} ${y60a.toFixed(1)} A ${r} ${r} 0 0 1 ${x100.toFixed(1)} ${y100.toFixed(1)}" fill="none" stroke="rgba(34,197,94,.45)" stroke-width="10"/><line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="4" fill="#0a0d14" stroke="${col}" stroke-width="2"/><text x="11" y="66" fill="#64748b" font-size="8" font-family="monospace">0</text><text x="53" y="15" fill="#64748b" font-size="8" font-family="monospace">50</text><text x="99" y="66" fill="#64748b" font-size="8" font-family="monospace">100</text></svg>`;}
function renderEcon(){if(state.fredKey&&state.econLoading&&!state.econData){document.getElementById("page-econ").innerHTML=`<div class="econ-loading"><div class="spinner"></div><span>Fetching FRED data...</span></div>`;return;}const econSubTabs=[{id:"meter",label:"🎯 Surprise Meter"},{id:"heatmap",label:"🌡 Heatmap"}];let html=`<div class="eco-sub-tabs">${econSubTabs.map(t=>`<button class="eco-sub-tab${ecoSubTab===t.id?" active":""}" onclick="setEcoTab('${t.id}')">${t.label}</button>`).join("")}</div>`;if(ecoSubTab==="meter"){const ecoSurprise=state.econData?calcSurpriseFromFRED(state.econData):ECO_SURPRISE_FALLBACK;const merged={...ECO_SURPRISE_FALLBACK,...ecoSurprise};const scores=Object.entries(merged);const avg=Math.round(scores.reduce((a,[,v])=>a+v.score,0)/scores.length);const avgCol=avg>=70?"var(--bull)":avg>=45?"var(--neutral)":"var(--bear)";html+=`<div class="infobox ib-blue"><span class="iblabel" style="color:var(--accent)">ℹ ECONOMIC SURPRISE METER</span>Shows how economic data performs relative to expectations.</div><div class="gauge-grid">`;scores.forEach(([cur,data])=>{const col=data.score>=70?"var(--bull)":data.score>=45?"var(--neutral)":"var(--bear)";const status=data.score>=70?"Strong":data.score>=55?"Above Avg":data.score>=45?"Average":data.score>=30?"Below Avg":"Weak";html+=`<div class="gauge-wrap"><div class="gauge-label">${FLAGS[cur]||""} ${cur}</div>${makeGaugeSVG(data.score)}<div class="gauge-pct" style="color:${col}">${data.score}%</div><div class="gauge-status">${status}</div></div>`;});html+=`</div><div class="global-gauge-wrap"><div style="display:flex;flex-direction:column;align-items:center">${makeGaugeSVG(avg)}<div style="font-family:var(--mono);font-size:24px;font-weight:bold;color:${avgCol};margin-top:3px">${avg}%</div></div><div class="global-gauge-info"><div class="global-gauge-title">Global Surprise: ${avg}%</div><div class="global-gauge-desc">${avg>=70?"🟢 Broadly beating expectations":avg>=45?"⚪ In line with expectations":"🔴 Broadly missing expectations"}</div></div></div>`;}else{const data2=state.econData||FALLBACK_ECON;const isLive=state.econLive;if(!state.fredKey)html+=`<div class="infobox ib-yellow"><span class="iblabel" style="color:var(--neutral)">Get free FRED key at fred.stlouisfed.org → paste in ⚙ Settings.</span></div>`;for(const[cur,items]of Object.entries(data2)){const badge=isLive?`<span class="cbadge-live">● LIVE · FRED</span>`:`<span class="cbadge-demo">DEMO</span>`;html+=`<div class="card"><div class="chd"><span class="ctitle">${FLAGS[cur]||""} ${cur}</span>${badge}</div><div class="hgrid">`;items.forEach(i=>{const bg=i.s>.3?"rgba(34,197,94,.12)":i.s<-.3?"rgba(239,68,68,.12)":"rgba(234,179,8,.08)";const br=i.s>.3?"1px solid rgba(34,197,94,.18)":i.s<-.3?"1px solid rgba(239,68,68,.18)":"1px solid rgba(234,179,8,.14)";const lbl=i.s>.3?"▲ Beat":i.s<-.3?"▼ Miss":"→ In Line";const lc=i.s>.3?"var(--bull)":i.s<-.3?"var(--bear)":"var(--text3)";html+=`<div class="hcell" style="background:${bg};border:${br}"><div class="hlbl">${i.l}</div><div class="hval">${i.v}</div><div class="hchg" style="color:${lc}">${lbl}</div>${i.d?`<div class="hdate">${i.d}</div>`:""}</div>`;});html+=`</div></div>`;}}document.getElementById("page-econ").innerHTML=html;}
function setEcoTab(id){ecoSubTab=id;renderEcon();}

async function fetchYahooMonthly(symbol){const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1mo&range=11y&includePrePost=false`;let data=null;for(const makeUrl of[u=>u,u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`]){try{const r=await fetch(makeUrl(url));if(!r.ok)continue;const text=await r.text();try{const outer=JSON.parse(text);data=outer.contents?JSON.parse(outer.contents):outer;if(data?.chart?.result?.[0]?.indicators)break;data=null;}catch(e){continue;}}catch(e){continue;}}if(!data)throw new Error("Yahoo failed");const result=data.chart.result[0];const timestamps=result.timestamp;const closes=result.indicators.quote[0].close;const returns=[];for(let i=1;i<timestamps.length;i++){if(closes[i]==null||closes[i-1]==null)continue;const d=new Date(timestamps[i]*1000);const pct=parseFloat(((closes[i]-closes[i-1])/closes[i-1]*100).toFixed(4));returns.push({year:d.getFullYear(),month:d.getMonth(),pct});}return returns;}
function calcSeasonality(returns,years){const now=new Date();const cutoff=now.getFullYear()-years;const byMonth=Array(12).fill(null).map(()=>[]);returns.forEach(r=>{if(r.year>cutoff)byMonth[r.month].push(r.pct);});return byMonth.map(arr=>arr.length?parseFloat((arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2)):0);}
function calcCurrentYear(returns){const yr=new Date().getFullYear();const curMonth=new Date().getMonth();const result=Array(12).fill(null);returns.forEach(r=>{if(r.year===yr&&r.month<=curMonth)result[r.month]=parseFloat(r.pct.toFixed(2));});return result;}
async function fetchSeasonalityForAsset(assetId){const symbol=YAHOO_SYMBOLS[assetId];if(!symbol)return null;const returns=await fetchYahooMonthly(symbol);return{m10:calcSeasonality(returns,10),m5:calcSeasonality(returns,5),mCur:calcCurrentYear(returns),live:true};}
async function loadSeasonalityLive(){const selId=state.seasonAsset||"XAUUSD";const ids=SEASON_DATA.map(d=>d.id);const ordered=[selId,...ids.filter(id=>id!==selId)];for(const id of ordered){try{const live=await fetchSeasonalityForAsset(id);if(!live)continue;SEASON_DATA=SEASON_DATA.map(d=>d.id===id?{...d,...live}:d);if(id===state.seasonAsset&&activeTab==="seasonality")renderSeasonality();}catch(e){}await new Promise(r=>setTimeout(r,300));}if(activeTab==="seasonality")renderSeasonality();}

if(seasonView==="annual"){const m10=pair.m10,mCur=pair.mCur;const weeksPerMonth=[4,4,5,4,4,4,5,4,4,5,4,5];const wk10=[],wkCur=[];let cum10=0,cumCur=0;weeksPerMonth.forEach((wks,mi)=>{const wr10=m10[mi]/wks;const wrCur=mCur[mi]!=null?mCur[mi]/wks:null;for(let w=0;w<wks;w++){cum10+=wr10;if(wrCur!=null)cumCur+=wrCur;wk10.push(parseFloat(cum10.toFixed(3)));wkCur.push(wrCur!=null?parseFloat(cumCur.toFixed(3)):null);}});const W=680,H=260,padL=48,padR=48,padT=22,padB=46;const chartW=W-padL-padR,chartH=H-padT-padB,n=wk10.length;const allVals=[...wk10,...wkCur.filter(v=>v!=null),0];const yMax=Math.max(...allVals)+1.5,yMin=Math.min(...allVals)-1.5;function xPx(i){return padL+(i/(n-1))*chartW;}function yPx(v){return padT+chartH*(1-(v-yMin)/(yMax-yMin));}const yRange=yMax-yMin,yStep=yRange>20?4:yRange>10?2:1;let grid="",yLbl="";for(let t=Math.ceil(yMin/yStep)*yStep;t<=yMax+0.01;t+=yStep){const y=yPx(t).toFixed(1);const zero=Math.abs(t)<0.01;grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="${zero?'rgba(255,255,255,.15)':'rgba(255,255,255,.04)'}" stroke-width="${zero?1:0.5}"/>`;yLbl+=`<text x="${W-padR+5}" y="${parseFloat(y)+3}" fill="#64748b" font-size="8" font-family="monospace">${t>0?"+":""}${t.toFixed(0)}%</text>`;}let mDividers="",mLabels="";let wkIdx=0;weeksPerMonth.forEach((wks,mi)=>{const x=xPx(wkIdx).toFixed(1);mDividers+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${H-padB}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;const midX=xPx(wkIdx+wks/2).toFixed(1);mLabels+=`<text x="${midX}" y="${H-padB+13}" fill="${mi===curMonth?'#60a5fa':'#64748b'}" font-size="8" text-anchor="middle" font-family="monospace" font-weight="${mi===curMonth?'bold':'normal'}">${MONTH_SHORT[mi]}</text>`;wkIdx+=wks;});const pts10=wk10.map((v,i)=>`${xPx(i).toFixed(1)},${yPx(v).toFixed(1)}`).join(" ");const line10=`<polyline points="${pts10}" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-dasharray="5,4"/>`;const curPts=wkCur.map((v,i)=>v!=null?`${xPx(i).toFixed(1)},${yPx(v).toFixed(1)}`:null).filter(Boolean);const lineCur=curPts.length>1?`<polyline points="${curPts.join(" ")}" fill="none" stroke="#ef4444" stroke-width="2.5"/>` :"";const zeroY=yPx(0).toFixed(1);const baseline=`<line x1="${padL}" y1="${zeroY}" x2="${W-padR}" y2="${zeroY}" stroke="rgba(255,255,255,.2)" stroke-width="1"/>`;const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${grid}${mDividers}${baseline}${line10}${lineCur}${mLabels}${yLbl}</svg>`;html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px;margin-bottom:10px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:7px"><div style="font-family:var(--mono);font-size:11px;font-weight:bold;color:var(--text)">${pair.name} — Annual Seasonality</div><div style="display:flex;gap:14px"><div style="display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--text3)"><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="rgba(255,255,255,.7)" stroke-width="1.5" stroke-dasharray="5,3"/></svg>10yr Avg</div><div style="display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--text3)"><div style="width:20px;height:2px;background:#ef4444;border-radius:2px"></div>YTD</div></div></div><div style="overflow-x:auto">${svg}</div></div>`;}else{const m10=pair.m10,mCur=pair.mCur;const W=660,H=240,padL=48,padR=14,padT=26,padB=46;const chartW=W-padL-padR,chartH=H-padT-padB,n=12,barW=chartW/n*0.52;const allVals=[...m10,...mCur.filter(v=>v!=null),0];const yMax=Math.max(...allVals)*1.25+0.2,yMin=Math.min(...allVals)*1.25-0.2;function xCenter(i){return padL+i*(chartW/n)+(chartW/n)/2;}function yPx(v){return padT+chartH*(1-(v-yMin)/(yMax-yMin));}const zero=yPx(0);const yRange=yMax-yMin,yStep=yRange>8?2:yRange>4?1:0.5;let grid="",yLbl="";for(let t=Math.ceil(yMin/yStep)*yStep;t<=yMax+0.01;t=parseFloat((t+yStep).toFixed(4))){const y=yPx(t).toFixed(1);const isZ=Math.abs(t)<0.001;grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="${isZ?'rgba(255,255,255,.14)':'rgba(255,255,255,.04)'}" stroke-width="${isZ?1:0.5}"/>`;yLbl+=`<text x="${padL-5}" y="${parseFloat(y)+3}" fill="#64748b" font-size="8" text-anchor="end" font-family="monospace">${t>0?"+":""}${t.toFixed(2)}%</text>`;}let bars="",barLabels="",curDots="",curHighlight="";m10.forEach((v,i)=>{const cx=xCenter(i),x=cx-barW/2;const y=v>=0?yPx(v):zero,h=Math.max(2,Math.abs(yPx(v)-zero));const isCur=i===curMonth;if(isCur)curHighlight=`<rect x="${padL+i*(chartW/n)+1}" y="${padT}" width="${chartW/n-2}" height="${chartH}" fill="rgba(59,130,246,.05)" rx="2"/>`;const barCol=isCur?"#3b82f6":i<curMonth?"rgba(59,130,246,.85)":"rgba(59,130,246,.42)";bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" fill="${barCol}" rx="2"/>`;const lbl=(v>0?"+":"")+v.toFixed(2)+"%";const ly=v>=0?y-4:parseFloat(y)+h+10;barLabels+=`<text x="${cx.toFixed(1)}" y="${ly.toFixed(1)}" fill="${isCur?'#fff':'rgba(255,255,255,.75)'}" font-size="7.5" text-anchor="middle" font-family="monospace" font-weight="${isCur?'bold':'normal'}">${lbl}</text>`;const cv=mCur[i];if(cv!=null){curDots+=`<circle cx="${cx.toFixed(1)}" cy="${yPx(cv).toFixed(1)}" r="4.5" fill="white" stroke="#0a0d14" stroke-width="1.5"/>`;}barLabels+=`<text x="${cx.toFixed(1)}" y="${H-padB+13}" fill="${isCur?'#60a5fa':'#64748b'}" font-size="8" text-anchor="middle" font-family="monospace" font-weight="${isCur?'bold':'normal'}">${MONTH_NAMES[i]}</text>`;});const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${grid}${curHighlight}${bars}${barLabels}${curDots}</svg>`;const v10cur=m10[curMonth],vCur=mCur[curMonth];const sigCol=v10cur>=0.2?"var(--bull)":v10cur<=-0.2?"var(--bear)":"var(--neutral)";html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:12
