<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EdgeFinder Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080c10;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2330;
  --border:#21262d;--bull:#00ff88;--bear:#ff3b5c;
  --neutral:#f0b429;--accent:#58a6ff;
  --text:#e6edf3;--muted:#8b949e;
  --mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;
  --cell-bull:rgba(0,255,136,.18);--cell-bear:rgba(255,59,92,.18);
  --cell-strong-bull:rgba(0,255,136,.35);--cell-strong-bear:rgba(255,59,92,.35);
  --blue:#4a90d9;--red:#e05c6a;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;}
.hlogo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--bull),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:bold;color:#000;}
.logo-text{font-size:17px;font-weight:900;letter-spacing:-0.5px;}
.logo-text b{color:var(--bull);}
.hright{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted);}
.live-dot{width:7px;height:7px;background:var(--bull);border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lupdate{color:var(--accent);}
.rbtn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:14px;padding:4px 10px;border-radius:5px;cursor:pointer;}
.spinning{display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:11px 12px;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--mono);background:none;border-top:none;border-left:none;border-right:none;transition:color .2s;}
.tab.active{color:var(--bull);border-bottom-color:var(--bull);}
.main{padding:16px;max-width:1400px;width:100%;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
.score-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px;}
.score-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;min-width:900px;}
.score-table th{background:var(--bg3);color:var(--muted);text-align:center;padding:8px 6px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.score-table th.left{text-align:left;}
.score-table th.group{background:var(--bg4);color:var(--accent);font-size:9px;letter-spacing:1px;}
.score-table td{padding:7px 6px;border:1px solid var(--border);text-align:center;font-size:11px;}
.score-table td.asset-name{text-align:left;font-weight:bold;font-size:12px;white-space:nowrap;background:var(--bg2);position:sticky;left:0;z-index:2;padding-left:10px;}
.score-table td.bias-cell{font-size:10px;font-weight:600;white-space:nowrap;}
.score-table td.total-cell{font-size:14px;font-weight:bold;}
.score-table tr:hover td{filter:brightness(1.15);}
.c2{background:var(--cell-strong-bull);color:var(--bull);}
.c1{background:var(--cell-bull);color:var(--bull);}
.c0{background:var(--bg2);color:var(--muted);}
.cm1{background:var(--cell-bear);color:var(--bear);}
.cm2{background:var(--cell-strong-bear);color:var(--bear);}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;}
.filter-btn.active{background:var(--bull);color:#000;border-color:var(--bull);}
.filter-label{font-family:var(--mono);font-size:10px;color:var(--muted);margin-right:4px;}
.cot-chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
.cot-legend{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;}
.cot-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.cot-bars-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cot-bars-scroll::-webkit-scrollbar{height:4px;}
.cot-bars-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.cot-bars{display:flex;align-items:flex-end;gap:6px;height:180px;min-width:max-content;padding-bottom:32px;}
.cot-bar-wrap{display:flex;flex-direction:column;align-items:center;width:48px;flex-shrink:0;height:100%;justify-content:flex-end;position:relative;}
.cot-bar-stacked{width:100%;border-radius:3px 3px 0 0;overflow:hidden;display:flex;flex-direction:column-reverse;cursor:pointer;}
.cot-bar-stacked:hover{filter:brightness(1.2);}
.cot-bar-long{background:var(--blue);}
.cot-bar-short{background:var(--red);}
.cot-bar-label{font-family:var(--mono);font-size:8px;color:var(--muted);text-align:center;position:absolute;bottom:-26px;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cot-tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px;}
.cot-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;min-width:900px;}
.cot-tbl th{background:var(--bg3);color:var(--muted);text-align:right;padding:9px 10px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;cursor:pointer;}
.cot-tbl th:first-child{text-align:left;}
.cot-tbl th:hover{color:var(--text);}
.cot-tbl td{padding:8px 10px;border:1px solid var(--border);text-align:right;font-size:11px;white-space:nowrap;}
.cot-tbl td:first-child{text-align:left;font-weight:bold;font-size:12px;background:var(--bg2);position:sticky;left:0;}
.cot-tbl tr:hover td{background:var(--bg3);}
.cot-tbl tr:hover td:first-child{background:var(--bg3);}
.pos-highlight{font-weight:bold;padding:3px 8px;border-radius:4px;}
.pos-bull{background:rgba(74,144,217,.25);color:#4a90d9;}
.pos-bear{background:rgba(224,92,106,.25);color:#e05c6a;}
.pct-bull{color:var(--bull);}
.pct-bear{color:var(--bear);}
.pct-neutral{color:var(--muted);}
.delta-bull{color:var(--bull);}
.delta-bear{color:var(--bear);}
/* SENTIMENT */
.sent-sub-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.sent-sub-tab{font-family:var(--mono);font-size:10px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;transition:all .2s;}
.sent-sub-tab.active{background:var(--accent);color:#000;border-color:var(--accent);}
.sent-row-big{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.sent-row-big:last-child{border-bottom:none;}
.sent-pair-big{font-family:var(--mono);font-size:12px;font-weight:bold;width:80px;flex-shrink:0;}
.sent-signal{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;width:110px;text-align:center;}
.sig-strong-buy{background:rgba(0,255,136,.2);color:var(--bull);border:1px solid rgba(0,255,136,.3);}
.sig-buy{background:rgba(0,255,136,.1);color:var(--bull);border:1px solid rgba(0,255,136,.2);}
.sig-neutral{background:rgba(240,180,41,.1);color:var(--neutral);border:1px solid rgba(240,180,41,.2);}
.sig-sell{background:rgba(255,59,92,.1);color:var(--bear);border:1px solid rgba(255,59,92,.2);}
.sig-strong-sell{background:rgba(255,59,92,.2);color:var(--bear);border:1px solid rgba(255,59,92,.3);}
.sent-bar-big{flex:1;}
.sent-track-big{height:10px;background:var(--bg4);border-radius:5px;overflow:hidden;display:flex;}
.sent-long-big{height:100%;border-radius:5px 0 0 5px;background:var(--bull);transition:width .8s;}
.sent-short-big{height:100%;border-radius:0 5px 5px 0;background:var(--bear);transition:width .8s;}
.sent-vol{font-family:var(--mono);font-size:9px;color:var(--muted);width:60px;text-align:right;flex-shrink:0;}
.smart-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.smart-tbl th{background:var(--bg3);color:var(--muted);text-align:center;padding:8px 10px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;}
.smart-tbl th:first-child{text-align:left;}
.smart-tbl td{padding:9px 10px;border:1px solid var(--border);text-align:center;font-size:11px;}
.smart-tbl td:first-child{text-align:left;font-weight:bold;font-size:12px;background:var(--bg2);position:sticky;left:0;}
.smart-tbl tr:hover td{background:var(--bg3);}
.diverge-bull{background:rgba(0,255,136,.15);color:var(--bull);font-weight:bold;padding:3px 8px;border-radius:4px;}
.diverge-bear{background:rgba(255,59,92,.15);color:var(--bear);font-weight:bold;padding:3px 8px;border-radius:4px;}
.diverge-neutral{color:var(--muted);}
.pc-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.pc-row:last-child{border-bottom:none;}
.pc-asset{font-family:var(--mono);font-size:12px;font-weight:bold;width:80px;flex-shrink:0;}
.pc-ratio{font-family:var(--mono);font-size:16px;font-weight:bold;width:55px;flex-shrink:0;text-align:center;}
.pc-bar-wrap{flex:1;}
.pc-bar-track{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.pc-bar-fill{height:100%;border-radius:4px;transition:width .8s;}
.pc-signal{font-family:var(--mono);font-size:10px;width:100px;text-align:right;flex-shrink:0;}
.aaii-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
@media(max-width:500px){.aaii-wrap{grid-template-columns:1fr;}}
.aaii-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.aaii-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.aaii-val{font-family:var(--mono);font-size:28px;font-weight:bold;margin:6px 0;}
.aaii-hist{font-family:var(--mono);font-size:9px;color:var(--muted);}
.aaii-bar{height:6px;border-radius:3px;margin-top:8px;}
.extremes-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.extremes-tbl th{background:var(--bg3);color:var(--muted);text-align:left;padding:8px 10px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;}
.extremes-tbl td{padding:9px 10px;border:1px solid var(--border);font-size:11px;}
.extremes-tbl tr:hover td{background:var(--bg3);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.chd{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);}
.ctitle{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);}
.cbadge-live{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid rgba(0,255,136,.3);color:var(--bull);}
.cbadge-demo{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid rgba(240,180,41,.3);color:var(--neutral);}
.cbadge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;background:var(--bg4);border:1px solid var(--border);color:var(--muted);}
.cbody{padding:14px;}
.hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:10px;}
@media(max-width:500px){.hgrid{grid-template-columns:repeat(2,1fr);}}
.hcell{padding:10px;border-radius:7px;text-align:center;}
.hlbl{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.7);}
.hval{font-family:var(--mono);font-size:15px;font-weight:bold;color:#fff;margin:3px 0;}
.hchg{font-family:var(--mono);font-size:9px;}
.hdate{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.4);margin-top:1px;}
.crow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.crow:last-child{border-bottom:none;}
.crank{font-family:var(--mono);font-size:10px;color:var(--muted);width:18px;flex-shrink:0;}
.ccode{font-family:var(--mono);font-size:12px;font-weight:bold;width:40px;flex-shrink:0;}
.cname{font-size:10px;color:var(--muted);width:100px;flex-shrink:0;}
.cbarw{flex:1;}
.cbart{height:7px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.cbarf{height:100%;border-radius:4px;transition:width .8s;}
.cval{font-family:var(--mono);font-size:11px;width:48px;text-align:right;flex-shrink:0;}
.carry-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.carry-row:last-child{border-bottom:none;}
.fg-bar{width:100%;height:16px;border-radius:8px;background:linear-gradient(to right,#ff3b5c,#ff8c00,#f0b429,#7effc4,#00ff88);position:relative;margin:16px 0 6px;}
.fg-pointer{width:4px;height:24px;background:white;border-radius:2px;position:absolute;top:-4px;transform:translateX(-50%);box-shadow:0 0 8px rgba(255,255,255,.6);}
.fg-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:4px;}
.sectitle{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sectitle::after{content:'';flex:1;height:1px;background:var(--border);}
.infobox{padding:11px;border-radius:8px;font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:12px;}
.ib-blue{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.15);}
.ib-yellow{background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.15);}
.ib-green{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.15);}
.iblabel{font-family:var(--mono);display:block;margin-bottom:4px;}
.lrow{display:flex;align-items:center;gap:8px;padding:8px 0;color:var(--muted);font-family:var(--mono);font-size:11px;}
.spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--bull);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
.apibox{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;}
.apibox h3{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:10px;letter-spacing:1px;}
.apirow{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.apilbl{font-family:var(--mono);font-size:10px;color:var(--muted);width:100px;flex-shrink:0;}
.apiinp{flex:1;min-width:140px;background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:8px 10px;font-family:var(--mono);font-size:11px;color:var(--text);outline:none;}
.apibtn{background:var(--bull);color:#000;border:none;border-radius:5px;padding:8px 16px;font-family:var(--mono);font-size:11px;font-weight:bold;cursor:pointer;}
.key-status{font-family:var(--mono);font-size:10px;margin-top:5px;padding:6px 10px;border-radius:5px;}
.key-ok{background:rgba(0,255,136,.08);color:var(--bull);border:1px solid rgba(0,255,136,.2);}
.key-missing{background:rgba(240,180,41,.08);color:var(--neutral);border:1px solid rgba(240,180,41,.2);}
.econ-loading{display:flex;align-items:center;gap:8px;padding:30px;color:var(--muted);font-family:var(--mono);font-size:11px;justify-content:center;}
.tooltip{position:fixed;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:var(--mono);font-size:11px;color:var(--text);pointer-events:none;z-index:999;display:none;}

/* ── ECONOMIC SURPRISE METER ── */
.eco-sub-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.eco-sub-tab{font-family:var(--mono);font-size:10px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;transition:all .2s;}
.eco-sub-tab.active{background:var(--accent);color:#000;border-color:var(--accent);}
.gauge-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:16px;}
@media(min-width:600px){.gauge-grid{grid-template-columns:repeat(4,1fr);}}
.gauge-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 10px 12px;display:flex;flex-direction:column;align-items:center;}
.gauge-label{font-family:var(--mono);font-size:13px;font-weight:bold;color:var(--text);margin-bottom:8px;}
.gauge-pct{font-family:var(--mono);font-size:20px;font-weight:bold;margin-top:4px;}
.gauge-status{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.global-gauge-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;align-items:center;gap:24px;margin-bottom:16px;flex-wrap:wrap;}
.global-gauge-info{flex:1;min-width:200px;}
.global-gauge-title{font-family:var(--mono);font-size:13px;font-weight:bold;color:var(--text);margin-bottom:8px;}
.global-gauge-desc{font-size:12px;color:var(--muted);line-height:1.6;}


/* ── SEASONALITY ── */
.season-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px;}
@media(min-width:700px){.season-grid{grid-template-columns:repeat(3,1fr);}}
.season-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.season-card-hd{padding:10px 12px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.season-pair{font-family:var(--mono);font-size:12px;font-weight:bold;color:var(--text);}
.season-months{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;padding:8px;}
.season-month{border-radius:3px;padding:4px 2px;text-align:center;font-family:var(--mono);font-size:8px;cursor:default;}
.season-month .sm-lbl{color:rgba(255,255,255,.7);font-size:7px;}
.season-month .sm-val{font-weight:bold;font-size:9px;}
.sm-bull2{background:rgba(0,255,136,.35);}
.sm-bull1{background:rgba(0,255,136,.18);}
.sm-neutral{background:rgba(240,180,41,.12);}
.sm-bear1{background:rgba(255,59,92,.18);}
.sm-bear2{background:rgba(255,59,92,.35);}
.sm-current{outline:2px solid var(--accent);outline-offset:-1px;}

/* ── TOP SETUPS SUB-TABS ── */
.setups-sub-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.setups-sub-tab{font-family:var(--mono);font-size:9px;padding:5px 11px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.setups-sub-tab.active{background:var(--bull);color:#000;border-color:var(--bull);}
.row-vbull{background:rgba(0,255,136,.08);}
.row-bull{background:rgba(0,255,136,.04);}
.row-bear{background:rgba(255,59,92,.04);}
.row-vbear{background:rgba(255,59,92,.08);}
.score-badge{display:inline-block;font-family:var(--mono);font-size:13px;font-weight:bold;min-width:30px;text-align:center;}
.simple-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
.simple-tbl th{background:var(--bg3);color:var(--muted);padding:10px 12px;border:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.6px;text-align:center;}
.simple-tbl th:first-child{text-align:left;}
.simple-tbl td{padding:10px 12px;border:1px solid var(--border);text-align:center;font-size:12px;}
.simple-tbl td:first-child{text-align:left;font-weight:bold;font-size:13px;}
.simple-tbl tr:hover td{filter:brightness(1.1);}

/* ═══════════════════════════════════════════════════
   SCORECARD — INSTITUTIONAL TRADING TERMINAL THEME
   ═══════════════════════════════════════════════════ */
:root{
  /* Signal palette — muted, professional */
  --sc-bull:#34d399;   /* emerald-400: readable, not neon */
  --sc-bull-dim:#059669; /* emerald-600 for zones */
  --sc-bear:#f87171;   /* red-400 */
  --sc-bear-dim:#dc2626;
  --sc-neut:#6b7280;   /* gray-500 */
  --sc-amber:#fbbf24;

  /* Surface hierarchy */
  --sc-bg0:#080c10;    /* page base */
  --sc-bg1:#0d1117;    /* primary card */
  --sc-bg2:#111827;    /* secondary card */
  --sc-bg3:#1a2335;    /* inset / hover */
  --sc-border:rgba(255,255,255,.06);
  --sc-border2:rgba(255,255,255,.10);

  /* Typography */
  --sc-t1:#e2e8f0;     /* headings */
  --sc-t2:#94a3b8;     /* body */
  --sc-t3:#4b5563;     /* muted */

  /* Spacing & geometry */
  --sc-r:6px;          /* card radius — tight institutional feel */
  --sc-r2:8px;
}

/* ── SHARED LAYOUT ─────────────────────────────────────────────── */
.sc-page { padding:0; }
.sc-topbar {
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px; margin-bottom:18px;
  padding-bottom:14px; border-bottom:1px solid var(--sc-border);
}
.sc-title    { font-size:15px; font-weight:700; color:var(--sc-t1); letter-spacing:-.2px; }
.sc-subtitle { font-size:11px; color:var(--sc-t3); margin-top:2px; }

.sc-sel {
  background:var(--sc-bg2); border:1px solid var(--sc-border2);
  color:var(--sc-t1); font-size:12px; padding:7px 12px;
  border-radius:var(--sc-r); outline:none; cursor:pointer;
  min-width:150px; transition:border-color .15s;
}
.sc-sel:hover { border-color:rgba(255,255,255,.2); }

/* Status chips */
.sc-chip-live   { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px; background:rgba(52,211,153,.08); color:var(--sc-bull); border:1px solid rgba(52,211,153,.18); }
.sc-chip-static { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px; background:rgba(107,114,128,.08); color:var(--sc-neut); border:1px solid rgba(107,114,128,.15); }

/* Badge system */
.sc-badge { display:inline-block; padding:1px 7px; border-radius:3px; font-size:9px; font-weight:700; letter-spacing:.3px; }
.badge-bull,.pm-bull { background:rgba(52,211,153,.1); color:var(--sc-bull); border:1px solid rgba(52,211,153,.2); }
.badge-bear,.pm-bear { background:rgba(248,113,113,.1); color:var(--sc-bear); border:1px solid rgba(248,113,113,.2); }
.badge-neut,.pm-neut { background:rgba(107,114,128,.08); color:var(--sc-neut); border:1px solid rgba(107,114,128,.15); }
.sc-tbl-badge { display:inline-block; padding:1px 7px; border-radius:3px; font-size:9px; font-weight:700; }

/* ── ASSET SCORECARD ───────────────────────────────────────────── */
/* Two-column master layout: 240px left / fluid right */
.sc-layout {
  display:grid; grid-template-columns:240px 1fr;
  gap:14px; align-items:start;
}
@media(max-width:780px){ .sc-layout{ grid-template-columns:1fr; } }

/* Left panel */
.sc-panel-left { display:flex; flex-direction:column; gap:10px; }

.sc-gauge-card {
  background:var(--sc-bg1); border:1px solid var(--sc-border);
  border-radius:var(--sc-r2); padding:20px 16px;
  text-align:center;
}
.sc-gauge-svg   { width:154px; height:88px; display:block; margin:0 auto 2px; }
.sc-score-num   { font-size:48px; font-weight:800; line-height:1; letter-spacing:-2px; margin:6px 0 2px; }
.sc-edge-lbl    { font-size:9px; font-weight:600; letter-spacing:1.8px; color:var(--sc-t3); text-transform:uppercase; margin-bottom:8px; }
.sc-bias-pill   { display:inline-block; font-size:11px; font-weight:700; padding:4px 16px; border-radius:4px; letter-spacing:.2px; }

/* Component 2×3 grid */
.sc-comp-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.sc-comp-card {
  background:var(--sc-bg1); border:1px solid var(--sc-border);
  border-radius:var(--sc-r); padding:10px 12px;
  transition:border-color .15s, background .15s;
}
.sc-comp-card:hover { border-color:var(--sc-border2); background:var(--sc-bg3); }
.sc-comp-card-lbl  { font-size:8px; font-weight:700; letter-spacing:1px; color:var(--sc-t3); text-transform:uppercase; margin-bottom:5px; }
.sc-comp-card-val  { font-size:20px; font-weight:800; line-height:1; letter-spacing:-1px; margin-bottom:3px; }
.sc-comp-card-bias { font-size:9px; font-weight:600; }
.sc-comp-bar       { height:2px; border-radius:1px; background:rgba(255,255,255,.05); margin-top:7px; overflow:hidden; }
.sc-comp-bar-fill  { height:100%; border-radius:1px; transition:width .5s ease; }

/* Right panel */
.sc-panel-right { display:flex; flex-direction:column; gap:10px; }

/* History chart card */
.sc-history-card {
  background:var(--sc-bg1); border:1px solid var(--sc-border);
  border-radius:var(--sc-r2); overflow:hidden;
}
.sc-history-hd {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px; border-bottom:1px solid var(--sc-border);
}
.sc-history-title { font-size:10px; font-weight:700; letter-spacing:.5px; color:var(--sc-t2); text-transform:uppercase; }

/* Detail cards */
.sc-detail-card {
  background:var(--sc-bg1); border:1px solid var(--sc-border);
  border-radius:var(--sc-r2); overflow:hidden;
}
.sc-detail-hd {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 14px; background:rgba(255,255,255,.02);
  border-bottom:1px solid var(--sc-border);
}
.sc-detail-hd-title { font-size:10px; font-weight:700; color:var(--sc-t2); letter-spacing:.3px; }
.sc-detail-hd-score { font-size:12px; font-weight:800; }
.sc-metric-row {
  display:grid; grid-template-columns:1fr auto auto;
  gap:10px; align-items:center;
  padding:8px 14px; border-bottom:1px solid rgba(255,255,255,.03);
}
.sc-metric-row:last-child { border-bottom:none; }
.sc-metric-name { font-size:11px; color:var(--sc-t1); }
.sc-metric-surp { font-size:11px; font-weight:600; text-align:right; }

/* Weight bar (compact) */
.sc-wt-bar { display:flex; align-items:center; gap:8px; padding:7px 14px; border-bottom:1px solid rgba(255,255,255,.03); }
.sc-wt-bar:last-child { border-bottom:none; }
.sc-wt-label { font-size:10px; color:var(--sc-t2); flex:1; }
.sc-wt-track { width:80px; height:3px; background:rgba(255,255,255,.06); border-radius:1px; overflow:hidden; }
.sc-wt-fill  { height:100%; border-radius:1px; transition:width .4s ease; }
.sc-wt-val   { font-size:11px; font-weight:700; min-width:26px; text-align:right; }

/* ── FOREX SCORECARD ───────────────────────────────────────────── */
/* Single-column flow: selector → score header → history → comps → ranking */
.fx-page { display:flex; flex-direction:column; gap:14px; }

/* Score header row */
.fx-score-header {
  display:grid; grid-template-columns:auto 1fr auto;
  gap:16px; align-items:center;
  background:var(--sc-bg1); border:1px solid var(--sc-border);
  border-radius:var(--sc-r2); padding:16px 20px;
}
@media(max-width:600px){ .fx-score-header{ grid-template-columns:1fr; gap:10px; text-align:center; } }
.fx-pair-big  { font-size:32px; font-weight:800; letter-spacing:-1.5px; color:var(--sc-t1); line-height:1; }
.fx-pair-sub  { font-size:10px; color:var(--sc-t3); margin-top:2px; }
.fx-score-big { font-size:48px; font-weight:800; letter-spacing:-2px; line-height:1; }
.fx-score-lbl { font-size:9px; font-weight:700; letter-spacing:1.5px; color:var(--sc-t3); text-transform:uppercase; margin-top:3px; }

/* Currency bars inside header */
.fx-ccy-section { display:flex; flex-direction:column; gap:8px; min-width:160px; }
.fx-ccy-row2    { display:flex; align-items:center; gap:8px; }
.fx-ccy-tag     { font-size:10px; font-weight:700; width:30px; flex-shrink:0; }
.fx-ccy-track   { flex:1; height:5px; background:rgba(255,255,255,.06); border-radius:2px; overflow:hidden; }
.fx-ccy-fill    { height:100%; border-radius:2px; transition:width .5s ease; }
.fx-ccy-val     { font-size:11px; font-weight:700; min-width:26px; text-align:right; }

/* Pair pill nav */
.fx-pair-nav    { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.fx-pair-pill   {
  font-size:10px; font-weight:600; padding:5px 12px; border-radius:4px;
  border:1px solid var(--sc-border2); background:transparent;
  color:var(--sc-t3); cursor:pointer; transition:all .12s;
  letter-spacing:.2px;
}
.fx-pair-pill:hover { color:var(--sc-t1); border-color:rgba(255,255,255,.2); background:rgba(255,255,255,.03); }
.fx-pair-pill.p-bull { background:rgba(52,211,153,.08); border-color:rgba(52,211,153,.25); color:var(--sc-bull); }
.fx-pair-pill.p-bear { background:rgba(248,113,113,.08); border-color:rgba(248,113,113,.25); color:var(--sc-bear); }
.fx-pair-pill.p-neut { background:rgba(107,114,128,.06); border-color:rgba(107,114,128,.2); color:var(--sc-neut); }

/* Component breakdown grid */
.fx-comp-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
@media(max-width:600px){ .fx-comp-grid{ grid-template-columns:repeat(2,1fr); } }
.fx-comp-mini {
  background:var(--sc-bg1); border:1px solid var(--sc-border);
  border-radius:var(--sc-r); padding:12px 14px;
  transition:border-color .15s;
}
.fx-comp-mini:hover { border-color:var(--sc-border2); }
.fx-comp-mini-lbl   { font-size:8px; font-weight:700; letter-spacing:1px; color:var(--sc-t3); text-transform:uppercase; margin-bottom:8px; }
.fx-comp-mini-row   { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.fx-comp-mini-ccy   { font-size:9px; font-weight:600; color:var(--sc-t3); }
.fx-comp-mini-val   { font-size:13px; font-weight:800; }
.fx-comp-divider    { height:1px; background:rgba(255,255,255,.05); margin:6px 0; }
.fx-comp-diff       { font-size:9px; font-weight:700; text-align:center; letter-spacing:.2px; }

/* Currency ranking */
.sc-ranking-card {
  background:var(--sc-bg1); border:1px solid var(--sc-border);
  border-radius:var(--sc-r2); overflow:hidden;
}
.sc-ranking-hd {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 14px; border-bottom:1px solid var(--sc-border);
  font-size:10px; font-weight:700; color:var(--sc-t2); text-transform:uppercase; letter-spacing:.5px;
}
.sc-rank-row {
  display:flex; align-items:center; gap:10px;
  padding:8px 14px; border-bottom:1px solid rgba(255,255,255,.03);
}
.sc-rank-row:last-child { border-bottom:none; }

</style>

// ── CFTC COT LIVE FETCH ────────────────────────────────────────────────────────
// CFTC publishes FinFutWk.txt every Friday ~3:30 PM EST
// Contains non-commercial (speculative/smart money) positions for all futures
const CFTC_URL="https://www.cftc.gov/files/dea/newcot/FinFutWk.txt";

// Map CFTC market names → our asset IDs
const CFTC_MAP={
  "EURO FX":                        {id:"EUR",  name:"Euro"},
  "BRITISH POUND STERLING":         {id:"GBP",  name:"British Pound"},
  "JAPANESE YEN":                   {id:"JPY",  name:"Japanese Yen"},
  "AUSTRALIAN DOLLAR":              {id:"AUD",  name:"Australian Dollar"},
  "CANADIAN DOLLAR":                {id:"CAD",  name:"Canadian Dollar"},
  "SWISS FRANC":                    {id:"CHF",  name:"Swiss Franc"},
  "NEW ZEALAND DOLLAR":             {id:"NZD",  name:"New Zealand Dollar"},
  "U.S. DOLLAR INDEX":              {id:"USD",  name:"US Dollar Index"},
  "GOLD":                           {id:"Gold", name:"Gold"},
  "SILVER":                         {id:"SILVER",name:"Silver"},
  "CRUDE OIL, LIGHT SWEET":         {id:"USOIL",name:"Crude Oil"},
  "BITCOIN":                        {id:"BTC",  name:"Bitcoin"},
  "NASDAQ-100 MINI":                {id:"NASDAQ",name:"NASDAQ-100"},
  "S&P 500 MINI":                   {id:"SPX",  name:"S&P 500"},
  "DOW JONES INDUSTRIAL AVG":       {id:"DOW",  name:"Dow Jones"},
  "10-YEAR U.S. TREASURY NOTES":    {id:"US10T",name:"US 10Y T-Note"},
  "COPPER-GRADE #1":                {id:"COPPER",name:"Copper"},
  "PLATINUM":                       {id:"PLATINUM",name:"Platinum"},
};

function parseCFTCcsv(csvText){
  const lines=csvText.trim().split("\n");
  const header=lines[0].split(",").map(h=>h.trim().replace(/"/g,""));
  // Column indices
  const iName   = header.findIndex(h=>h.includes("Market_and_Exchange"));
  const iDate   = header.findIndex(h=>h.includes("Report_Date_as_YYYY"));
  const iOI     = header.findIndex(h=>h==="Open_Interest_All");
  const iLong   = header.findIndex(h=>h==="NonComm_Positions_Long_All");
  const iShort  = header.findIndex(h=>h==="NonComm_Positions_Short_All");
  const iLongOld= header.findIndex(h=>h==="NonComm_Positions_Long_Old")||iLong;
  const iShortOld=header.findIndex(h=>h==="NonComm_Positions_Short_Old")||iShort;

  const results=[];
  // We need previous week too — grab last 2 entries per market
  const seen={};

  for(let i=1;i<lines.length;i++){
    // Parse CSV line handling quoted fields
    const cols=[];let cur="",inQ=false;
    for(const ch of lines[i]){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=ch;
    }
    cols.push(cur.trim());
    if(cols.length<10)continue;

    const rawName=(cols[iName]||"").replace(/"/g,"").trim();
    // Find matching CFTC_MAP key
    let matched=null;
    for(const key of Object.keys(CFTC_MAP)){
      if(rawName.toUpperCase().includes(key.toUpperCase())){matched=key;break;}
    }
    if(!matched)continue;

    const id=CFTC_MAP[matched].id;
    const longC=parseInt(cols[iLong])||0;
    const shortC=parseInt(cols[iShort])||0;
    const oi=parseInt(cols[iOI])||0;
    const date=(cols[iDate]||"").replace(/"/g,"");

    if(!seen[id]){
      // First occurrence = latest week
      seen[id]={first:{longC,shortC,oi,date}};
    }else if(!seen[id].second){
      // Second occurrence = previous week
      seen[id].second={longC,shortC};
    }
  }

  // Build final COT rows
  const rows=[];
  for(const [key,info] of Object.entries(CFTC_MAP)){
    const s=seen[info.id];
    if(!s||!s.first)continue;
    const {longC,shortC,oi,date}=s.first;
    const total=longC+shortC;
    if(total===0)continue;
    const longPct=parseFloat(((longC/total)*100).toFixed(2));
    const shortPct=parseFloat(((shortC/total)*100).toFixed(2));
    const netPos=longC-shortC;
    // Change vs previous week
    let dLong=0,dShort=0,netChg=0;
    if(s.second){
      dLong=longC-s.second.longC;
      dShort=shortC-s.second.shortC;
      const prevTotal=s.second.longC+s.second.shortC;
      const prevLongPct=prevTotal>0?(s.second.longC/prevTotal)*100:50;
      netChg=parseFloat((longPct-prevLongPct).toFixed(2));
    }
    rows.push({
      id:info.id, name:info.name,
      longC,shortC,dLong,dShort,
      longPct,shortPct,netChg,
      netPos,oi,dOI:0,date,
    });
  }
  // Sort by netChg desc (same as default)
  return rows.sort((a,b)=>b.netChg-a.netChg);
}

async function fetchCFTCData(){
  const proxies=[
    u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
    u=>`https://thingproxy.freeboard.io/fetch/${u}`,
  ];
  for(const makeProxy of proxies){
    try{
      const r=await fetch(makeProxy(CFTC_URL));
      if(!r.ok)continue;
      const text=await r.text();
      // allorigins wraps in {contents:"..."}
      let csv=text;
      try{const j=JSON.parse(text);if(j.contents)csv=j.contents;}catch(e){}
      if(!csv||csv.length<1000)continue;
      const rows=parseCFTCcsv(csv);
      if(rows.length>0)return rows;
    }catch(e){continue;}
  }
  throw new Error("CFTC fetch failed");
}

  // Only re-fetch if we don't have data or data is older than 12 hours
  if(state.cotData&&state.cotLastUpdate){
    const age=(Date.now()-state.cotLastUpdate)/1000/60/60;
    if(age<12)return; // Fresh enough
  }
  state.cotLoading=true;
  fetchCFTCData().then(rows=>{
    state.cotData=rows;
    state.cotLive=true;
    state.cotLoading=false;
    state.cotLastUpdate=Date.now();

  }).catch(e=>{
    console.log("CFTC COT fetch failed:",e.message);
    state.cotLoading=false;
    state.cotLive=false;
    // Keep using hardcoded fallback
  });
}

// ── MYFXBOOK API — multi-proxy fallback ──────────────────────────────────────
const PROXIES=[
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
];
async function proxyFetch(targetUrl){
  for(const makeProxy of PROXIES){
    try{
      const r=await fetch(makeProxy(targetUrl));
      if(!r.ok)continue;
      const text=await r.text();
      try{const outer=JSON.parse(text);if(outer.contents)return JSON.parse(outer.contents);return outer;}
      catch(e){return JSON.parse(text);}
    }catch(e){continue;}
  }
  throw new Error("All proxies failed");
}
async function myfxLogin(email,password){
  const d=await proxyFetch(`https://www.myfxbook.com/api/login.json?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
  if(d.error)throw new Error(d.message||"Login error");
  return d.session;
}
async function myfxGetOutlook(session){
  const d=await proxyFetch(`https://www.myfxbook.com/api/get-community-outlook.json?session=${session}`);
  if(d.error)throw new Error(d.message||"Session expired");
  return d.symbols;
}
async function fetchMyfxbookSentiment(){
  if(!state.mfxEmail||!state.mfxPassword)throw new Error("No credentials");
  let session=state.mfxSession;
  if(session){try{return await myfxGetOutlook(session);}catch(e){session=null;}}
  session=await myfxLogin(state.mfxEmail,state.mfxPassword);
  state.mfxSession=session;saveKey("mfx_session",session);
  return await myfxGetOutlook(session);
}

function loadMyfxbookData(){
  if(!state.mfxEmail||!state.mfxPassword||state.sentimentLoading)return;
  state.sentimentLoading=true;
  // ✅ Always show demo data immediately while fetching — never blank
  if(activeTab==="sentiment")renderSentiment();
  // Set a hard 15s timeout — if all proxies fail, show demo data
  const timeout=setTimeout(()=>{
    state.sentimentLoading=false;
    state.sentimentLive=false;
    if(activeTab==="sentiment")renderSentiment();
  },15000);
  fetchMyfxbookSentiment().then(symbols=>{
    clearTimeout(timeout);
    state.sentimentData=symbols.map(s=>({
      name:s.name,
      longPercentage:parseFloat(s.longPercentage),
      shortPercentage:parseFloat(s.shortPercentage),
      longVolume:parseInt(s.longVolume)||0,
      shortVolume:parseInt(s.shortVolume)||0,
      longPositions:parseInt(s.longPositions)||0,
      shortPositions:parseInt(s.shortPositions)||0,
    }));
    state.sentimentLive=true;
    state.sentimentLoading=false;
    if(activeTab==="sentiment")renderSentiment();
  }).catch(e=>{
    clearTimeout(timeout);
    console.log("Myfxbook error:",e.message);
    state.sentimentLoading=false;
    state.sentimentLive=false;
    // Show demo data — no blank screen
    if(activeTab==="sentiment")renderSentiment();
  });
}

// ── OTHER API FETCHERS ────────────────────────────────────────────────────────
async function fetchRates(){const r=await fetch("https://api.frankfurter.app/latest?from=USD");if(!r.ok)throw new Error();return(await r.json()).rates;}
async function fetchPrev(){const d=new Date();d.setDate(d.getDate()-1);if(d.getDay()===0)d.setDate(d.getDate()-2);if(d.getDay()===6)d.setDate(d.getDate()-1);const r=await fetch("https://api.frankfurter.app/"+d.toISOString().split("T")[0]+"?from=USD");if(!r.ok)throw new Error();return(await r.json()).rates;}
async function fetchFearGreed(){const r=await fetch("https://api.alternative.me/fng/?limit=30&format=json");if(!r.ok)throw new Error();const d=await r.json();if(!d.data||!d.data.length)throw new Error();return d.data;}
function buildStrength(rates){if(!rates)return null;const all={...rates,USD:1};const st={};CURRS.forEach(c=>{st[c.code]=0;});CURRS.forEach(b=>CURRS.forEach(q=>{if(b.code===q.code||!all[b.code])return;st[b.code]+=Math.log(1/all[b.code])*.1;}));const vs=Object.values(st),mn=Math.min(...vs),mx=Math.max(...vs);return CURRS.map(c=>({...c,val:st[c.code]||0,pct:mx!==mn?((st[c.code]-mn)/(mx-mn))*100:50})).sort((a,b)=>b.val-a.val);}
async function fredFetch(id,key,lim){const r=await fetch("https://api.stlouisfed.org/fred/series/observations?series_id="+id+"&api_key="+key+"&file_type=json&sort_order=desc&limit="+lim);if(!r.ok)throw new Error();const d=await r.json();const v=(d.observations||[]).filter(o=>o.value!==".");if(!v.length)throw new Error();return v;}
async function fetchFREDEcon(key){const res={};for(const[cur,series]of Object.entries(FRED_SERIES)){res[cur]=[];for(const s of series){try{const obs=await fredFetch(s.id,key,13);let val=parseFloat(obs[0].value);const date=obs[0].date;let surprise=0;if(s.yoy&&obs.length>=13){const pv=parseFloat(obs[12].value);if(!isNaN(pv)&&pv!==0)val=((val-pv)/pv)*100;}if(obs.length>=2){const pv=parseFloat(obs[1].value);if(!isNaN(pv)){const diff=val-pv;if(Math.abs(diff)>.3)surprise=diff>0?.5:-.5;else if(Math.abs(diff)>.1)surprise=diff>0?.2:-.2;}}res[cur].push({l:s.label,v:isNaN(val)?"N/A":s.fmt(val),s:surprise,d:date?new Date(date).toLocaleDateString([],{month:"short",year:"numeric"}):""})}catch(e){const fb=(FALLBACK_ECON[cur]||[]).find(f=>f.l===s.label);res[cur].push(fb?{...fb}:{l:s.label,v:"N/A",s:0,d:""});}await new Promise(r=>setTimeout(r,150));}}return res;}
function loadFREDData(){if(!state.fredKey||state.econLoading)return;state.econLoading=true;fetchFREDEcon(state.fredKey).then(d=>{state.econData=d;state.econLive=true;state.econLoading=false;if(activeTab==="econ")renderEcon();}).catch(()=>{state.econLoading=false;});}

async function refreshAll(){
  document.getElementById("rbtn-icon").classList.add("spinning");
  renderActive();
  const[r1,r2,r3]=await Promise.allSettled([fetchRates(),fetchPrev(),fetchFearGreed()]);
  if(r1.status==="fulfilled")state.rates=r1.value;
  if(r2.status==="fulfilled")state.prevRates=r2.value;
  if(r3.status==="fulfilled"&&r3.value&&r3.value.length){state.fgData=r3.value;state.fgLive=true;}
  state.cdata=buildStrength(state.rates);
  saveScoreHistory(); // ✅ Save today's scores to localStorage for History tab
  // Load live sentiment from Myfxbook
  loadCOTData();
  loadMyfxbookData();
  loadSeasonalityLive();
  loadPutCallData();
  loadAAIIData();
  if(state.fredKey){state.econData=null;state.econLive=false;loadFREDData();}
  const now=new Date();
  document.getElementById("last-update").textContent=now.toLocaleDateString([],{month:"short",day:"numeric"})+" "+now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  renderActive();
  document.getElementById("rbtn-icon").classList.remove("spinning");
}

function saveScoreHistory(){
  const today=new Date().toISOString().split("T")[0];
  const entry={};
  ASSETS_SCORED.forEach(a=>entry[a.id]=a.total);
  try{localStorage.setItem("ef_sh_"+today,JSON.stringify(entry));}catch(e){}
}

function loadScoreHistory(){
  const history=[];
  // Build last 60 calendar days
  for(let i=59;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key="ef_sh_"+d.toISOString().split("T")[0];
    try{
      const raw=localStorage.getItem(key);
      if(raw)history.push({date:d,scores:JSON.parse(raw)});
    }catch(e){}
  }
  return history;
}

function renderSetupsHistoryView(){

  function seedDemoHistory(){
    const base = ASSETS_SCORED.reduce((m,a)=>{m[a.id]=a.total;return m;},{});
    for(let i=29;i>=0;i--){
      const d=new Date(); d.setDate(d.getDate()-i);
      const k='ef_sh_'+d.toISOString().split('T')[0];
      try{
        if(!localStorage.getItem(k)){
          // Vary each asset score ±3 around current, clamped
          const e={};
          ASSETS_SCORED.forEach(a=>{
            const drift=Math.round((Math.sin(i*0.4+a.id.charCodeAt(0))*2.5));
            e[a.id]=Math.max(-12,Math.min(12,(base[a.id]||0)+drift));

  </div>`;

  if(history.length < 2){
    html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:40px;text-align:center">
      <div style="font-family:var(--mono);font-size:56px;font-weight:bold;color:${tc};line-height:1">${cv(asset.total)}</div>
      <div style="font-family:var(--mono);font-size:16px;color:${bc};margin-top:10px">${asset.bias}</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:16px;line-height:1.8">
        Score history builds automatically each day you open the app.<br>
        Check back tomorrow for your first trend.
      </div>
    </div>`;
    return html;
  }

  const pts = history.map(h=>({
    date:  h.date,
    score: h.scores[state.setupsHistoryAsset]??null,
  })).filter(p=>p.score!==null);

  if(pts.length<2){ return html+'<div class="econ-loading"><span>Not enough data yet.</span></div>'; }

  // ── SVG CONSTANTS ────────────────────────────────────────────────────────
  const W=760, pL=44, pR=14, pT=16, pB=24;
  const cW=W-pL-pR;

  // ─── PANEL 1: Score line chart (top half) ─────────────────────────────
  const H1=160;
  const allS=pts.map(p=>p.score);
  const rawMax=Math.max(...allS,6), rawMin=Math.min(...allS,-6);
  const yPad=(rawMax-rawMin)*0.15;
  const sMax=rawMax+yPad, sMin=rawMin-yPad;
  const n=pts.length;
  const xOf=i=>pL+i*(cW/(n-1));
  const yOf1=v=>pT+H1*(1-(v-sMin)/(sMax-sMin));

  // Zone fills panel 1
  const y5_1=yOf1(5), yn5_1=yOf1(-5), y0_1=yOf1(0);
  let p1_zones='';
  // Bullish fill (above 5)
  if(y5_1 > pT){
    p1_zones+=`<rect x="${pL}" y="${pT}" width="${cW}" height="${Math.max(0,y5_1-pT)}" fill="rgba(0,255,136,.07)"/>`;
  }
  // Neutral fill (-5 to 5)
  p1_zones+=`<rect x="${pL}" y="${Math.max(pT,y5_1)}" width="${cW}" height="${Math.max(0,yn5_1-Math.max(pT,y5_1))}" fill="rgba(255,255,255,.03)"/>`;
  // Bearish fill (below -5)
  p1_zones+=`<rect x="${pL}" y="${Math.max(pT,yn5_1)}" width="${cW}" height="${Math.max(0,pT+H1-Math.max(pT,yn5_1))}" fill="rgba(255,59,92,.07)"/>`;

  // Dashed reference lines panel 1
  let p1_lines='';
  [[5,'rgba(0,255,136,.35)'],[0,'rgba(255,255,255,.18)'],[-5,'rgba(255,59,92,.35)']].forEach(([v,c])=>{
    const y=yOf1(v).toFixed(1);
    p1_lines+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="${c}" stroke-width="1" stroke-dasharray="5,4"/>`;
    p1_lines+=`<text x="${pL-4}" y="${parseFloat(y)+4}" fill="${c}" font-size="9" text-anchor="end" font-family="monospace">${v>0?'+':''}${v}</text>`;
  });

  // Score polyline (white dashed — matches Nick's closing price line style)
  const linePts=pts.map((p,i)=>`${xOf(i).toFixed(1)},${yOf1(p.score).toFixed(1)}`).join(' ');
  const p1_line=`<polyline points="${linePts}" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-dasharray="6,3"/>`;
  // Dots at each data point
  let p1_dots='';
  pts.forEach((p,i)=>{
    const col=p.score>=5?'#00ff88':p.score<=-5?'#ff3b5c':p.score>0?'rgba(0,255,136,.7)':'rgba(255,59,92,.7)';
    p1_dots+=`<circle cx="${xOf(i).toFixed(1)}" cy="${yOf1(p.score).toFixed(1)}" r="3" fill="${col}" stroke="#0d1117" stroke-width="1"/>`;
  });
  // Panel 1 Y-axis label
  const p1_axlbl=`<text x="8" y="${(pT+H1/2).toFixed(0)}" fill="#8b949e" font-size="8" text-anchor="middle" font-family="monospace" transform="rotate(-90,8,${(pT+H1/2).toFixed(0)})">SCORE</text>`;

  // ─── PANEL 2: Bar chart with zone backgrounds (bottom half) ──────────
  const H2=160, gap=8;
  const yOff=pT+H1+gap; // y offset for panel 2
  const barMax=Math.max(...allS.map(Math.abs),10);
  const barH=H2-20; // usable bar area
  // zone rects
  const bull_y=yOff, bull_h=barH*0.4;
  const neut_y=yOff+bull_h, neut_h=barH*0.2;
  const bear_y=yOff+bull_h+neut_h, bear_h=barH*0.4;
  const zero_y=yOff+bull_h+neut_h/2; // visual zero line in panel 2

  let p2_zones='';
  p2_zones+=`<rect x="${pL}" y="${bull_y}" width="${cW}" height="${bull_h+neut_h/2+1}" fill="rgba(38,60,92,.55)" rx="0"/>`;
  p2_zones+=`<rect x="${pL}" y="${zero_y}" width="${cW}" height="${neut_h/2+bear_h}" fill="rgba(82,30,38,.55)" rx="0"/>`;

  // Dashed lines panel 2
  let p2_lines='';
  [[10,bull_y+4,'#888'],[5,bull_y+bull_h*0.3,'rgba(255,255,255,.2)'],[0,zero_y,'rgba(255,255,255,.3)'],[-5,bear_y+bear_h*0.3,'rgba(255,255,255,.2)'],[-10,bear_y+bear_h-4,'#888']].forEach(([v,y,c])=>{
    p2_lines+=`<line x1="${pL}" y1="${y.toFixed(1)}" x2="${W-pR}" y2="${y.toFixed(1)}" stroke="${c}" stroke-width="0.8" stroke-dasharray="4,4"/>`;
    p2_lines+=`<text x="${pL-4}" y="${(y+4).toFixed(1)}" fill="${c}" font-size="8.5" text-anchor="end" font-family="monospace">${v>0?'+':''}${v}</text>`;
  });

  // Zone labels matching Nick's (text inside zone)
  p2_lines+=`<text x="${pL+6}" y="${(bull_y+14).toFixed(1)}" fill="rgba(255,255,255,.85)" font-size="11" font-family="monospace" font-weight="bold">Bullish</text>`;
  p2_lines+=`<text x="${pL+6}" y="${(zero_y+3).toFixed(1)}" fill="rgba(255,255,255,.55)" font-size="10" font-family="monospace">Neutral</text>`;
  p2_lines+=`<text x="${pL+6}" y="${(bear_y+bear_h-6).toFixed(1)}" fill="rgba(255,255,255,.85)" font-size="11" font-family="monospace" font-weight="bold">Bearish</text>`;

  // Bars
  const bSlot=cW/n;
  const bW=Math.max(3,Math.min(bSlot*0.7,22));
  let p2_bars='';
  pts.forEach((p,i)=>{
    const sc=p.score;
    const fracAbs=Math.min(Math.abs(sc)/10,1);
    const barLen=(bull_h+neut_h/2)*fracAbs; // scaled height
    let bx=xOf(i)-bW/2, by, bh;
    if(sc>=0){ bh=Math.max(2,barLen); by=zero_y-bh; }
    else      { bh=Math.max(2,barLen); by=zero_y; }
    const col='rgba(255,255,255,0.88)';
    p2_bars+=`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bW.toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}" rx="2"/>`;
  });
  // Panel 2 Y label
  const p2_axlbl=`<text x="8" y="${(yOff+H2/2).toFixed(0)}" fill="#8b949e" font-size="8" text-anchor="middle" font-family="monospace" transform="rotate(-90,8,${(yOff+H2/2).toFixed(0)})">SCORE</text>`;

  // ─── SHARED X-AXIS ───────────────────────────────────────────────────
  const totalH=pT+H1+gap+H2+pB;
  let xLbls='';
  const step=Math.max(1,Math.ceil(n/8));
  pts.forEach((p,i)=>{
    if(i===0||i===n-1||i%step===0){
      const x=xOf(i).toFixed(1);
      const lbl=p.date.toLocaleDateString([],{month:'short',day:'numeric'});
      xLbls+=`<text x="${x}" y="${(totalH-5).toFixed(0)}" fill="#8b949e" font-size="8" text-anchor="middle" font-family="monospace">${lbl}</text>`;
      // Vertical tick through both panels
      xLbls+=`<line x1="${x}" y1="${(pT+H1+gap).toFixed(1)}" x2="${x}" y2="${(pT+H1+gap+H2).toFixed(1)}" stroke="rgba(255,255,255,.05)" stroke-width="0.5"/>`;
      xLbls+=`<line x1="${x}" y1="${pT}" x2="${x}" y2="${(pT+H1).toFixed(1)}" stroke="rgba(255,255,255,.05)" stroke-width="0.5"/>`;
    }
  });

  // Border between panels
  const divider=`<line x1="${pL}" y1="${(pT+H1+gap/2).toFixed(1)}" x2="${W-pR}" y2="${(pT+H1+gap/2).toFixed(1)}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;

  const svg=`<svg viewBox="0 0 ${W} ${totalH}" style="width:100%;height:auto;display:block;min-width:320px">
    <rect width="${W}" height="${totalH}" fill="#0d1117" rx="8"/>
    ${p1_zones}${p1_lines}${p1_line}${p1_dots}${p1_axlbl}
    ${divider}
    ${p2_zones}${p2_lines}${p2_bars}${p2_axlbl}
    ${xLbls}
  </svg>`;

  html+=`<div style="background:#0d1117;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;overflow-x:auto">
    ${svg}
  </div>`;

  // ── RECENT LOG TABLE ─────────────────────────────────────────────────────
  html+=`<div class="card"><div class="chd">
    <span class="ctitle">Score Log — ${asset.name}</span>
    <span class="cbadge">LAST ${Math.min(10,pts.length)} ENTRIES</span>
  </div>
  <div style="overflow-x:auto"><table class="cot-tbl">
    <thead><tr>
      <th style="text-align:left">Date</th>
      <th>Score</th><th>Bias</th><th>Change</th>
    </tr></thead><tbody>`;
  [...pts].reverse().slice(0,10).forEach((p,idx,arr)=>{
    const sc=p.score;
    const prev=arr[idx+1]?.score??null;
    const chg=prev!==null?sc-prev:null;
    const bias=sc>=8?'Very Bullish':sc>=5?'Bullish':sc>=2?'Mild Bull':sc<=-8?'Very Bearish':sc<=-5?'Bearish':sc<=-2?'Mild Bear':'Neutral';
    const col=totalColor(sc);
    const chgStr=chg!==null?`<span style="color:${chg>0?'var(--bull)':chg<0?'var(--bear)':'var(--muted)'}">${chg>0?'+':''}${chg}</span>`:'—';
    html+=`<tr>
      <td style="font-family:var(--mono);font-size:11px">${p.date.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})}</td>
      <td style="text-align:center;font-family:var(--mono);font-weight:bold;color:${col}">${cv(sc)}</td>
      <td style="text-align:center;font-family:var(--mono);font-size:10px;color:${col}">${bias}</td>
      <td style="text-align:center;font-family:var(--mono);font-size:11px">${chgStr}</td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;
  return html;
}// ── VIEW 6: TRADE IDEAS ───────────────────────────────────────────────────────
function renderTradeIdeasView(){
  // Asset → live price resolution
  const fxBases={EUR:1,GBP:1,AUD:1,NZD:1}; // invert: 1/rates[ccy]
  const fxQuotes={JPY:1,CAD:1,CHF:1};       // direct: rates[ccy]
  const atrPct={
    EURUSD:0.0055,GBPUSD:0.0065,USDJPY:0.0060,AUDUSD:0.0055,
    USDCAD:0.0050,NZDUSD:0.0055,USDCHF:0.0050,
    Gold:0.0080,USOIL:0.0120,BTC:0.0200,
    DOW:0.0040,NASDAQ:0.0050,SPX500:0.0040,RUSSELL:0.0045,
  };

  const assetOpts=[...ASSETS_SCORED].map(a=>
    `<option value="${a.id}" ${a.id===state.setupsHistoryAsset?"selected":""}>${a.name}</option>`
  ).join('');

  const asset=ASSETS_SCORED.find(a=>a.id===state.setupsHistoryAsset)||ASSETS_SCORED[0];
  const tc=totalColor(asset.total), bc=biasColor(asset.bias);
  const isBull=asset.total>=0;

  // Resolve live price
  let price=null, pairLabel='';
  const id=asset.id;
  if(fxBases[id]&&state.rates){ price=parseFloat((1/state.rates[id]).toFixed(5)); pairLabel=id+'USD'; }
  else if(fxQuotes[id]&&state.rates){ price=parseFloat(state.rates[id]); pairLabel='USD'+id; }
  else if(id==='BTC'&&state.btc){ price=state.btc.price; pairLabel='BTCUSD'; }

  const atr = price ? (atrPct[pairLabel]||atrPct[id]||0.006)*price : null;
  const dp   = price&&price<10?5:price&&price<100?3:price&&price<10000?2:0;
  const fmt  = v=>v!=null?v.toFixed(dp):'—';

  // Key levels (ATR-based)
  const entryMin = atr&&price ? isBull?price-atr*0.5:price+atr*0.3 : null;
  const entryMax = atr&&price ? isBull?price+atr*0.3:price-atr*0.5 : null; // NOT: swap for bear
  const target   = atr&&price ? isBull?price+atr*2.5:price-atr*2.5 : null;
  const stop     = atr&&price ? isBull?price-atr*1.5:price+atr*1.5 : null;
  // Trend band (+/- 1 ATR around price)
  const trendPlus  = atr&&price ? price+atr  : null;
  const trendMinus = atr&&price ? price-atr  : null;

  const techBiasLabel=asset.trend>=2?'Strong Bull':asset.trend===1?'Bullish':asset.trend===-1?'Bearish':asset.trend<=-2?'Strong Bear':'Neutral';
  const techBiasCol=asset.trend>=1?'var(--bull)':asset.trend<=-1?'var(--bear)':'var(--neutral)';

  let html=`
  <!-- HEADER ──────────────────────────────────────────────── -->
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:14px">
    <div style="font-family:var(--mono);font-size:15px;font-weight:bold;color:var(--text)">Trade Ideas</div>
    <div style="display:flex;align-items:center;gap:8px">
      <select onchange="state.setupsHistoryAsset=this.value;renderSetups()"
        style="background:var(--bg3);border:1px solid var(--accent);color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:6px;outline:none">
        ${assetOpts}
      </select>
      ${price?`<span class="cbadge-live">● LIVE</span>`:''}
    </div>
  </div>

  <!-- BIAS + LEVELS ROW ───────────────────────────────────── -->
  <div style="display:grid;grid-template-columns:auto auto 1fr 1fr 1fr;gap:0;background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px">

    <!-- Algo Bias -->
    <div style="padding:14px 18px;border-right:1px solid var(--border);min-width:130px">
      <div style="font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px">Top Setups Algo Bias</div>
      <div style="background:var(--accent);border-radius:6px;padding:6px 14px;display:inline-block">
        <span style="font-family:var(--mono);font-size:13px;font-weight:bold;color:#000">${asset.bias}</span>
      </div>
    </div>

    <!-- Tech Bias -->
    <div style="padding:14px 18px;border-right:1px solid var(--border);min-width:130px">
      <div style="font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px">Technical Bias</div>
      <div style="background:${asset.trend>=1?'rgba(0,255,136,.2)':asset.trend<=-1?'rgba(255,59,92,.2)':'rgba(240,180,41,.2)'};border:1px solid ${asset.trend>=1?'rgba(0,255,136,.4)':asset.trend<=-1?'rgba(255,59,92,.4)':'rgba(240,180,41,.4)'};border-radius:6px;padding:6px 14px;display:inline-block">
        <span style="font-family:var(--mono);font-size:13px;font-weight:bold;color:${techBiasCol}">${techBiasLabel}</span>
      </div>
    </div>

    <!-- Entry Zone -->
    <div style="padding:14px 18px;border-right:1px solid var(--border)">
      <div style="font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Entry Zone</div>
      <div style="font-family:var(--mono);font-size:14px;font-weight:bold;color:var(--text)">
        ${entryMin&&entryMax?`${fmt(isBull?entryMin:entryMax)} to ${fmt(isBull?entryMax:entryMin)}`:'—'}
      </div>
    </div>

    <!-- Target -->
    <div style="padding:14px 18px;border-right:1px solid var(--border)">
      <div style="font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Target</div>
      <div style="font-family:var(--mono);font-size:16px;font-weight:bold;color:var(--accent)">${fmt(target)}</div>
    </div>

    <!-- Stop Loss -->
    <div style="padding:14px 18px">
      <div style="font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Stop Loss</div>
      <div style="font-family:var(--mono);font-size:16px;font-weight:bold;color:var(--bear)">${fmt(stop)}</div>
    </div>
  </div>`;

  // ── PRICE CHART (matching Nick's) ────────────────────────────────────────
  if(price&&atr){
    // Generate 25 synthetic daily close prices using score-driven drift
    const history=loadScoreHistory();
    const W=760, H=280, pL=60, pR=14, pT=14, pB=34;
    const cW=W-pL-pR, cH=H-pT-pB;
    const nDays=25;

    // Build price series: use stored score drift if available, else use trend
    const scoreSeries=[];
    for(let i=nDays-1;i>=0;i--){
      const d=new Date(); d.setDate(d.getDate()-i);
      const k='ef_sh_'+d.toISOString().split('T')[0];
      try{
        const raw=localStorage.getItem(k);
        const sc=raw?JSON.parse(raw)[id]??null:null;
        scoreSeries.push({date:d,score:sc});
      }catch(e){ scoreSeries.push({date:d,score:null}); }
    }

    // Build synthetic close prices driven by score direction
    const closes=[];
    let p=price;
    // Work backwards: today = price, go back nDays
    const revScores=[...scoreSeries].reverse();
    for(let i=0;i<nDays;i++){
      closes.unshift(parseFloat(p.toFixed(dp)));
      const sc=revScores[i]?.score??asset.total;
      const drift=(sc/12)*atr*0.6*(0.7+Math.random()*0.6);
      p=p-drift; // reverse: price was lower/higher before
    }
    // Today = actual price
    closes[closes.length-1]=price;

    const minP=Math.min(...closes,stop??Infinity,entryMin??Infinity)-atr*0.5;
    const maxP=Math.max(...closes,target??-Infinity,trendPlus??-Infinity)+atr*0.5;
    const xOf=i=>pL+i*(cW/(nDays-1));
    const yOf=v=>pT+cH*(1-(v-minP)/(maxP-minP));

    // ── SVG ──
    let svgParts='';
    // Background
    svgParts+=`<rect width="${W}" height="${H}" fill="#151b23" rx="8"/>`;

    // Grid lines (horizontal)
    const gridStep=atr*2;
    let gv=Math.ceil(minP/gridStep)*gridStep;
    while(gv<=maxP){
      const gy=yOf(gv).toFixed(1);
      svgParts+=`<line x1="${pL}" y1="${gy}" x2="${W-pR}" y2="${gy}" stroke="rgba(255,255,255,.05)" stroke-width="0.5"/>`;
      svgParts+=`<text x="${pL-4}" y="${(parseFloat(gy)+4).toFixed(0)}" fill="#6e7681" font-size="9" text-anchor="end" font-family="monospace">${gv.toFixed(dp)}</text>`;
      gv=parseFloat((gv+gridStep).toFixed(dp));
    }

    // Horizontal reference lines
    const hLines=[
      {v:target,     col:'#58a6ff',  lbl:'Target',    dash:''},
      {v:stop,       col:'#ff3b5c',  lbl:'Stop Loss', dash:'4,3'},
      {v:entryMax,   col:'#ff8c00',  lbl:'Entry-Max', dash:'3,3'},
      {v:entryMin,   col:'#c8b400',  lbl:'Entry-Min', dash:'3,3'},
      {v:trendPlus,  col:'#4a90d9',  lbl:'Trend+',    dash:''},
      {v:trendMinus, col:'#e05c6a',  lbl:'Trend-',    dash:''},
    ];
    hLines.forEach(({v,col,lbl,dash})=>{
      if(!v)return;
      const gy=yOf(v).toFixed(1);
      svgParts+=`<line x1="${pL}" y1="${gy}" x2="${W-pR}" y2="${gy}" stroke="${col}" stroke-width="1" ${dash?`stroke-dasharray="${dash}"`:''} opacity="0.7"/>`;
      svgParts+=`<text x="${W-pR-2}" y="${(parseFloat(gy)-3).toFixed(0)}" fill="${col}" font-size="8" text-anchor="end" font-family="monospace" opacity="0.9">${lbl}: ${fmt(v)}</text>`;
    });

    // Trend+ band fill
    if(trendPlus&&trendMinus){
      const ty1=yOf(trendPlus).toFixed(1), ty2=yOf(trendMinus).toFixed(1);
      svgParts+=`<rect x="${pL}" y="${ty1}" width="${cW}" height="${(parseFloat(ty2)-parseFloat(ty1)).toFixed(1)}" fill="${isBull?'rgba(74,144,217,.07)':'rgba(224,92,106,.07)'}"/>`;
    }

    // Entry zone fill
    if(entryMin&&entryMax){
      const ey1=yOf(Math.max(entryMin,entryMax)).toFixed(1);
      const ey2=yOf(Math.min(entryMin,entryMax)).toFixed(1);
      svgParts+=`<rect x="${pL}" y="${ey1}" width="${cW}" height="${(parseFloat(ey2)-parseFloat(ey1)).toFixed(1)}" fill="rgba(240,180,41,.08)"/>`;
    }

    // Trend + line (blue)
    const tpPts=closes.map((_,i)=>`${xOf(i).toFixed(1)},${yOf(trendPlus+(closes[i]-price)*0.3).toFixed(1)}`).join(' ');
    svgParts+=`<polyline points="${tpPts}" fill="none" stroke="#4a90d9" stroke-width="1.5" opacity="0.7"/>`;
    // Trend - line (red)
    const tmPts=closes.map((_,i)=>`${xOf(i).toFixed(1)},${yOf(trendMinus+(closes[i]-price)*0.3).toFixed(1)}`).join(' ');
    svgParts+=`<polyline points="${tmPts}" fill="none" stroke="#e05c6a" stroke-width="1.5" opacity="0.7"/>`;

    // Close price line (white, solid)
    const closePts=closes.map((c,i)=>`${xOf(i).toFixed(1)},${yOf(c).toFixed(1)}`).join(' ');
    svgParts+=`<polyline points="${closePts}" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>`;
    // Dot at last price
    svgParts+=`<circle cx="${xOf(nDays-1).toFixed(1)}" cy="${yOf(price).toFixed(1)}" r="4" fill="white" stroke="#151b23" stroke-width="1.5"/>`;

    // X-axis date labels
    const xStep=Math.ceil(nDays/6);
    scoreSeries.forEach((s,i)=>{
      if(i===0||i===nDays-1||i%xStep===0){
        svgParts+=`<text x="${xOf(i).toFixed(1)}" y="${H-5}" fill="#6e7681" font-size="8.5" text-anchor="middle" font-family="monospace">${s.date.toLocaleDateString([],{month:'short',day:'numeric'})}</text>`;
      }
    });

    // Legend row
    const legendItems=[
      {col:'#4a90d9',lbl:'Trend+'},
      {col:'#e05c6a',lbl:'Trend-'},
      {col:'white',   lbl:'Close'},
      {col:'#58a6ff',lbl:'Target'},
      {col:'#ff3b5c',lbl:'Stop Loss'},
      {col:'#ff8c00',lbl:'Entry-Max'},
      {col:'#c8b400',lbl:'Entry-Min'},
    ];
    let lgX=pL;
    legendItems.forEach(({col,lbl})=>{
      svgParts+=`<line x1="${lgX}" y1="9" x2="${lgX+16}" y2="9" stroke="${col}" stroke-width="2"/>`;
      lgX+=18;
      svgParts+=`<text x="${lgX}" y="13" fill="#8b949e" font-size="8.5" font-family="monospace">${lbl}</text>`;
      lgX+=lbl.length*5.5+10;
    });

    html+=`<div style="background:#151b23;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;overflow-x:auto">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;min-width:340px">
        ${svgParts}
      </svg>
    </div>`;
  } else {
    html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:12px">
      Select a forex pair (EUR, GBP, JPY, AUD, CAD, NZD, CHF) or BTC for live price levels.
    </div>`;
  }

  // ── SCORE BREAKDOWN ───────────────────────────────────────────────────────
  html+=`<div class="card"><div class="chd">
    <span class="ctitle">Score Breakdown — ${asset.name}</span>
    <span style="font-family:var(--mono);font-size:10px;color:${tc};font-weight:bold">${cv(asset.total)} · ${asset.bias}</span>
  </div>
  <div style="padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:7px">
    ${[
      {l:'COT',v:asset.cot},{l:'Retail',v:asset.retail},{l:'Seasonal',v:asset.seasonal},{l:'Trend',v:asset.trend},
      {l:'GDP',v:asset.gdp},{l:'mPMI',v:asset.mPMI},{l:'sPMI',v:asset.sPMI},{l:'Ret Sales',v:asset.retailSal},
      {l:'CPI YoY',v:asset.inflation},{l:'Emp Chg',v:asset.empChg},{l:'Unemploy',v:asset.unemploy},{l:'Rates',v:asset.rates},
    ].map(f=>{
      const col=f.v>0?'var(--bull)':f.v<0?'var(--bear)':'var(--muted)';
      const bg=f.v>=2?'rgba(0,255,136,.15)':f.v===1?'rgba(0,255,136,.08)':f.v<=-2?'rgba(255,59,92,.15)':f.v===-1?'rgba(255,59,92,.08)':'var(--bg3)';
      return`<div style="background:${bg};border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center">
        <div style="font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">${f.l}</div>
        <div style="font-family:var(--mono);font-size:17px;font-weight:bold;color:${col};margin-top:3px">${cv(f.v)}</div>
      </div>`;
    }).join('')}
  </div></div>

  <div class="infobox ib-yellow" style="margin-top:8px">
    <span class="iblabel" style="color:var(--neutral)">⚠ DISCLAIMER</span>
    Levels are algorithmic (ATR-based) reference points — <strong>not financial advice</strong>.
    Always apply your own analysis. Entry/Target/Stop are for reference only.
  </div>`;

  return html;
}

// ── COT ───────────────────────────────────────────────────────────────────────
function renderCOT(){

  const isLive = state.cotLive;
  const isLoading = state.cotLoading;

  // Work out last update label
  let lastUpdateLabel = "Mar 14, 2026";
  if(isLive && data[0] && data[0].date){
    try{
      const d = new Date(data[0].date.replace(/(\d{4})(\d{2})(\d{2})/,"$1-$2-$3"));
      lastUpdateLabel = d.toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});

    ? `<span class="cbadge-live">● LIVE · CFTC</span>`

      ? `<span class="cbadge" style="color:var(--accent)"><span class="spinning">↻</span> Fetching CFTC...</span>`
      : `<span class="cbadge-demo">FALLBACK DATA</span>`;

  const sorted=[...data].sort((a,b)=>{if(state.cotSort.col==="id")return a.id.localeCompare(b.id)*state.cotSort.dir;return(b[state.cotSort.col]-a[state.cotSort.col])*state.cotSort.dir;});

        <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">
          Last Update: <strong style="color:var(--accent)">${lastUpdateLabel}</strong> · Weekly · CFTC
        </div>
        <div style="display:flex;gap:16px;margin-top:6px">
          <div class="cot-legend"><div class="cot-legend-dot" style="background:#4a90d9"></div><span style="color:var(--muted)">Long</span></div>
          <div class="cot-legend"><div class="cot-legend-dot" style="background:#e05c6a"></div><span style="color:var(--muted)">Short</span></div>
        </div>
      </div>
      ${badge}
    </div>
    <div class="cot-bars-scroll"><div class="cot-bars">
      ${data.map(row=>{const lh=Math.round(row.longPct*1.5);const sh=Math.round(row.shortPct*1.5);return`<div class="cot-bar-wrap" onmouseenter="showTip(event,'${row.id}',${row.longPct},${row.shortPct})" onmouseleave="hideTip()"><div class="cot-bar-stacked" style="height:${lh+sh}px"><div class="cot-bar-short" style="height:${sh}px;display:flex;align-items:center;justify-content:center">${row.shortPct>15?`<span style="font-family:var(--mono);font-size:8px;color:#fff">${row.shortPct.toFixed(0)}%</span>`:""}</div><div class="cot-bar-long" style="height:${lh}px;display:flex;align-items:center;justify-content:center">${row.longPct>15?`<span style="font-family:var(--mono);font-size:8px;color:#fff">${row.longPct.toFixed(0)}%</span>`:""}</div></div><div class="cot-bar-label">${row.id}</div></div>`;}).join("")}
    </div></div>
  </div>`;

  const cols=[{key:"id",label:"Asset"},{key:"longC",label:"Long C"},{key:"shortC",label:"Short C"},{key:"dLong",label:"Δ Long C"},{key:"dShort",label:"Δ Short C"},{key:"longPct",label:"Long %"},{key:"shortPct",label:"Short %"},{key:"netChg",label:"Net % Chg"},{key:"netPos",label:"Net Position"},{key:"oi",label:"Open Interest"},{key:"dOI",label:"Δ Open Int"}];
  let tbl=`<div class="cot-tbl-wrap"><table class="cot-tbl"><thead><tr>${cols.map(c=>`<th onclick="sortCOT('${c.key}')">${c.label}${state.cotSort.col===c.key?(state.cotSort.dir===-1?" ▼":" ▲"):""}</th>`).join("")}</tr></thead><tbody>`;
  sorted.forEach(row=>{
    const lc=row.longPct>55?"pct-bull":row.longPct<45?"pct-bear":"pct-neutral";
    const sc2=row.shortPct>55?"pct-bull":row.shortPct<45?"pct-bear":"pct-neutral";
    const nc=row.netChg>0?"delta-bull":"delta-bear";
    const dlc=row.dLong>0?"delta-bull":"delta-bear";
    const dsc=row.dShort<0?"delta-bull":"delta-bear";
    const doic=row.dOI>0?"delta-bull":"delta-bear";
    const npc=row.netPos>0?"pos-bull":"pos-bear";
    tbl+=`<tr><td>${row.id}</td><td>${row.longC.toLocaleString()}</td><td>${row.shortC.toLocaleString()}</td><td class="${dlc}">${row.dLong>0?"+":""}${row.dLong.toLocaleString()}</td><td class="${dsc}">${row.dShort>0?"+":""}${row.dShort.toLocaleString()}</td><td class="${lc}">${row.longPct.toFixed(2)}%</td><td class="${sc2}">${row.shortPct.toFixed(2)}%</td><td class="${nc}">${row.netChg>0?"+":""}${row.netChg.toFixed(2)}%</td><td><span class="pos-highlight ${npc}">${row.netPos>0?"+":""}${fmtK(row.netPos)}</span></td><td>${fmtK(row.oi)}</td><td class="${doic}">${row.dOI>0?"+":""}${fmtK(row.dOI)}</td></tr>`;
  });
  tbl+=`</tbody></table></div>`;
  document.getElementById("page-cot").innerHTML=chartHtml+tbl+`<div class="infobox ib-blue">
    <span class="iblabel" style="color:var(--accent)">ℹ CFTC COT DATA — ${isLive?"● LIVE · Auto-fetched from CFTC.gov":"Using fallback data — live fetch on next refresh"}</span>

    Tap column headers to sort. Net Position in <span style="color:#4a90d9">blue = net long</span> · <span style="color:#e05c6a">red = net short</span>.
    Data refreshes automatically every 12 hours.
  </div>`;
}

async function fetchPutCall(){
  // CBOE publishes daily options stats — parse their public JSON
  const url="https://www.cboe.com/us/options/market_statistics/daily/";
  try{
    const d=await proxyFetch(url);
    // Try to extract P/C ratio from HTML/JSON response
    const text=typeof d==="string"?d:JSON.stringify(d);
    // Look for equity P/C ratio pattern
    const m=text.match(/equity[^0-9]*?([01]\.\d{2})/i);
    if(m){
      const eqPc=parseFloat(m[1]);
      return[
        {id:"SPX500",pc:eqPc+0.05,meaning:"S&P 500 options activity"},
        {id:"NAS100",pc:eqPc-0.08,meaning:"Nasdaq options activity"},

        {id:"GOLD",  pc:eqPc-0.15,meaning:"Gold options activity"},
        {id:"USOIL", pc:eqPc+0.08,meaning:"Oil options activity"},
      ];
    }
  }catch(e){}
  throw new Error("P/C fetch failed");
}

// ── AAII LIVE FETCH — via proxy ───────────────────────────────────────────────
async function fetchAAII(){
  const url="https://www.aaii.com/sentimentsurvey/sent_results.js";
  try{
    const d=await proxyFetch(url);
    const text=typeof d==="string"?d:(d.contents||JSON.stringify(d));

    const bull=text.match(/bullish['"\s]*:['"\s]*([\d.]+)/i);

    const bear=text.match(/bearish['"\s]*:['"\s]*([\d.]+)/i);

      const b=parseFloat(bull[1]),n=parseFloat(neut[1]),be=parseFloat(bear[1]);

  }catch(e){}

}

// ── SURPRISE METER — dynamically calculated from FRED data ───────────────────
// Compare latest value vs 12-month average for each series
// This gives a real "is this better or worse than normal?" score
function calcSurpriseFromFRED(econData){
  // econData = {USD:[{l,v,s,d}...], EUR:...}
  // Each item has s = surprise score (-0.5 to +0.5) from FRED fetch
  const result={};
  const currencies=["USD","EUR","GBP","JPY"];
  for(const cur of currencies){
    const items=econData[cur]||[];
    if(!items.length)continue;
    // Average surprise across all indicators
    const avg=items.reduce((a,i)=>a+i.s,0)/items.length;
    // Convert -0.5..+0.5 range to 0..100 score (0.0 = 50%)
    const score=Math.round(Math.max(0,Math.min(100,50+avg*100)));
    result[cur]={
      score,
      indicators:items.map(i=>({n:i.l.replace(" YoY","").replace("Unemploy","Unemp"),s:i.s})),
    };
  }
  return result;
}

  BTCUSD:{sym:"BTCUSD",fn:"DIGITAL_CURRENCY_MONTHLY",type:"crypto",sym2:"BTC",market:"USD"},

async function fetchAVMonthly(assetId, avKey){
  const cfg=AV_SYMBOLS[assetId];
  if(!cfg||!avKey)throw new Error("No config or key");
  let url;
  if(cfg.type==="fx"){
    url=`https://www.alphavantage.co/query?function=FX_MONTHLY&from_symbol=${cfg.from}&to_symbol=${cfg.to}&apikey=${avKey}&outputsize=full`;
  }else if(cfg.type==="crypto"){
    url=`https://www.alphavantage.co/query?function=DIGITAL_CURRENCY_MONTHLY&symbol=${cfg.sym2}&market=${cfg.market}&apikey=${avKey}`;
  }else{
    url=`https://www.alphavantage.co/query?function=TIME_SERIES_MONTHLY_ADJUSTED&symbol=${cfg.sym2}&apikey=${avKey}&outputsize=full`;
  }
  const r=await fetch(url);
  if(!r.ok)throw new Error("AV HTTP "+r.status);
  const d=await r.json();
  if(d.Note||d.Information)throw new Error("AV rate limit");

  // Parse different response formats into unified {year,month,close} array
  const entries=[];
  if(cfg.type==="fx"){
    const ts=d["Time Series FX (Monthly)"]||{};
    Object.entries(ts).forEach(([date,v])=>{
      const dt=new Date(date);
      entries.push({year:dt.getFullYear(),month:dt.getMonth(),close:parseFloat(v["4. close"])});
    });
  }else if(cfg.type==="crypto"){
    const ts=d["Time Series (Digital Currency Monthly)"]||{};
    Object.entries(ts).forEach(([date,v])=>{
      const dt=new Date(date);
      entries.push({year:dt.getFullYear(),month:dt.getMonth(),close:parseFloat(v["4a. close (USD)"]||v["4. close"])});
    });
  }else{
    const ts=d["Monthly Adjusted Time Series"]||{};
    Object.entries(ts).forEach(([date,v])=>{
      const dt=new Date(date);
      entries.push({year:dt.getFullYear(),month:dt.getMonth(),close:parseFloat(v["5. adjusted close"])});
    });
  }
  if(!entries.length)throw new Error("No data parsed");
  // Sort ascending
  entries.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
  // Convert to % monthly returns
  const returns=[];
  for(let i=1;i<entries.length;i++){
    const prev=entries[i-1],cur=entries[i];
    if(!prev.close||!cur.close)continue;
    const pct=parseFloat(((cur.close-prev.close)/prev.close*100).toFixed(4));
    returns.push({year:cur.year,month:cur.month,pct});
  }
  return returns;
}

function calcSeasonality(returns,years){
  const cutoff=new Date().getFullYear()-years;
  const byMonth=Array(12).fill(null).map(()=>[]);
  returns.forEach(r=>{if(r.year>cutoff)byMonth[r.month].push(r.pct);});
  return byMonth.map(arr=>arr.length?parseFloat((arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2)):0);
}

function calcCurrentYear(returns){
  const yr=new Date().getFullYear();
  const curMonth=new Date().getMonth();
  const result=Array(12).fill(null);
  returns.forEach(r=>{if(r.year===yr&&r.month<=curMonth)result[r.month]=parseFloat(r.pct.toFixed(2));});
  return result;
}

async function fetchSeasonalityForAsset(assetId){
  const avKey=state.avKey;
  if(!avKey)throw new Error("No AV key — add in Settings");
  const returns=await fetchAVMonthly(assetId,avKey);
  return{
    m10:calcSeasonality(returns,10),
    m5: calcSeasonality(returns,5),
    mCur:calcCurrentYear(returns),
    live:true,
  };
}
