<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EdgeFinder Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080c10;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2330;
  --border:#21262d;--bull:#00ff88;--bear:#ff3b5c;
  --neutral:#f0b429;--accent:#58a6ff;
  --text:#e6edf3;--muted:#8b949e;
  --mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;
  --cell-bull:rgba(0,255,136,.18);--cell-bear:rgba(255,59,92,.18);
  --cell-strong-bull:rgba(0,255,136,.35);--cell-strong-bear:rgba(255,59,92,.35);
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;}
.hlogo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--bull),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:bold;color:#000;}
.logo-text{font-size:17px;font-weight:900;letter-spacing:-0.5px;}
.logo-text b{color:var(--bull);}
.hright{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted);}
.live-dot{width:7px;height:7px;background:var(--bull);border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lupdate{color:var(--accent);}
.rbtn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:14px;padding:4px 10px;border-radius:5px;cursor:pointer;}
.spinning{display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* TABS */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:11px 12px;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--mono);background:none;border-top:none;border-left:none;border-right:none;transition:color .2s;}
.tab.active{color:var(--bull);border-bottom-color:var(--bull);}

/* MAIN */
.main{padding:16px;max-width:1400px;width:100%;margin:0 auto;}
.page{display:none;}
.page.active{display:block;}

/* TICKER */
.ticker{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
.ticker::-webkit-scrollbar{display:none;}
.tpill{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 11px;white-space:nowrap;flex-shrink:0;}
.tsym{font-family:var(--mono);font-size:9px;color:var(--muted);}
.tprice{font-family:var(--mono);font-size:13px;font-weight:bold;color:var(--text);}
.tchg{font-family:var(--mono);font-size:10px;}
.src{font-family:var(--mono);font-size:7px;padding:1px 3px;border-radius:2px;margin-left:3px;background:rgba(0,255,136,.1);color:var(--bull);border:1px solid rgba(0,255,136,.2);}

/* ── MASTER SCORE TABLE (Nick's style) ── */
.score-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px;}
.score-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;min-width:900px;}
.score-table th{
  background:var(--bg3);color:var(--muted);text-align:center;
  padding:8px 6px;border:1px solid var(--border);
  font-weight:400;font-size:9px;text-transform:uppercase;letter-spacing:.5px;
  white-space:nowrap;
}
.score-table th.left{text-align:left;}
.score-table th.group{background:var(--bg4);color:var(--accent);font-size:9px;letter-spacing:1px;}
.score-table td{
  padding:7px 6px;border:1px solid var(--border);
  text-align:center;font-size:11px;
  transition:background .2s;
}
.score-table td.asset-name{
  text-align:left;font-weight:bold;font-size:12px;
  white-space:nowrap;background:var(--bg2);
  position:sticky;left:0;z-index:2;
  padding-left:10px;
}
.score-table td.bias-cell{font-size:10px;font-weight:600;white-space:nowrap;}
.score-table td.total-cell{font-size:14px;font-weight:bold;}
.score-table tr:hover td{filter:brightness(1.15);}

/* Cell color coding exactly like Nick's */
.c2{background:var(--cell-strong-bull);color:var(--bull);}
.c1{background:var(--cell-bull);color:var(--bull);}
.c0{background:var(--bg2);color:var(--muted);}
.cm1{background:var(--cell-bear);color:var(--bear);}
.cm2{background:var(--cell-strong-bear);color:var(--bear);}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;transition:all .2s;}
.filter-btn.active{background:var(--bull);color:#000;border-color:var(--bull);}
.filter-label{font-family:var(--mono);font-size:10px;color:var(--muted);margin-right:4px;}

/* MISC CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.chd{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);}
.ctitle{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);}
.cbadge-live{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid rgba(0,255,136,.3);color:var(--bull);}
.cbadge-demo{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid rgba(240,180,41,.3);color:var(--neutral);}
.cbadge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;background:var(--bg4);border:1px solid var(--border);color:var(--muted);}
.cbody{padding:14px;}

/* SENTIMENT ROWS */
.srow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.srow:last-child{border-bottom:none;}
.spairn{font-family:var(--mono);font-size:11px;width:70px;flex-shrink:0;}
.sbarw{flex:1;}
.sbart{height:7px;background:var(--bg4);border-radius:4px;overflow:hidden;display:flex;}
.slong{height:100%;border-radius:4px 0 0 4px;background:var(--bull);}
.sshort{height:100%;border-radius:0 4px 4px 0;background:var(--bear);}
.spcts{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;margin-top:3px;}

/* COT TABLE */
.ctbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.ctbl th{color:var(--muted);text-align:left;padding:7px 8px;border-bottom:1px solid var(--border);font-weight:400;font-size:9px;text-transform:uppercase;}
.ctbl td{padding:8px 8px;border-bottom:1px solid rgba(33,38,45,.5);}
.ctbl tr:last-child td{border-bottom:none;}
.mbw{display:flex;align-items:center;gap:5px;}
.mbt{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.mbf{height:100%;border-radius:2px;}

/* ECON HEATMAP */
.hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:10px;}
@media(max-width:500px){.hgrid{grid-template-columns:repeat(2,1fr);}}
.hcell{padding:10px;border-radius:7px;text-align:center;}
.hlbl{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.7);}
.hval{font-family:var(--mono);font-size:15px;font-weight:bold;color:#fff;margin:3px 0;}
.hchg{font-family:var(--mono);font-size:9px;}
.hdate{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.4);margin-top:1px;}

/* CURRENCY STRENGTH */
.crow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.crow:last-child{border-bottom:none;}
.crank{font-family:var(--mono);font-size:10px;color:var(--muted);width:18px;flex-shrink:0;}
.ccode{font-family:var(--mono);font-size:12px;font-weight:bold;width:40px;flex-shrink:0;}
.cname{font-size:10px;color:var(--muted);width:100px;flex-shrink:0;}
.cbarw{flex:1;}
.cbart{height:7px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.cbarf{height:100%;border-radius:4px;transition:width .8s;}
.cval{font-family:var(--mono);font-size:11px;width:48px;text-align:right;flex-shrink:0;}

/* CARRY TRADE */
.carry-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.carry-row:last-child{border-bottom:none;}
.carry-pair{font-family:var(--mono);font-size:12px;font-weight:bold;width:80px;flex-shrink:0;}
.carry-rate{font-family:var(--mono);font-size:11px;flex:1;}
.carry-score{font-family:var(--mono);font-size:14px;font-weight:bold;width:40px;text-align:right;}

/* FEAR GREED */
.fg-wrap{display:flex;flex-direction:column;align-items:center;padding:20px;}
.fg-dial{width:180px;height:90px;position:relative;margin-bottom:16px;}
.fg-label{font-family:var(--mono);font-size:22px;font-weight:bold;text-align:center;}
.fg-sublabel{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;margin-top:4px;}
.fg-bar{width:100%;height:14px;border-radius:7px;background:linear-gradient(to right,var(--bear),var(--neutral),var(--bull));position:relative;margin:12px 0;}
.fg-pointer{width:4px;height:20px;background:white;border-radius:2px;position:absolute;top:-3px;transform:translateX(-50%);}
.fg-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);}

/* SECTITLE */
.sectitle{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sectitle::after{content:'';flex:1;height:1px;background:var(--border);}
.infobox{padding:11px;border-radius:8px;font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:12px;}
.ib-blue{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.15);}
.ib-yellow{background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.15);}
.ib-green{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.15);}
.iblabel{font-family:var(--mono);display:block;margin-bottom:4px;}
.lrow{display:flex;align-items:center;gap:8px;padding:8px 0;color:var(--muted);font-family:var(--mono);font-size:11px;}
.spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--bull);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
.apibox{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;}
.apibox h3{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:10px;letter-spacing:1px;}
.apirow{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.apilbl{font-family:var(--mono);font-size:10px;color:var(--muted);width:100px;flex-shrink:0;}
.apiinp{flex:1;min-width:140px;background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:8px 10px;font-family:var(--mono);font-size:11px;color:var(--text);outline:none;}
.apibtn{background:var(--bull);color:#000;border:none;border-radius:5px;padding:8px 16px;font-family:var(--mono);font-size:11px;font-weight:bold;cursor:pointer;}
.key-status{font-family:var(--mono);font-size:10px;margin-top:5px;padding:6px 10px;border-radius:5px;}
.key-ok{background:rgba(0,255,136,.08);color:var(--bull);border:1px solid rgba(0,255,136,.2);}
.key-missing{background:rgba(240,180,41,.08);color:var(--neutral);border:1px solid rgba(240,180,41,.2);}
</style>
</head>
<body>

<header class="header">
  <div class="hlogo">
    <div class="logo-icon">EF</div>
    <div class="logo-text">Edge<b>Finder</b> <span style="font-size:11px;color:var(--accent);font-weight:400">PRO</span></div>
  </div>
  <div class="hright">
    <span><span class="live-dot"></span>LIVE</span>
    <span style="color:var(--muted)">Updated: <span class="lupdate" id="last-update">--:--</span></span>
    <button class="rbtn" onclick="refreshAll()"><span id="rbtn-icon">↻</span></button>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<div class="main">
  <div class="ticker" id="ticker">
    <div class="lrow"><div class="spinner"></div><span>Fetching live prices...</span></div>
  </div>
  <div id="page-setups"   class="page active"></div>
  <div id="page-cot"      class="page"></div>
  <div id="page-sentiment"class="page"></div>
  <div id="page-econ"     class="page"></div>
  <div id="page-currency" class="page"></div>
  <div id="page-carry"    class="page"></div>
  <div id="page-feargreed"class="page"></div>
  <div id="page-settings" class="page"></div>
</div>

<script>
// ── STORAGE ───────────────────────────────────────────────────────────────────
function saveKey(k,v){try{localStorage.setItem('ef_'+k,v);}catch(e){}}
function loadKey(k){try{return localStorage.getItem('ef_'+k)||'';}catch(e){return'';}}

// ── TABS ──────────────────────────────────────────────────────────────────────
const TABS_DEF=[
  {id:"setups",   label:"⚡ Top Setups"},
  {id:"cot",      label:"🏦 COT"},
  {id:"sentiment",label:"😊 Sentiment"},
  {id:"econ",     label:"🌡 Economic"},
  {id:"currency", label:"💱 Currency"},
  {id:"carry",    label:"🎯 Carry Trade"},
  {id:"feargreed",label:"😨 Fear/Greed"},
  {id:"settings", label:"⚙ Settings"},
];
let activeTab="setups";

// ── ASSETS (matching Nick's list) ────────────────────────────────────────────
const ASSETS=[
  {id:"DOW",    name:"DOW",    cat:"Index",     base:"US"},
  {id:"DAX",    name:"DAX",    cat:"Index",     base:"EU"},
  {id:"NAS100", name:"NASDAQ", cat:"Index",     base:"US"},
  {id:"SPX500", name:"SPX500", cat:"Index",     base:"US"},
  {id:"UK100",  name:"UK100",  cat:"Index",     base:"GB"},
  {id:"BITCOIN",name:"BITCOIN",cat:"Crypto",    base:"US"},
  {id:"XAUUSD", name:"GOLD",   cat:"Commodity", base:"US"},
  {id:"USOIL",  name:"USOIL",  cat:"Commodity", base:"US"},
  {id:"COPPER", name:"COPPER", cat:"Commodity", base:"US"},
  {id:"EURUSD", name:"EURUSD", cat:"Forex",     base:"EU"},
  {id:"GBPUSD", name:"GBPUSD", cat:"Forex",     base:"GB"},
  {id:"USDJPY", name:"USDJPY", cat:"Forex",     base:"JP"},
  {id:"AUDUSD", name:"AUDUSD", cat:"Forex",     base:"AU"},
  {id:"USDCAD", name:"USDCAD", cat:"Forex",     base:"CA"},
  {id:"USDCHF", name:"USDCHF", cat:"Forex",     base:"CH"},
  {id:"NZDUSD", name:"NZDUSD", cat:"Forex",     base:"NZ"},
  {id:"GBPJPY", name:"GBPJPY", cat:"Forex",     base:"GB"},
  {id:"AUDCAD", name:"AUDCAD", cat:"Forex",     base:"AU"},
  {id:"GBPNZD", name:"GBPNZD", cat:"Forex",     base:"GB"},
  {id:"AUDCHF", name:"AUDCHF", cat:"Forex",     base:"AU"},
];

// ── SCORE DATA (each factor scored -2 to +2 like Nick's) ────────────────────
// Factors: cot, retailPos, seasonality, trend, gdp, mPMI, sPMI, retailSales, inflation, empChange, unemploy, rates
function makeScores(){
  function r(){return Math.floor(Math.random()*5)-2;} // -2 to +2
  function r2(){return Math.random()>.5?Math.floor(Math.random()*3):-(Math.floor(Math.random()*3));} // slight bias
  return ASSETS.map(a=>{
    // Base scores with some logic
    const isUS=a.base==="US";
    const isEU=a.base==="EU";
    const isJP=a.base==="JP";
    return{
      ...a,
      cot:       r(),
      retailPos: r(),
      seasonal:  r(),
      trend:     r(),
      gdp:       isUS?1:isJP?-1:r(),
      mPMI:      r(),
      sPMI:      r(),
      retailSal: r(),
      inflation: r(),
      empChg:    isUS?1:r(),
      unemploy:  isUS?1:isJP?1:r(),
      rates:     isUS?-1:isJP?-2:r(),
    };
  }).map(a=>{
    a.total=a.cot+a.retailPos+a.seasonal+a.trend+a.gdp+a.mPMI+a.sPMI+a.retailSal+a.inflation+a.empChg+a.unemploy+a.rates;
    a.bias=a.total>=8?"Very Bullish":a.total>=5?"Bullish":a.total>=2?"Mild Bullish":a.total<=-8?"Very Bearish":a.total<=-5?"Bearish":a.total<=-2?"Mild Bearish":"Neutral";
    return a;
  }).sort((a,b)=>b.total-a.total);
}

const FOREX_PAIRS=[
  {id:"EURUSD",base:"EUR",quote:"USD"},{id:"GBPUSD",base:"GBP",quote:"USD"},
  {id:"USDJPY",base:"USD",quote:"JPY"},{id:"AUDUSD",base:"AUD",quote:"USD"},
  {id:"USDCAD",base:"USD",quote:"CAD"},{id:"USDCHF",base:"USD",quote:"CHF"},
  {id:"NZDUSD",base:"NZD",quote:"USD"},
];
const CURRS=[
  {code:"USD",name:"US Dollar"},{code:"EUR",name:"Euro"},
  {code:"GBP",name:"British Pound"},{code:"JPY",name:"Japanese Yen"},
  {code:"AUD",name:"Australian Dollar"},{code:"CAD",name:"Canadian Dollar"},
  {code:"CHF",name:"Swiss Franc"},{code:"NZD",name:"New Zealand Dollar"},
];
const COT_DATA=[
  {id:"EURUSD",lp:62,net:128,chg:12},{id:"GBPUSD",lp:58,net:74,chg:-5},
  {id:"USDJPY",lp:31,net:-89,chg:-18},{id:"AUDUSD",lp:44,net:-22,chg:3},
  {id:"USDCAD",lp:55,net:41,chg:9},{id:"XAUUSD",lp:71,net:214,chg:22},
  {id:"USOIL",lp:67,net:189,chg:-8},{id:"NZDUSD",lp:39,net:-31,chg:-4},
  {id:"USDCHF",lp:48,net:12,chg:2},{id:"BITCOIN",lp:54,net:89,chg:14},
];
const SENT_DATA=[
  {id:"EURUSD",lp:38},{id:"GBPUSD",lp:61},{id:"USDJPY",lp:72},
  {id:"AUDUSD",lp:44},{id:"USDCAD",lp:29},{id:"USDCHF",lp:55},
  {id:"NZDUSD",lp:48},{id:"GBPJPY",lp:65},{id:"AUDCAD",lp:52},
];
const CARRY_PAIRS=[
  {pair:"NZDJPY",long:"NZD",short:"JPY",rate:5.50,score:2},
  {pair:"AUDJPY",long:"AUD",short:"JPY",rate:4.35,score:2},
  {pair:"GBPJPY",long:"GBP",short:"JPY",rate:5.15,score:2},
  {pair:"CADJPY",long:"CAD",short:"JPY",rate:5.00,score:1},
  {pair:"USDJPY",long:"USD",short:"JPY",rate:5.25,score:1},
  {pair:"NZDCHF",long:"NZD",short:"CHF",rate:3.75,score:1},
  {pair:"AUDCHF",long:"AUD",short:"CHF",rate:2.60,score:0},
  {pair:"EURCHF",long:"EUR",short:"CHF",rate:2.25,score:-1},
];
const ECON_DATA={
  USD:[{l:"GDP YoY",v:"2.8%",s:.3,d:"Q4 2025"},{l:"CPI YoY",v:"3.1%",s:-.1,d:"Feb 2026"},{l:"Unemploy",v:"4.1%",s:0,d:"Feb 2026"},{l:"Fed Rate",v:"5.25%",s:0,d:"Mar 2026"}],
  EUR:[{l:"GDP YoY",v:"0.4%",s:-.2,d:"Q4 2025"},{l:"CPI YoY",v:"2.6%",s:-.4,d:"Feb 2026"},{l:"Unemploy",v:"6.1%",s:.1,d:"Jan 2026"},{l:"ECB Rate",v:"4.50%",s:0,d:"Mar 2026"}],
  GBP:[{l:"GDP YoY",v:"0.6%",s:.2,d:"Q3 2025"},{l:"CPI YoY",v:"3.4%",s:-.3,d:"Feb 2026"},{l:"Unemploy",v:"4.2%",s:-.1,d:"Jan 2026"},{l:"BOE Rate",v:"5.25%",s:0,d:"Mar 2026"}],
  JPY:[{l:"GDP YoY",v:"0.1%",s:-.5,d:"Q3 2025"},{l:"CPI YoY",v:"2.8%",s:.2,d:"Feb 2026"},{l:"Unemploy",v:"2.4%",s:.1,d:"Jan 2026"},{l:"BOJ Rate",v:"0.10%",s:.1,d:"Mar 2026"}],
};
const FLAGS={USD:"🇺🇸",EUR:"🇪🇺",GBP:"🇬🇧",JPY:"🇯🇵"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let state={
  rates:null,prevRates:null,btc:null,prices:[],cdata:null,
  scores:makeScores(),
  avKey:loadKey('av'),fredKey:loadKey('fred'),
  avPrices:{},econData:null,econLive:false,
  filterCat:"All",error:false,
  fearGreed:Math.floor(Math.random()*100),
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fp(p,id){
  if(!p&&p!==0)return"—";
  if(["XAUUSD","USOIL","NAS100","US30","DOW","SPX500","UK100","DAX"].includes(id))
    return p.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  if(id==="BTCUSD"||id==="BITCOIN")return"$"+p.toLocaleString();
  return id&&id.includes("JPY")?p.toFixed(3):p.toFixed(5);
}
function fc(c){if(c==null)return"—";return(c>=0?"+":"")+(c*100).toFixed(2)+"%";}
function biasColor(b){
  if(b.includes("Very Bullish"))return"var(--bull)";
  if(b.includes("Bullish"))return"var(--bull)";
  if(b.includes("Mild Bullish"))return"#7effc4";
  if(b.includes("Very Bearish"))return"var(--bear)";
  if(b.includes("Bearish"))return"var(--bear)";
  if(b.includes("Mild Bearish"))return"#ff8fa0";
  return"var(--neutral)";
}
function cellClass(v){
  if(v>=2)return"c2";if(v===1)return"c1";if(v===0)return"c0";
  if(v===-1)return"cm1";return"cm2";
}
function totalColor(t){
  if(t>=8)return"var(--bull)";if(t>=4)return"#7effc4";
  if(t<=-8)return"var(--bear)";if(t<=-4)return"#ff8fa0";
  return"var(--neutral)";
}

// ── API FETCHERS ──────────────────────────────────────────────────────────────
async function fetchRates(){
  const r=await fetch("https://api.frankfurter.app/latest?from=USD");
  if(!r.ok)throw new Error();return (await r.json()).rates;
}
async function fetchPrev(){
  const d=new Date();d.setDate(d.getDate()-1);
  if(d.getDay()===0)d.setDate(d.getDate()-2);
  if(d.getDay()===6)d.setDate(d.getDate()-1);
  const r=await fetch("https://api.frankfurter.app/"+d.toISOString().split("T")[0]+"?from=USD");
  if(!r.ok)throw new Error();return (await r.json()).rates;
}
async function fetchBTC(){
  const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true");
  if(!r.ok)throw new Error();
  const d=await r.json();return{price:d.bitcoin.usd,change:d.bitcoin.usd_24h_change};
}
function buildPrices(cur,prev){
  return FOREX_PAIRS.map(p=>{
    let price=null,pp=null;
    if(cur){if(p.base==="USD")price=cur[p.quote];else if(p.quote==="USD"&&cur[p.base])price=1/cur[p.base];}
    if(prev){if(p.base==="USD")pp=prev[p.quote];else if(p.quote==="USD"&&prev[p.base])pp=1/prev[p.base];}
    return{...p,price,change:price&&pp?(price-pp)/pp:null};
  });
}
function buildStrength(rates){
  if(!rates)return null;
  const all={...rates,USD:1};
  const st={};CURRS.forEach(c=>{st[c.code]=0;});
  CURRS.forEach(b=>CURRS.forEach(q=>{
    if(b.code===q.code||!all[b.code])return;
    st[b.code]+=Math.log(1/all[b.code])*.1;
  }));
  const vs=Object.values(st),mn=Math.min(...vs),mx=Math.max(...vs);
  return CURRS.map(c=>({...c,val:st[c.code]||0,pct:mx!==mn?((st[c.code]-mn)/(mx-mn))*100:50})).sort((a,b)=>b.val-a.val);
}

async function refreshAll(){
  document.getElementById("rbtn-icon").classList.add("spinning");
  const [r1,r2,r3]=await Promise.allSettled([fetchRates(),fetchPrev(),fetchBTC()]);
  if(r1.status==="fulfilled")state.rates=r1.value;
  if(r2.status==="fulfilled")state.prevRates=r2.value;
  if(r3.status==="fulfilled")state.btc=r3.value;
  state.prices=buildPrices(state.rates,state.prevRates);
  state.cdata=buildStrength(state.rates);
  state.scores=makeScores();
  state.fearGreed=Math.floor(Math.random()*100);
  const now=new Date();
  document.getElementById("last-update").textContent=
    now.toLocaleDateString([],{month:"short",day:"numeric"})+" "+
    now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  renderTicker();renderActive();
  document.getElementById("rbtn-icon").classList.remove("spinning");
}

function initTabs(){
  const nav=document.getElementById("tabs");
  TABS_DEF.forEach(t=>{
    const btn=document.createElement("button");
    btn.className="tab"+(t.id===activeTab?" active":"");
    btn.textContent=t.label;
    btn.onclick=()=>switchTab(t.id);
    nav.appendChild(btn);
  });
}
function switchTab(id){
  activeTab=id;
  document.querySelectorAll(".tab").forEach((b,i)=>{b.className="tab"+(TABS_DEF[i].id===id?" active":"");});
  document.querySelectorAll(".page").forEach(p=>{p.className="page";});
  document.getElementById("page-"+id).className="page active";
  renderActive();
}
function renderActive(){
  if(activeTab==="setups")renderSetups();
  else if(activeTab==="cot")renderCOT();
  else if(activeTab==="sentiment")renderSentiment();
  else if(activeTab==="econ")renderEcon();
  else if(activeTab==="currency")renderCurrency();
  else if(activeTab==="carry")renderCarry();
  else if(activeTab==="feargreed")renderFearGreed();
  else if(activeTab==="settings")renderSettings();
}
